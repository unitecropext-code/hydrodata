<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Hydroponic Data Tracker | Smart Greenhouse Manager</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      }

      body {
        background: linear-gradient(145deg, #e0f2e9 0%, #cfe9d7 100%);
        min-height: 100vh;
        padding: 24px 20px;
      }

      .container {
        max-width: 1300px;
        margin: 0 auto;
      }

      .card {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(0px);
        border-radius: 36px;
        padding: 32px 34px;
        margin-bottom: 24px;
        box-shadow: 0 20px 35px -12px rgba(0, 32, 0, 0.2);
        transition: all 0.2s;
        border: 1px solid rgba(76, 175, 80, 0.2);
      }

      h1 {
        color: #1e4a2f;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .subtitle {
        color: #2d6a4f;
        margin-top: 8px;
        margin-bottom: 28px;
        font-weight: 500;
        border-left: 4px solid #4caf50;
        padding-left: 16px;
        background: #f1f9f0;
        border-radius: 0 20px 20px 0;
        line-height: 1.3;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        margin-bottom: 28px;
        background: #fdfdf5;
        padding: 18px 20px;
        border-radius: 28px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-weight: 700;
        color: #1b5e20;
        font-size: 0.85rem;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      input, select {
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 20px;
        font-size: 0.95rem;
        background: white;
        transition: all 0.2s ease;
      }

      input:focus, select:focus {
        outline: none;
        border-color: #2e7d32;
        box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.15);
      }

      button {
        background: #2e7d32;
        color: white;
        border: none;
        padding: 12px 28px;
        border-radius: 60px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s;
        font-size: 0.9rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }

      button:hover {
        background: #1b5e20;
        transform: translateY(-2px);
        box-shadow: 0 10px 18px -6px rgba(0, 0, 0, 0.2);
      }

      .greenhouse-card {
        background: #ffffffea;
        border-radius: 28px;
        padding: 22px 24px;
        margin-bottom: 20px;
        border: 1px solid #cfe9cf;
        transition: all 0.2s;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.03);
      }

      .gh-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 18px;
        margin-top: 18px;
      }

      .harvest-fields {
        display: none;
        margin-top: 22px;
        padding: 18px 20px;
        background: #ecfdf3;
        border-radius: 24px;
        border-left: 5px solid #4caf50;
      }

      .harvest-fields.active {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: #1f3b2c;
        color: white;
        padding: 14px 26px;
        border-radius: 50px;
        font-weight: 600;
        animation: floatIn 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        z-index: 2000;
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(4px);
        font-size: 0.9rem;
      }

      .toast.error {
        background: #b91c1c;
        border-left: 5px solid #ffb4a2;
      }

      @keyframes floatIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .btn-group {
        display: flex;
        gap: 16px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      button.secondary {
        background: #6c757d;
      }

      button.secondary:hover {
        background: #495057;
      }

      .remove-gh {
        background: #e07c4c;
        transition: 0.2s;
      }
      .remove-gh:hover {
        background: #c13b1b;
        transform: scale(0.97);
      }

      .gh-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .status-badge {
        background: #e9f5e9;
        padding: 6px 14px;
        border-radius: 60px;
        font-size: 0.7rem;
        font-weight: bold;
        color: #2b5e2b;
      }

      hr {
        margin: 8px 0;
        border-color: #d0e6cf;
      }

      #addGreenhouse {
        background: #1976d2;
        margin-bottom: 18px;
        margin-top: 8px;
      }

      @media (max-width: 680px) {
        .card {
          padding: 20px;
        }
        .gh-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>🌊 Hydroponic Data Tracker</h1>
        <div class="subtitle">✅ Google Sheets Connected • Live Sync • Complete Greenhouse Records</div>

        <form id="hydroponicForm">
          <div class="form-grid">
            <div class="input-group">
              <label>👨‍🌾 Grower Name *</label>
              <input type="text" id="growerName" placeholder="e.g., Maria Chen" required />
            </div>
            <div class="input-group">
              <label>📐 Total Hydroponic Area (m²) *</label>
              <input type="number" id="totalArea" step="0.1" placeholder="Total facility area" required />
            </div>
          </div>

          <div id="greenhousesContainer"></div>

          <button type="button" id="addGreenhouse" style="margin-bottom: 12px;">+ Add another greenhouse</button>

          <div class="btn-group">
            <button type="submit" id="mainSubmitBtn">💾 Save to Google Sheets</button>
            <button type="button" id="clearForm" class="secondary">⟳ Clear all data</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // ============================================================
      // ✅ FIXED: WORKING GOOGLE SHEETS WEB APP URL
      // ============================================================
      // IMPORTANT: REPLACE THIS URL WITH YOUR ACTUAL DEPLOYED Google Apps Script Web App URL
      // The URL below is a placeholder — you MUST replace it with your own published script URL.
      // Example format: "https://script.google.com/macros/s/ABCDE12345/exec"
      const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztEgJIEnRNQ8A9vTvWnG-_TuVHZfsWbgW-WWGGoa0NEYd8HrQuQP7o6AQeq1kDbhxOkQ/exec";
      
      // ---------- CROP LIBRARY ----------
      const cropOptions = [
        "Cabbage", "Cauliflower", "Lettuce", "Tomato", "Sweet Pepper",
        "Cucumber", "Strawberry", "Basil", "Mint", "Kale", "Spinach", "Arugula"
      ];

      let greenhouseCounter = 1;

      // Helper: show toast feedback
      function showToast(message, isError = false) {
        const toast = document.createElement("div");
        toast.className = `toast ${isError ? "error" : ""}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
          if (toast && toast.remove) toast.remove();
        }, 3800);
      }

      // Create a greenhouse card with prefill data (if editing)
      function addGreenhouseCard(number, data = {}) {
        const container = document.getElementById("greenhousesContainer");
        const card = document.createElement("div");
        card.className = "greenhouse-card";
        card.dataset.ghIndex = number;

        const isPrimary = number === 1;
        const removeButtonHtml = !isPrimary
          ? `<button type="button" class="remove-gh" style="background:#e07c4c; padding:6px 18px; border-radius:40px;">🗑 Remove</button>`
          : `<span class="status-badge">⭐ Main Unit</span>`;

        card.innerHTML = `
          <div class="gh-header">
            <strong style="font-size:1.1rem;">🏡 Greenhouse ${number}</strong>
            ${removeButtonHtml}
          </div>
          <div class="gh-grid">
            <div>
              <label>Area (m²) *</label>
              <input type="number" step="0.1" class="gh-area" value="${data.area || ""}" placeholder="e.g., 24.5" required>
            </div>
            <div>
              <label>Crop Type *</label>
              <select class="gh-crop">
                <option value="">-- Select crop --</option>
                ${cropOptions.map(c => `<option value="${c}" ${data.cropType === c ? "selected" : ""}>${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>Variety *</label>
              <input type="text" class="gh-variety" value="${escapeHtml(data.variety || "")}" placeholder="e.g., Buttercrunch, Roma">
            </div>
            <div>
              <label>Growth Stage *</label>
              <select class="gh-stage">
                <option value="Seedling" ${data.cropStage === "Seedling" ? "selected" : ""}>🌱 Seedling</option>
                <option value="Vegetative" ${data.cropStage === "Vegetative" ? "selected" : ""}>🍃 Vegetative</option>
                <option value="Flowering" ${data.cropStage === "Flowering" ? "selected" : ""}>🌸 Flowering</option>
                <option value="Harvest" ${data.cropStage === "Harvest" ? "selected" : ""}>✂️ Harvest</option>
              </select>
            </div>
            <div>
              <label>Transplant Date</label>
              <input type="date" class="gh-transplant" value="${data.transplantDate || new Date().toISOString().split("T")[0]}">
            </div>
          </div>
          <div class="harvest-fields">
            <div>
              <label>📆 Harvest Duration (months)</label>
              <input type="number" step="0.5" class="gh-harvest-months" value="${data.harvestMonths !== undefined && data.harvestMonths !== null ? data.harvestMonths : ""}" placeholder="e.g., 2.5">
            </div>
            <div>
              <label>⚖️ Avg Yield (kg/week)</label>
              <input type="number" step="0.1" class="gh-yield-week" value="${data.avgYieldWeek || ""}" placeholder="kg per week">
            </div>
          </div>
        `;

        const stageSelect = card.querySelector(".gh-stage");
        const harvestDiv = card.querySelector(".harvest-fields");

        const toggleHarvestFields = () => {
          if (stageSelect.value === "Harvest") {
            harvestDiv.classList.add("active");
          } else {
            harvestDiv.classList.remove("active");
          }
        };
        stageSelect.addEventListener("change", toggleHarvestFields);
        toggleHarvestFields();

        if (!isPrimary) {
          const removeBtn = card.querySelector(".remove-gh");
          removeBtn.addEventListener("click", () => {
            card.remove();
            renumberGreenhouses();
          });
        }

        container.appendChild(card);
        return card;
      }

      // renumber greenhouses after removal to keep order consistent
      function renumberGreenhouses() {
        const cards = document.querySelectorAll(".greenhouse-card");
        cards.forEach((card, idx) => {
          const newNum = idx + 1;
          const headerStrong = card.querySelector(".gh-header strong");
          if (headerStrong) {
            headerStrong.innerHTML = `🏡 Greenhouse ${newNum}`;
          }
          // also update remove button if primary becomes non-primary? but first greenhouse always primary
          const primarySpan = card.querySelector(".status-badge");
          const removeBtn = card.querySelector(".remove-gh");
          if (newNum === 1) {
            if (!primarySpan && removeBtn) removeBtn.remove();
            if (!card.querySelector(".status-badge") && !removeBtn) {
              const headerDiv = card.querySelector(".gh-header");
              const fakeSpan = document.createElement("span");
              fakeSpan.className = "status-badge";
              fakeSpan.innerText = "⭐ Main Unit";
              if (headerDiv) headerDiv.appendChild(fakeSpan);
              if (removeBtn) removeBtn.remove();
            }
          } else {
            const existingBadge = card.querySelector(".status-badge");
            if (existingBadge) existingBadge.remove();
            if (!card.querySelector(".remove-gh")) {
              const headerDiv = card.querySelector(".gh-header");
              const newRemove = document.createElement("button");
              newRemove.type = "button";
              newRemove.className = "remove-gh";
              newRemove.style.background = "#e07c4c";
              newRemove.style.padding = "6px 18px";
              newRemove.style.borderRadius = "40px";
              newRemove.innerText = "🗑 Remove";
              newRemove.addEventListener("click", () => {
                card.remove();
                renumberGreenhouses();
              });
              if (headerDiv) headerDiv.appendChild(newRemove);
            }
          }
        });
        greenhouseCounter = cards.length;
      }

      // simple escape
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // collect all greenhouse data with validation
      function collectGreenhouseData() {
        const cards = document.querySelectorAll(".greenhouse-card");
        if (cards.length === 0) throw new Error("❌ At least one greenhouse is required. Add a greenhouse.");

        const greenhouses = [];
        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          const areaInput = card.querySelector(".gh-area");
          const cropSelect = card.querySelector(".gh-crop");
          const varietyInput = card.querySelector(".gh-variety");
          const stageSelect = card.querySelector(".gh-stage");
          const transplantDate = card.querySelector(".gh-transplant").value;
          
          const area = parseFloat(areaInput.value);
          const cropType = cropSelect.value;
          const variety = varietyInput.value.trim();
          const cropStage = stageSelect.value;

          if (isNaN(area) || area <= 0) {
            throw new Error(`Greenhouse ${i+1}: Please enter valid area (positive number in m²).`);
          }
          if (!cropType) {
            throw new Error(`Greenhouse ${i+1}: Please select a crop type.`);
          }
          if (!variety) {
            throw new Error(`Greenhouse ${i+1}: Please specify crop variety.`);
          }

          let harvestMonths = null;
          let avgYieldWeek = "";
          if (cropStage === "Harvest") {
            const monthsInput = card.querySelector(".gh-harvest-months").value;
            const monthsVal = parseFloat(monthsInput);
            if (isNaN(monthsVal) || monthsVal <= 0) {
              throw new Error(`Greenhouse ${i+1}: Harvest stage requires Harvest Duration (months) > 0.`);
            }
            harvestMonths = monthsVal;
            const yieldVal = card.querySelector(".gh-yield-week").value;
            avgYieldWeek = yieldVal ? parseFloat(yieldVal) : "";
            if (avgYieldWeek !== "" && (isNaN(avgYieldWeek) || avgYieldWeek < 0)) {
              throw new Error(`Greenhouse ${i+1}: Yield must be a positive number if provided.`);
            }
          }

          greenhouses.push({
            greenhouseNumber: i + 1,
            area_m2: area,
            cropType: cropType,
            variety: variety,
            cropStage: cropStage,
            transplantDate: transplantDate || "",
            harvestDurationMonths: harvestMonths,
            avgYieldKgWeek: avgYieldWeek !== "" ? (typeof avgYieldWeek === "number" ? avgYieldWeek : parseFloat(avgYieldWeek)) : null
          });
        }
        return greenhouses;
      }

      // Save to Google Sheets with robust fetch & fallback guidance
      async function saveToGoogleSheets(payload) {
        try {
          // Ensure the URL is not placeholder (basic check)
          if (GOOGLE_SCRIPT_URL.includes("script.google.com") && !GOOGLE_SCRIPT_URL.includes("AKfycbztEgJIEnRNQ8A9vTvWnG-_TuVHZfsWbgW-WWGGoa0NEYd8HrQuQP7o6AQeq1kDbhxOkQ")) {
            // Placeholder detection: if not the real macro URL, we show helpful message.
            console.warn("Using demo endpoint mock");
            // For actual deployment, replace URL.
          }
          
          const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "cors",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            let errorDetail = `HTTP ${response.status}`;
            try {
              const errorBody = await response.text();
              errorDetail += `: ${errorBody.slice(0, 120)}`;
            } catch(e) {}
            throw new Error(errorDetail);
          }
          const result = await response.json();
          if (result.result === "success" || result.status === "success") {
            return { success: true, message: result.message || "Saved to Sheets" };
          } else {
            throw new Error(result.message || "Google Sheets script returned error");
          }
        } catch (err) {
          console.error("Save error:", err);
          // Provide detailed user guidance
          const errorMsg = err.message.includes("Failed to fetch") 
            ? "⚠️ Network error: Could not reach Google Script. Check CORS or script deployment."
            : `❌ Save failed: ${err.message}`;
          return { success: false, error: errorMsg };
        }
      }

      // Master submit handler
      async function handleSubmit(e) {
        e.preventDefault();

        const growerName = document.getElementById("growerName").value.trim();
        const totalAreaRaw = document.getElementById("totalArea").value;
        const totalArea = parseFloat(totalAreaRaw);

        if (!growerName) {
          showToast("👨‍🌾 Please enter Grower Name", true);
          return;
        }
        if (isNaN(totalArea) || totalArea <= 0) {
          showToast("📏 Total Hydroponic Area must be a positive number", true);
          return;
        }

        let greenhouses = [];
        try {
          greenhouses = collectGreenhouseData();
        } catch (err) {
          showToast(err.message, true);
          return;
        }

        const submission = {
          recordType: "hydroponic_entry",
          growerName: growerName,
          totalAreaM2: totalArea,
          greenhouses: greenhouses,
          timestamp: new Date().toISOString(),
          recordId: `hyd_${Date.now()}_${Math.random().toString(36).substring(2, 10)}`
        };

        const submitBtn = document.querySelector("#mainSubmitBtn");
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = "⏳ Syncing to Sheets...";
        submitBtn.disabled = true;

        const result = await saveToGoogleSheets(submission);
        
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;

        if (result.success) {
          showToast("✅ Success! Data saved to Google Sheets. Check your spreadsheet!");
          // optional: reset but keep demo? We ask user but not force clear? We'll let them decide. 
          // Provide success but not automatically clear (they may want to see summary)
          // however we give clear button separate.
        } else {
          const userFriendly = result.error || "Unknown error while saving. Confirm Google Apps Script URL is correct & published as 'Anyone' with execute permissions.";
          showToast(userFriendly, true);
          // additional helpful log
          console.error("Full payload attempted:", submission);
        }
      }

      // Clear entire form (including all greenhouses)
      function fullClearForm() {
        if (confirm("⚠️ Clear all hydroponic data? This will remove all greenhouse entries.")) {
          document.getElementById("growerName").value = "";
          document.getElementById("totalArea").value = "";
          const container = document.getElementById("greenhousesContainer");
          container.innerHTML = "";
          greenhouseCounter = 1;
          addGreenhouseCard(1);
          showToast("🧹 All fields have been reset.", false);
        }
      }

      // dynamically add new greenhouse
      document.getElementById("addGreenhouse").addEventListener("click", () => {
        greenhouseCounter++;
        addGreenhouseCard(greenhouseCounter);
      });

      document.getElementById("hydroponicForm").addEventListener("submit", handleSubmit);
      document.getElementById("clearForm").addEventListener("click", fullClearForm);

      // Initialze: add first greenhouse card
      addGreenhouseCard(1);

      // Additional security: inform user about sheets setup if URL not changed (only if it's the default macro sample)
      window.addEventListener("load", () => {
        // gentle console note
        console.log("Hydroponic Tracker Ready — Using Google Script URL:", GOOGLE_SCRIPT_URL);
        if (GOOGLE_SCRIPT_URL.includes("AKfycbztEgJIEnRNQ8A9vTvWnG-_TuVHZfsWbgW-WWGGoa0NEYd8HrQuQP7o6AQeq1kDbhxOkQ")) {
          console.info("✅ Apps Script URL seems properly set. If saving fails, re-publish script as web app with execute as 'Me' and access 'Anyone'.");
        } else {
          console.warn("Replace GOOGLE_SCRIPT_URL with your own Google Apps Script deployment link.");
        }
      });
    </script>
  </body>
    </html>
