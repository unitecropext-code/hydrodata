<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hydroponic Data Tracker - Smart Data Capture Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .modern-header { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 25px 30px; margin-bottom: 30px; }
        .title-section { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .icon-badge { background: linear-gradient(135deg, #4CAF50, #45a049); width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .title-section h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .beta-badge { background: #FF9800; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .subtitle { color: #666; font-size: 14px; margin-top: 8px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 28px; margin-bottom: 10px; }
        .stat-label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #2c3e50; }
        
        .form-section { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-title { font-size: 20px; font-weight: 700; color: #2c3e50; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; flex-wrap: wrap; }
        .smart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 14px; }
        .input-group label i { margin-right: 6px; color: #4CAF50; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.1); }
        
        .zone-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 5px; }
        .zone-btn { padding: 10px 24px; border: 2px solid #e0e0e0; background: white; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .zone-btn:hover { border-color: #4CAF50; background: #f0f9f0; }
        .zone-btn.active { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; border-color: #4CAF50; }
        
        .greenhouse-card { background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #e0e0e0; transition: all 0.3s; position: relative; overflow: hidden; }
        .greenhouse-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(135deg, #4CAF50, #45a049); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .greenhouse-badge { background: linear-gradient(135deg, #4CAF50, #45a049); color: white; padding: 8px 16px; border-radius: 25px; font-weight: 600; font-size: 14px; }
        .card-actions { display: flex; gap: 10px; }
        .smart-btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .smart-btn-primary { background: #4CAF50; color: white; }
        .smart-btn-secondary { background: #FF9800; color: white; }
        .smart-btn-danger { background: #f44336; color: white; }
        
        .btn-submit { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 18px 40px; font-size: 18px; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px; }
        .footer { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 20px; text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateX(400px); transition: transform 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #4CAF50; }
        .toast.error { border-left: 4px solid #f44336; }
        
        .harvest-table-container { background: #FFF8E1; border-radius: 15px; padding: 20px; margin-top: 20px; border: 2px solid #FF9800; overflow-x: auto; }
        .monthly-harvest-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; }
        .monthly-harvest-table th { background: #FF9800; color: white; padding: 10px; font-size: 12px; text-align: center; }
        .monthly-harvest-table td { padding: 8px; text-align: center; border: 1px solid #e0e0e0; }
        .monthly-harvest-table input { width: 100%; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 6px; }
        .avg-yield-section { background: #E3F2FD; border-radius: 10px; padding: 15px; margin-top: 15px; display: flex; gap: 20px; flex-wrap: wrap; }
        
        @media (max-width: 768px) { .card-header { flex-direction: column; align-items: stretch; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="modern-header">
            <div class="title-section">
                <div class="icon-badge"><i class="fas fa-leaf"></i></div>
                <h1>Hydroponic Data Tracker</h1>
                <span class="beta-badge">BETA 1.0</span>
            </div>
            <div class="subtitle"><i class="fas fa-microchip"></i> Smart Data Capture Tool | Monthly Harvest Tracking</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🌱</div><div class="stat-label">Greenhouses</div><div class="stat-value" id="totalGH">0</div></div>
            <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">Total Area (m²)</div><div class="stat-value" id="totalAreaStat">0</div></div>
            <div class="stat-card"><div class="stat-icon">🌾</div><div class="stat-label">Crop Varieties</div><div class="stat-value" id="totalVarieties">0</div></div>
            <div class="stat-card"><div class="stat-icon">👨‍🌾</div><div class="stat-label">Active Growers</div><div class="stat-value" id="growerCount">0</div></div>
        </div>

        <!-- Zone Selection -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-map-marker-alt"></i><span>Select Zone</span></div>
            <div class="zone-buttons" id="zoneButtons">
                <button class="zone-btn" data-zone="E1">📍 Zone E1</button>
                <button class="zone-btn" data-zone="E2">📍 Zone E2</button>
                <button class="zone-btn" data-zone="E3">📍 Zone E3</button>
                <button class="zone-btn" data-zone="E4">📍 Zone E4</button>
            </div>
        </div>

        <!-- Grower Information -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-user-friends"></i><span>Grower Information</span></div>
            <div class="smart-grid">
                <div class="input-group"><label><i class="fas fa-user"></i> Grower Name *</label><input type="text" id="growerName" placeholder="Enter grower name"></div>
                <div class="input-group"><label><i class="fas fa-map-marker-alt"></i> Locality</label><input type="text" id="locality" list="localityList"><datalist id="localityList"></datalist></div>
                <div class="input-group"><label><i class="fas fa-layer-group"></i> Zone</label><input type="text" id="zoneDisplay" readonly></div>
                <div class="input-group"><label><i class="fas fa-chart-line"></i> Total Area (m²)</label><input type="number" id="totalArea" step="0.01" placeholder="Total greenhouse area"></div>
            </div>
        </div>

        <!-- Greenhouses Container -->
        <div class="form-section">
            <div class="section-title">
                <i class="fas fa-greenhouse"></i><span>Greenhouse Details</span>
                <button class="smart-btn smart-btn-primary" onclick="addGreenhouse()" style="margin-left: auto;"><i class="fas fa-plus"></i> Add Greenhouse</button>
            </div>
            <div id="greenhousesContainer"></div>
        </div>

        <button class="btn-submit" onclick="submitData()"><i class="fas fa-cloud-upload-alt"></i> Submit Data</button>

        <div class="footer"><i class="fas fa-leaf"></i> Hydroponic Data Tracker - All Rights Reserved 2026</div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

    <script>
        // ==================== DATA ====================
        const zoneE1Localities = ["Alma", "Bagatelle Dam", "Beau Bois", "Bell Village"];
        const zoneE2Localities = ["Balance John", "Bel Etang", "Belvédère", "Bon Accueil", "Lallmatie", "Mont Ida", "Montagne Blanche"];
        const zoneE3Localities = ["Argy", "Beau Rivage", "Belle Mare"];
        const zoneE4Localities = ["Beau Champ", "Beau Vallon", "Bel Air Rivière Sèche"];
        
        const cropOptions = ["Cabbage", "Cauliflower", "English Cucumber", "Lettuce", "Melon", "Sweet Pepper", "Shallot", "Greens", "Tomato", "Okra", "Chillies", "Eggplant"];
        const unitBasedCrops = ["English Cucumber", "Cauliflower", "Cabbage", "Melon", "Lettuce"];
        const tomatoTypeOptions = ["Cooking", "Salad", "Cherry"];
        const substrateOptions = ["Cocopeat", "Aggregates", "Woodchips", "NFT", "DFT", "Aquaponics"];
        const cropStageOptions = ["Seedling", "Vegetative", "Flowering", "Fruiting", "Harvesting"];
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        let currentZone = "E2";
        let greenhouseCounter = 1;
        let activeGrowersSet = new Set();
        window.monthlyHarvestData = {};
        
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_Rw7YeDHQj2KOHaq5867OT_hvc5tOjgx435X8swEj6QsxeIijEL6RthwNTjQzpRheVw/exec';
        
        // ==================== UI FUNCTIONS ====================
        function updateLocalitiesByZone(zone) {
            const localityList = document.getElementById('localityList');
            let localities = zone === 'E1' ? zoneE1Localities : zone === 'E2' ? zoneE2Localities : zone === 'E3' ? zoneE3Localities : zoneE4Localities;
            localityList.innerHTML = '';
            localities.forEach(loc => { const option = document.createElement('option'); option.value = loc; localityList.appendChild(option); });
            document.getElementById('zoneDisplay').value = `Zone ${zone}`;
        }
        
        function initZoneButtons() {
            const buttons = document.querySelectorAll('.zone-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentZone = btn.dataset.zone;
                    updateLocalitiesByZone(currentZone);
                    showToast(`Zone ${currentZone} selected`, false);
                });
            });
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.className = `toast show ${isError ? 'error' : 'success'}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function updateStats() {
            const sections = document.querySelectorAll('.greenhouse-card');
            document.getElementById('totalGH').innerText = sections.length;
            
            let totalArea = 0;
            sections.forEach(s => totalArea += parseFloat(s.querySelector('.gh-area')?.value) || 0);
            document.getElementById('totalAreaStat').innerText = totalArea.toFixed(2);
            
            const varieties = new Set();
            sections.forEach(s => { const v = s.querySelector('.gh-crop')?.value; if(v && v !== "") varieties.add(v); });
            document.getElementById('totalVarieties').innerText = varieties.size;
            
            const growerName = document.getElementById('growerName').value.trim();
            if (growerName) activeGrowersSet.add(growerName);
            document.getElementById('growerCount').innerText = activeGrowersSet.size;
        }
        
        // ==================== CONVERSION FUNCTIONS ====================
        function getDisplayUnit(cropType) {
            return unitBasedCrops.includes(cropType) ? "units" : "kg";
        }
        
        function getConversionNote(cropType) {
            const conversions = { "English Cucumber": "3 units per kg", "Cauliflower": "2 units per kg", "Cabbage": "2 units per kg", "Melon": "1.5 units per kg", "Lettuce": "5 heads per kg" };
            return conversions[cropType] || "Yield measured in kilograms (kg)";
        }
        
        // ==================== MONTHLY HARVEST TABLE ====================
        function generateMonthlyHarvestTableHTML(greenhouseId, cropType, existingData = null) {
            const displayUnit = getDisplayUnit(cropType);
            let tableHtml = `<div class="harvest-table-container" id="harvestTable_${greenhouseId}">
                <div style="font-weight:700; margin-bottom:15px;">📊 MONTHLY HARVEST YIELD (${displayUnit.toUpperCase()})</div>
                <table class="monthly-harvest-table">
                    <thead><tr>${months.map(m => `<th>${m.substring(0,3)}</th>`).join('')}</tr></thead>
                    <tbody><tr>`;
            for (let month of months) {
                const savedValue = (existingData && existingData[month]) ? existingData[month].yield : '';
                tableHtml += `<td><input type="number" class="month-harvest-input" data-greenhouse="${greenhouseId}" data-month="${month}" value="${savedValue}" step="${displayUnit === 'units' ? '1' : '0.01'}" placeholder="${displayUnit}" style="width:80px; padding:5px; text-align:center;"></td>`;
            }
            tableHtml += `</tr></tbody>
                </table>
                <div class="avg-yield-section">
                    <div class="input-group"><label>Avg Yield per Week (${displayUnit})</label><input type="number" class="avg-weekly-yield" step="0.01" placeholder="per week"></div>
                    <div class="input-group"><label>Avg Yield per Month (${displayUnit})</label><input type="number" class="avg-monthly-yield" step="0.01" placeholder="per month"></div>
                    <div class="input-group"><label>Months Harvesting</label><input type="number" class="harvest-months" step="1" min="0" max="12" placeholder="Months"></div>
                </div>
                <div style="background:#E3F2FD; padding:8px; border-radius:8px; font-size:11px; margin-top:10px;">
                    <i class="fas fa-info-circle"></i> ${getConversionNote(cropType)}
                </div>
            </div>`;
            return tableHtml;
        }
        
        // ==================== HTML GENERATORS ====================
        function getCropOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Crop</option>';
            cropOptions.forEach(crop => { html += `<option value="${crop}" ${selectedValue === crop ? 'selected' : ''}>${crop}</option>`; });
            return html;
        }
        
        function getTomatoTypeOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Tomato Type</option>';
            tomatoTypeOptions.forEach(type => { html += `<option value="${type}" ${selectedValue === type ? 'selected' : ''}>${type}</option>`; });
            return html;
        }
        
        function getSubstrateOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Substrate</option>';
            substrateOptions.forEach(sub => { html += `<option value="${sub}" ${selectedValue === sub ? 'selected' : ''}>${sub}</option>`; });
            return html;
        }
        
        function getCropStageOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Stage</option>';
            cropStageOptions.forEach(stage => { html += `<option value="${stage}" ${selectedValue === stage ? 'selected' : ''}>${stage}</option>`; });
            return html;
        }
        
        // ==================== TOGGLE FUNCTIONS ====================
        window.toggleHarvestSection = function(selectElement) {
            const card = selectElement.closest('.greenhouse-card');
            const id = card.id.split('-')[1];
            const cropSelect = card.querySelector('.gh-crop');
            const cropType = cropSelect?.value || '';
            const existingSection = card.querySelector('.harvest-table-container');
            
            if (selectElement.value === 'Harvesting' && cropType) {
                if (existingSection) existingSection.remove();
                const tableHtml = generateMonthlyHarvestTableHTML(id, cropType, window.monthlyHarvestData[id]);
                card.insertAdjacentHTML('beforeend', tableHtml);
                
                card.querySelectorAll('.month-harvest-input').forEach(input => {
                    input.addEventListener('change', function() {
                        const month = this.dataset.month;
                        const value = parseFloat(this.value) || 0;
                        const ghId = this.dataset.greenhouse;
                        const currentCrop = card.querySelector('.gh-crop').value;
                        const unit = getDisplayUnit(currentCrop);
                        if (!window.monthlyHarvestData[ghId]) window.monthlyHarvestData[ghId] = {};
                        window.monthlyHarvestData[ghId][month] = { yield: value, unit: unit, crop: currentCrop };
                    });
                });
                
                const avgWeekly = card.querySelector('.avg-weekly-yield');
                const avgMonthly = card.querySelector('.avg-monthly-yield');
                const harvestMonths = card.querySelector('.harvest-months');
                
                if (avgWeekly) avgWeekly.addEventListener('change', function() {
                    if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {};
                    window.monthlyHarvestData[id].avgWeeklyYield = parseFloat(this.value) || 0;
                });
                if (avgMonthly) avgMonthly.addEventListener('change', function() {
                    if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {};
                    window.monthlyHarvestData[id].avgMonthlyYield = parseFloat(this.value) || 0;
                });
                if (harvestMonths) harvestMonths.addEventListener('change', function() {
                    if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {};
                    window.monthlyHarvestData[id].harvestMonthsCount = parseFloat(this.value) || 0;
                });
            } else {
                if (existingSection) existingSection.remove();
                if (window.monthlyHarvestData[id]) delete window.monthlyHarvestData[id];
            }
        };
        
        window.toggleTomatoType = function(selectElement) {
            const card = selectElement.closest('.greenhouse-card');
            const tomatoGroup = card.querySelector('.tomato-type-group');
            if (tomatoGroup) tomatoGroup.style.display = selectElement.value === 'Tomato' ? 'block' : 'none';
        };
        
        // ==================== GREENHOUSE MANAGEMENT ====================
        window.addGreenhouse = function(data = null) {
            const container = document.getElementById('greenhousesContainer');
            const currentId = greenhouseCounter;
            const showTomatoType = data?.cropType === 'Tomato';
            
            const card = document.createElement('div');
            card.className = 'greenhouse-card';
            card.id = `greenhouse-${currentId}`;
            card.innerHTML = `
                <div class="card-header">
                    <div class="greenhouse-badge"><i class="fas fa-seedling"></i> Greenhouse ${currentId}</div>
                    <div class="card-actions">
                        <button class="smart-btn smart-btn-secondary" onclick="duplicateGreenhouse(${currentId})"><i class="fas fa-copy"></i> Duplicate</button>
                        <button class="smart-btn smart-btn-danger" onclick="removeGreenhouse(${currentId})"><i class="fas fa-trash"></i> Remove</button>
                    </div>
                </div>
                <div class="smart-grid">
                    <div class="input-group"><label><i class="fas fa-chart-pie"></i> Area (m²)</label><input type="number" class="gh-area" step="0.01" value="${data?.area || ''}" oninput="updateStats()"></div>
                    <div class="input-group"><label><i class="fas fa-seedling"></i> Crop Cultivated</label><select class="gh-crop" onchange="toggleTomatoType(this)">${getCropOptionsHTML(data?.cropType || '')}</select></div>
                    <div class="input-group"><label><i class="fas fa-tag"></i> Variety</label><input type="text" class="gh-variety" value="${data?.variety || ''}" oninput="updateStats()"></div>
                    <div class="input-group"><label><i class="fas fa-chart-simple"></i> Crop Stage</label><select class="gh-stage" onchange="toggleHarvestSection(this)">${getCropStageOptionsHTML(data?.cropStage || '')}</select></div>
                    <div class="input-group"><label><i class="fas fa-calendar-alt"></i> Date Transplanted</label><input type="date" class="gh-transplant" value="${data?.transplantDate || ''}"></div>
                    <div class="input-group"><label><i class="fas fa-water"></i> Substrate Type</label><select class="gh-substrate">${getSubstrateOptionsHTML(data?.substrateType || '')}</select></div>
                    <div class="input-group tomato-type-group" style="display: ${showTomatoType ? 'block' : 'none'};"><label><i class="fas fa-tomato"></i> Tomato Type</label><select class="gh-tomatotype">${getTomatoTypeOptionsHTML(data?.tomatoType || '')}</select></div>
                </div>`;
            
            container.appendChild(card);
            
            if (data?.cropStage === 'Harvesting' && data?.cropType) {
                if (data.monthlyHarvest) window.monthlyHarvestData[currentId] = data.monthlyHarvest;
                setTimeout(() => {
                    const stageSelect = card.querySelector('.gh-stage');
                    if (stageSelect) window.toggleHarvestSection(stageSelect);
                }, 100);
            }
            
            greenhouseCounter++;
            updateStats();
        };
        
        window.removeGreenhouse = function(id) {
            const el = document.getElementById(`greenhouse-${id}`);
            if (el) el.remove();
            delete window.monthlyHarvestData[id];
            updateStats();
            showToast('Greenhouse removed');
        };
        
        window.duplicateGreenhouse = function(id) {
            const source = document.getElementById(`greenhouse-${id}`);
            if (source) {
                window.addGreenhouse({
                    area: source.querySelector('.gh-area').value,
                    cropType: source.querySelector('.gh-crop').value,
                    variety: source.querySelector('.gh-variety').value,
                    cropStage: source.querySelector('.gh-stage').value,
                    transplantDate: source.querySelector('.gh-transplant').value,
                    substrateType: source.querySelector('.gh-substrate').value,
                    tomatoType: source.querySelector('.gh-tomatotype')?.value || '',
                    monthlyHarvest: window.monthlyHarvestData[id] || {}
                });
                showToast('Greenhouse duplicated');
            }
        };
        
        // ==================== SUBMIT DATA ====================
        window.submitData = async function() {
            const growerName = document.getElementById('growerName').value.trim();
            if (!growerName) { showToast('Enter grower name', true); return; }
            
            const greenhouses = [];
            const greenhouseCards = document.querySelectorAll('.greenhouse-card');
            
            for (let card of greenhouseCards) {
                const id = card.id.split('-')[1];
                const cropType = card.querySelector('.gh-crop').value;
                const monthlyHarvestForGH = window.monthlyHarvestData[id] || {};
                
                const monthInputs = card.querySelectorAll('.month-harvest-input');
                monthInputs.forEach(input => {
                    const month = input.dataset.month;
                    const value = parseFloat(input.value) || 0;
                    if (value > 0) {
                        if (!monthlyHarvestForGH[month]) monthlyHarvestForGH[month] = {};
                        monthlyHarvestForGH[month].yield = value;
                        monthlyHarvestForGH[month].unit = getDisplayUnit(cropType);
                        monthlyHarvestForGH[month].crop = cropType;
                    }
                });
                
                const avgWeekly = card.querySelector('.avg-weekly-yield')?.value;
                const avgMonthly = card.querySelector('.avg-monthly-yield')?.value;
                const harvestMonthsCount = card.querySelector('.harvest-months')?.value;
                
                if (avgWeekly) monthlyHarvestForGH.avgWeeklyYield = parseFloat(avgWeekly);
                if (avgMonthly) monthlyHarvestForGH.avgMonthlyYield = parseFloat(avgMonthly);
                if (harvestMonthsCount) monthlyHarvestForGH.harvestMonthsCount = parseFloat(harvestMonthsCount);
                
                window.monthlyHarvestData[id] = monthlyHarvestForGH;
                
                greenhouses.push({
                    area: card.querySelector('.gh-area').value,
                    cropType: cropType,
                    variety: card.querySelector('.gh-variety').value,
                    cropStage: card.querySelector('.gh-stage').value,
                    transplantDate: card.querySelector('.gh-transplant').value,
                    substrateType: card.querySelector('.gh-substrate').value,
                    tomatoType: card.querySelector('.gh-tomatotype')?.value || '',
                    monthlyHarvest: monthlyHarvestForGH
                });
            }
            
            const payload = {
                growerName: growerName,
                locality: document.getElementById('locality').value,
                zone: currentZone,
                totalGreenhouseArea: document.getElementById('totalArea').value,
                greenhouses: greenhouses,
                submittedAt: new Date().toISOString()
            };
            
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
            btn.disabled = true;
            
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                showToast('✓ Data submitted successfully!');
                
                document.getElementById('growerName').value = '';
                document.getElementById('locality').value = '';
                document.getElementById('totalArea').value = '';
                while (document.querySelectorAll('.greenhouse-card').length > 1) {
                    document.querySelector('.greenhouse-card:last-child').remove();
                }
                const firstGH = document.querySelector('.greenhouse-card');
                if (firstGH) {
                    firstGH.querySelectorAll('input, select').forEach(f => { if (f.type !== 'button') f.value = ''; });
                }
                window.monthlyHarvestData = {};
                document.querySelectorAll('.harvest-table-container').forEach(s => s.remove());
                updateStats();
                
            } catch (err) { 
                showToast('Error: ' + err.message, true); 
            } finally { 
                btn.innerHTML = originalText; 
                btn.disabled = false; 
            }
        };
        
        // ==================== GROWER NAME TRACKING ====================
        document.getElementById('growerName').addEventListener('input', function() {
            if (this.value.trim()) activeGrowersSet.add(this.value.trim());
            updateStats();
        });
        
        // ==================== INITIALIZATION ====================
        function init() {
            initZoneButtons();
            updateLocalitiesByZone('E2');
            window.addGreenhouse();
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
