<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hydroponic Data Tracker - Smart Data Capture Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .modern-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .icon-badge {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .title-section h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .beta-badge {
            background: #FF9800;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon { font-size: 28px; margin-bottom: 10px; }
        .stat-label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #2c3e50; }

        .form-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .smart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .input-group {
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .input-group label i {
            margin-right: 6px;
            color: #4CAF50;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .zone-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .zone-btn {
            padding: 10px 24px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .zone-btn:hover {
            border-color: #4CAF50;
            background: #f0f9f0;
        }

        .zone-btn.active {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border-color: #4CAF50;
        }

        .greenhouse-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .greenhouse-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .greenhouse-badge {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .smart-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .smart-btn-primary { background: #4CAF50; color: white; }
        .smart-btn-secondary { background: #FF9800; color: white; }
        .smart-btn-danger { background: #f44336; color: white; }

        .btn-submit {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid #4CAF50; }
        .toast.error { border-left: 4px solid #f44336; }

        @media (max-width: 768px) {
            .card-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="modern-header">
            <div class="title-section">
                <div class="icon-badge"><i class="fas fa-leaf"></i></div>
                <h1>Hydroponic Data Tracker</h1>
                <span class="beta-badge">BETA 1.0</span>
            </div>
            <div class="subtitle"><i class="fas fa-microchip"></i> Smart Data Capture Tool</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🌱</div><div class="stat-label">Greenhouses</div><div class="stat-value" id="totalGH">0</div></div>
            <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-label">Total Area (m²)</div><div class="stat-value" id="totalAreaStat">0</div></div>
            <div class="stat-card"><div class="stat-icon">🌾</div><div class="stat-label">Crop Varieties</div><div class="stat-value" id="totalVarieties">0</div></div>
            <div class="stat-card"><div class="stat-icon">👨‍🌾</div><div class="stat-label">Active Growers</div><div class="stat-value" id="growerCount">0</div></div>
        </div>

        <!-- Zone Selection -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-map-marker-alt"></i><span>Select Zone</span></div>
            <div class="zone-buttons" id="zoneButtons">
                <button class="zone-btn" data-zone="E1">📍 Zone E1</button>
                <button class="zone-btn" data-zone="E2">📍 Zone E2</button>
                <button class="zone-btn" data-zone="E3">📍 Zone E3</button>
                <button class="zone-btn" data-zone="E4">📍 Zone E4</button>
            </div>
        </div>

        <!-- Grower Information -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-user-friends"></i><span>Grower Information</span></div>
            <div class="smart-grid">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Grower Name *</label>
                    <input type="text" id="growerName" placeholder="Enter grower name" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Locality</label>
                    <input type="text" id="locality" list="localityList" placeholder="Select locality">
                    <datalist id="localityList"></datalist>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-layer-group"></i> Zone</label>
                    <input type="text" id="zoneDisplay" readonly placeholder="Selected zone">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-chart-line"></i> Total Area (m²)</label>
                    <input type="number" id="totalArea" step="0.01" placeholder="Total greenhouse area">
                </div>
            </div>
        </div>

        <!-- Greenhouses Container -->
        <div class="form-section">
            <div class="section-title">
                <i class="fas fa-greenhouse"></i><span>Greenhouse Details</span>
                <button class="smart-btn smart-btn-primary" onclick="addGreenhouse()" style="margin-left: auto;"><i class="fas fa-plus"></i> Add Greenhouse</button>
            </div>
            <div id="greenhousesContainer"></div>
        </div>

        <button class="btn-submit" onclick="submitData()"><i class="fas fa-cloud-upload-alt"></i> Submit Data</button>

        <div class="footer"><i class="fas fa-leaf"></i> Hydroponic Data Tracker - All Rights Reserved 2026 | Smart Data Capture Tool v2.0</div>
    </div>

    <div id="toast" class="toast"><i class="fas fa-check-circle" style="color: #4CAF50;"></i><span id="toastMessage"></span></div>

    <script>
        // ==================== LOCALITIES DATA FROM EXCEL ====================
        
        const zoneE1Localities = [
            "Alma", "Bagatelle Dam", "Bar Le Duc", "Beau Bois", "Bell Village", "Belle Rive",
            "Bonne Veine", "Camp Auguste", "Circonstance", "Cote D'Or", "Dagotiere", "Gentilly",
            "Guibies", "Helvetia", "Hermitage", "L'Agrement", "L'Assurance", "L'Avenir", "L'Escalier Br Rd",
            "L'Esperance", "La Laura", "Le Pouce", "Malinga", "Minissy", "Moka", "Nouvelle Decouverte",
            "Petit Verger", "Providence", "Quartier Militaire", "Reduit", "Ripailles", "Riviere Baptiste",
            "Roselyn Cottage", "Soreze", "St Pierre", "Valetta", "Verdun"
        ];
        
        const zoneE2Localities = [
            "Balance John", "Bel Etang", "Belvédère", "Bon Accueil", "Bonne Mere", "Brisée Verdière",
            "Camp de Masque", "Camp Thorel", "Fuel", "Gaulettes Serrées", "Gibraltar", "Grand Bas Fond",
            "Lallmatie", "Latapie", "L'Unité", "Médine Camp de Masque", "Melrose", "Mission Cross Rd",
            "Mont Ida", "Montagne Blanche", "Pellegrin", "Petit Paquet", "Pont Bon Dieu", "Providence",
            "Quatre Bords", "Queen Victoria", "Riche Fond", "Salazie", "Salazie Rd", "Sans Soucis",
            "St Julien d'Hotman", "St Julien Village"
        ];
        
        const zoneE3Localities = [
            "Argy", "Beau Rivage", "Belle Mare", "Belle Vue Allendy", "Bois d'Oiseaux", "Bramsthan",
            "Bras d'Eau", "Camp Garreau", "Camp Ithier", "Camp Marcelin", "Camp Poorun", "Camp Raffia",
            "Centre de Flacq", "Constance", "Grande Retraite", "Hermitage", "Isidore Rose", "Kashinath",
            "La Porte Providence", "Laventure", "Mare Choisy", "Mare du Puits", "Mare la Chaux", "Mare Providence",
            "Mare Tapsy", "Morc Constance", "Nehru Nagar", "Palmar", "Petite Retraite", "Plaine de Gersigny",
            "Pont Blanc", "Poste de Flacq", "Quatre Cocos", "Riche Mare", "Sept Croisées", "St Rémy",
            "Trou d'Eau Douce", "Victoria"
        ];
        
        const zoneE4Localities = [
            "Balance John", "Beau Champ", "Beau Vallon", "Bel Air Rivière Sèche", "Belle Rive", "Belle Rose",
            "Bois Marchand", "Camp Beau Bois", "Camp de Masque Pavé", "Camp Jackerie", "Caroline", "Cent Gaulettes",
            "Clavet", "Clémencia", "Deep River", "Deux Frères", "Ecroignard", "Ernest Florent", "Grand River South East",
            "Ilot", "Kewal Nagar", "La Laura", "La Lucie Roy", "La Nourrice", "Laventure", "Lesur", "L'Etoile",
            "Mare aux Goyaves", "Mare Carrée", "Mare Triton", "Marie Jeanne", "Morc Roy", "Morc Sohawon", "Olivia",
            "Pellegrin", "Petit Bois", "Petite Cabane", "Plaine Bananes", "Pointe aux Feuilles", "Pont Lardier",
            "Quatre Soeurs", "Sebastopol", "Trois Ilots"
        ];
        
        // ========== CROP CULTIVATED OPTIONS ==========
        const cropOptions = [
            "Cabbage", "Cauliflower", "English Cucumber", "Lettuce", "Melon", 
            "Sweet Pepper", "Shallot", "Greens", "Tomato", "Okra", "Chillies", "Eggplant"
        ];
        
        // ========== TOMATO TYPE OPTIONS ==========
        const tomatoTypeOptions = [
            "Cooking", "Salad", "Cherry"
        ];
        
        // Substrate Type options
        const substrateOptions = [
            "Cocopeat", "Aggregates", "Woodchips", "NFT", "DFT", "Aquaponics"
        ];
        
        // Crop Stage options
        const cropStageOptions = [
            "Seedling", "Vegetative", "Flowering", "Fruiting", "Harvesting"
        ];
        
        let currentZone = "E2";
        let greenhouseCount = 1;
        let activeGrowers = new Set();
        
        // Update locality list based on zone
        function updateLocalitiesByZone(zone) {
            const localityList = document.getElementById('localityList');
            let localities = [];
            switch(zone) {
                case 'E1': localities = zoneE1Localities; break;
                case 'E2': localities = zoneE2Localities; break;
                case 'E3': localities = zoneE3Localities; break;
                case 'E4': localities = zoneE4Localities; break;
                default: localities = zoneE2Localities;
            }
            
            localityList.innerHTML = '';
            localities.forEach(loc => {
                const option = document.createElement('option');
                option.value = loc;
                localityList.appendChild(option);
            });
            
            document.getElementById('zoneDisplay').value = `Zone ${zone}`;
        }
        
        // Zone selection handler
        function initZoneButtons() {
            const buttons = document.querySelectorAll('.zone-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentZone = btn.dataset.zone;
                    updateLocalitiesByZone(currentZone);
                    showToast(`Zone ${currentZone} selected`, false);
                });
            });
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = `toast show ${isError ? 'error' : 'success'}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function updateStats() {
            const sections = document.querySelectorAll('.greenhouse-card');
            document.getElementById('totalGH').textContent = sections.length;
            let totalArea = 0;
            sections.forEach(s => totalArea += parseFloat(s.querySelector('.gh-area')?.value) || 0);
            document.getElementById('totalAreaStat').textContent = totalArea.toFixed(2);
            const varieties = new Set();
            sections.forEach(s => { const v = s.querySelector('.gh-variety')?.value; if(v) varieties.add(v); });
            document.getElementById('totalVarieties').textContent = varieties.size;
            
            const growerName = document.getElementById('growerName').value;
            if (growerName) activeGrowers.add(growerName);
            document.getElementById('growerCount').textContent = activeGrowers.size;
        }
        
        // Generate crop options HTML
        function getCropOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Crop</option>';
            cropOptions.forEach(crop => {
                let icon = '';
                if (crop === 'Tomato') icon = '🍅 ';
                else if (crop === 'Eggplant') icon = '🍆 ';
                else if (crop === 'Cabbage') icon = '🥬 ';
                else if (crop === 'Cauliflower') icon = '🥦 ';
                else if (crop === 'Lettuce') icon = '🥗 ';
                else if (crop === 'Sweet Pepper') icon = '🫑 ';
                else if (crop === 'Chillies') icon = '🌶️ ';
                else if (crop === 'Melon') icon = '🍈 ';
                else if (crop === 'Okra') icon = '🌿 ';
                html += `<option value="${crop}" ${selectedValue === crop ? 'selected' : ''}>${icon}${crop}</option>`;
            });
            return html;
        }
        
        // Generate tomato type options HTML
        function getTomatoTypeOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Tomato Type</option>';
            tomatoTypeOptions.forEach(type => {
                let icon = '';
                if (type === 'Cooking') icon = '🍳 ';
                else if (type === 'Salad') icon = '🥗 ';
                else if (type === 'Cherry') icon = '🍒 ';
                html += `<option value="${type}" ${selectedValue === type ? 'selected' : ''}>${icon}${type}</option>`;
            });
            return html;
        }
        
        // Generate substrate type options HTML
        function getSubstrateOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Substrate</option>';
            substrateOptions.forEach(substrate => {
                let icon = '';
                if (substrate === 'Cocopeat') icon = '🥥 ';
                else if (substrate === 'Aggregates') icon = '🪨 ';
                else if (substrate === 'Woodchips') icon = '🪵 ';
                else if (substrate === 'NFT') icon = '💧 ';
                else if (substrate === 'DFT') icon = '🌊 ';
                else if (substrate === 'Aquaponics') icon = '🐟 ';
                html += `<option value="${substrate}" ${selectedValue === substrate ? 'selected' : ''}>${icon}${substrate}</option>`;
            });
            return html;
        }
        
        // Generate crop stage options HTML
        function getCropStageOptionsHTML(selectedValue = '') {
            let html = '<option value="">Select Stage</option>';
            cropStageOptions.forEach(stage => {
                let icon = '';
                if (stage === 'Seedling') icon = '🌱 ';
                else if (stage === 'Vegetative') icon = '🌿 ';
                else if (stage === 'Flowering') icon = '🌸 ';
                else if (stage === 'Fruiting') icon = '🍎 ';
                else if (stage === 'Harvesting') icon = '✂️ ';
                html += `<option value="${stage}" ${selectedValue === stage ? 'selected' : ''}>${icon}${stage}</option>`;
            });
            return html;
        }
        
        // Toggle Harvest fields (Yield fields) based on crop stage
        function toggleHarvestFields(selectElement) {
            const greenhouseCard = selectElement.closest('.greenhouse-card');
            const harvestFieldsGroup = greenhouseCard.querySelector('.harvest-fields-group');
            
            if (harvestFieldsGroup) {
                if (selectElement.value === 'Harvesting') {
                    harvestFieldsGroup.style.display = 'block';
                } else {
                    harvestFieldsGroup.style.display = 'none';
                    // Clear harvest field values when hidden
                    const weeklyInput = harvestFieldsGroup.querySelector('.gh-weekly');
                    const monthlyInput = harvestFieldsGroup.querySelector('.gh-monthly');
                    const harvestMonthsInput = harvestFieldsGroup.querySelector('.gh-harvest');
                    if (weeklyInput) weeklyInput.value = '';
                    if (monthlyInput) monthlyInput.value = '';
                    if (harvestMonthsInput) harvestMonthsInput.value = '';
                }
            }
        }
        
        // Toggle Tomato Type field visibility based on crop selection
        function toggleTomatoType(selectElement) {
            const greenhouseCard = selectElement.closest('.greenhouse-card');
            const tomatoTypeGroup = greenhouseCard.querySelector('.tomato-type-group');
            const tomatoSelect = tomatoTypeGroup?.querySelector('.gh-tomatotype');
            
            if (tomatoTypeGroup) {
                if (selectElement.value === 'Tomato') {
                    tomatoTypeGroup.style.display = 'block';
                } else {
                    tomatoTypeGroup.style.display = 'none';
                    if (tomatoSelect) tomatoSelect.value = '';
                }
            }
        }
        
        // Add greenhouse
        function addGreenhouse(data = null) {
            const container = document.getElementById('greenhousesContainer');
            const card = document.createElement('div');
            card.className = 'greenhouse-card';
            card.id = `greenhouse-${greenhouseCount}`;
            
            const showTomatoType = data?.cropType === 'Tomato';
            const showHarvestFields = data?.cropStage === 'Harvesting';
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="greenhouse-badge"><i class="fas fa-seedling"></i> Greenhouse ${greenhouseCount}</div>
                    <div class="card-actions">
                        <button class="smart-btn smart-btn-secondary" onclick="duplicateGreenhouse(${greenhouseCount})"><i class="fas fa-copy"></i> Duplicate</button>
                        <button class="smart-btn smart-btn-danger" onclick="removeGreenhouse(${greenhouseCount})"><i class="fas fa-trash"></i> Remove</button>
                    </div>
                </div>
                <div class="smart-grid">
                    <div class="input-group">
                        <label><i class="fas fa-chart-pie"></i> Area (m²)</label>
                        <input type="number" class="gh-area" step="0.01" value="${data?.area || ''}" oninput="updateStats()">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-seedling"></i> Crop Cultivated</label>
                        <select class="gh-crop" onchange="toggleTomatoType(this)">
                            ${getCropOptionsHTML(data?.cropType || '')}
                        </select>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-tag"></i> Variety</label>
                        <input type="text" class="gh-variety" value="${data?.variety || ''}" placeholder="Enter variety" oninput="updateStats()">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-chart-simple"></i> Crop Stage</label>
                        <select class="gh-stage" onchange="toggleHarvestFields(this)">
                            ${getCropStageOptionsHTML(data?.cropStage || '')}
                        </select>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-calendar-alt"></i> Date Transplanted</label>
                        <input type="date" class="gh-transplant" value="${data?.transplantDate || ''}">
                    </div>
                    
                    <!-- HARVEST FIELDS - Only visible when Crop Stage = Harvesting -->
                    <div class="harvest-fields-group" style="grid-column: span 2; display: ${showHarvestFields ? 'block' : 'none'};">
                        <div style="background: #FFF8E1; padding: 15px; border-radius: 10px; margin-top: 5px;">
                            <label style="margin-bottom: 10px; display: block; font-weight: 700; color: #E65100;">
                                <i class="fas fa-chart-line"></i> 📊 HARVEST INFORMATION
                            </label>
                            <div class="smart-grid">
                                <div class="input-group">
                                    <label><i class="fas fa-chart-line"></i> Avg Yield/Week (kg)</label>
                                    <input type="number" class="gh-weekly" step="0.01" value="${data?.avgYieldWeek || ''}" placeholder="Weekly yield">
                                </div>
                                <div class="input-group">
                                    <label><i class="fas fa-chart-bar"></i> Avg Yield/Month (kg)</label>
                                    <input type="number" class="gh-monthly" step="0.01" value="${data?.avgYieldMonth || ''}" placeholder="Monthly yield">
                                </div>
                                <div class="input-group">
                                    <label><i class="fas fa-clock"></i> Number of Months Harvesting</label>
                                    <input type="number" class="gh-harvest" step="1" min="0" max="12" value="${data?.harvestMonths || ''}" placeholder="e.g., 3 months">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-water"></i> Substrate Type</label>
                        <select class="gh-substrate">
                            ${getSubstrateOptionsHTML(data?.substrateType || '')}
                        </select>
                    </div>
                    <div class="input-group tomato-type-group" style="display: ${showTomatoType ? 'block' : 'none'};">
                        <label><i class="fas fa-tomato"></i> Tomato Type</label>
                        <select class="gh-tomatotype">
                            ${getTomatoTypeOptionsHTML(data?.tomatoType || '')}
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(card);
            greenhouseCount++;
            updateStats();
        }
        
        function removeGreenhouse(id) {
            const el = document.getElementById(`greenhouse-${id}`);
            if(el) el.remove();
            updateStats();
            showToast('Greenhouse removed');
        }
        
        function duplicateGreenhouse(id) {
            const source = document.getElementById(`greenhouse-${id}`);
            if(source) {
                const tomatoSelect = source.querySelector('.gh-tomatotype');
                const data = {
                    area: source.querySelector('.gh-area').value,
                    cropType: source.querySelector('.gh-crop').value,
                    variety: source.querySelector('.gh-variety').value,
                    cropStage: source.querySelector('.gh-stage').value,
                    transplantDate: source.querySelector('.gh-transplant').value,
                    avgYieldWeek: source.querySelector('.gh-weekly')?.value || '',
                    avgYieldMonth: source.querySelector('.gh-monthly')?.value || '',
                    harvestMonths: source.querySelector('.gh-harvest')?.value || '',
                    substrateType: source.querySelector('.gh-substrate').value,
                    tomatoType: tomatoSelect ? tomatoSelect.value : ''
                };
                addGreenhouse(data);
                showToast('Greenhouse duplicated');
            }
        }
        
        // Update grower count when name is entered
        document.getElementById('growerName').addEventListener('input', function() {
            if (this.value.trim()) {
                activeGrowers.add(this.value.trim());
            } else {
                activeGrowers.delete(this.value);
            }
            document.getElementById('growerCount').textContent = activeGrowers.size;
        });
        
        async function submitData() {
            const growerName = document.getElementById('growerName').value.trim();
            if(!growerName) { showToast('Enter grower name', true); return; }
            
            const greenhouses = [];
            document.querySelectorAll('.greenhouse-card').forEach(card => {
                const tomatoSelect = card.querySelector('.gh-tomatotype');
                const weeklyInput = card.querySelector('.gh-weekly');
                const monthlyInput = card.querySelector('.gh-monthly');
                const harvestInput = card.querySelector('.gh-harvest');
                
                greenhouses.push({
                    greenhouse: greenhouses.length + 1,
                    area: card.querySelector('.gh-area').value,
                    cropType: card.querySelector('.gh-crop').value,
                    variety: card.querySelector('.gh-variety').value,
                    cropStage: card.querySelector('.gh-stage').value,
                    transplantDate: card.querySelector('.gh-transplant').value,
                    avgYieldWeek: weeklyInput ? weeklyInput.value : '',
                    avgYieldMonth: monthlyInput ? monthlyInput.value : '',
                    harvestMonths: harvestInput ? harvestInput.value : '',
                    substrateType: card.querySelector('.gh-substrate').value,
                    tomatoType: tomatoSelect ? tomatoSelect.value : ''
                });
            });
            
            const data = {
                growerName: growerName,
                locality: document.getElementById('locality').value,
                zone: currentZone,
                totalGreenhouseArea: document.getElementById('totalArea').value,
                greenhouses: greenhouses
            };
            
            const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw_Rw7YeDHQj2KOHaq5867OT_hvc5tOjgx435X8swEj6QsxeIijEL6RthwNTjQzpRheVw/exec';
            const btn = document.querySelector('.btn-submit');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
            btn.disabled = true;
            
            try {
                await fetch(WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showToast('✓ Data submitted successfully!');
                document.getElementById('growerName').value = '';
                document.getElementById('locality').value = '';
                document.getElementById('totalArea').value = '';
                while(document.querySelectorAll('.greenhouse-card').length > 1) document.querySelector('.greenhouse-card:last-child').remove();
                const firstGH = document.querySelector('.greenhouse-card');
                if(firstGH) firstGH.querySelectorAll('input, select').forEach(f => { if(f.type !== 'button') f.value = ''; });
                updateStats();
            } catch(err) { showToast('Error: ' + err.message, true); }
            finally { btn.innerHTML = originalText; btn.disabled = false; }
        }
        
        // Initialize
        initZoneButtons();
        updateLocalitiesByZone('E2');
        addGreenhouse();
    </script>
</body>
</html>
