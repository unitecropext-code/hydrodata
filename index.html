<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Hydroponic Data Tracker — Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #1b4d1f, #0e3a12);
            min-height: 100vh;
            padding: 16px 12px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 15px 30px -8px rgba(0,0,0,0.2);
            border: 1px solid #cfebc7;
        }
        /* Login modal */
        .login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
        }
        .login-card {
            background: white;
            max-width: 420px;
            width: 90%;
            border-radius: 32px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .login-header { font-size: 1.8rem; font-weight: 800; background: linear-gradient(130deg, #136b1e, #259132); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { font-weight: 600; display: block; margin-bottom: 6px; color: #1c5a1c; }
        .input-group input { width: 100%; padding: 12px 14px; border: 2px solid #deecce; border-radius: 40px; font-size: 0.9rem; }
        .login-btn { background: linear-gradient(95deg, #1f682a, #156f1a); border: none; color: white; width: 100%; padding: 12px; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .login-error { color: #d9534f; margin-top: 12px; font-size: 0.85rem; }
        .logout-btn { background: #f0f3ef; border: 1px solid #c0dfb0; padding: 6px 16px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-left: 12px; }
        .welcome-banner { background: linear-gradient(110deg, #e9f7e3, #d4ebcd); border-radius: 28px; padding: 20px 24px; margin-bottom: 20px; text-align: center; font-size: 1.8rem; font-weight: 800; color: #1c5a1c; border-left: 8px solid #2e8b57; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .welcome-banner i { margin-right: 12px; color: #2e8b57; }

        .zone-btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 8px 0 4px; }
        .zone-pill { background: #ecf7e6; border: none; padding: 10px 18px; border-radius: 50px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: #1a551a; display: inline-flex; align-items: center; gap: 6px; }
        .zone-pill.active { background: linear-gradient(110deg, #236b2a, #198a2e); color: white; box-shadow: 0 5px 12px rgba(0,0,0,0.15); transform: scale(1.02); }
        .zone-active-status { text-align: center; font-size: 0.75rem; font-weight: 600; background: #e0f2d9; display: inline-block; width: auto; margin: 10px auto 0; padding: 5px 14px; border-radius: 40px; color: #155d1f; }
        .grid-2col { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 640px) { .grid-2col { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        .input-field { margin-bottom: 4px; }
        .input-field label { font-weight: 600; font-size: 0.75rem; color: #235b1e; display: block; margin-bottom: 5px; }
        .input-field input, .input-field select { width: 100%; padding: 10px 12px; border: 2px solid #deecce; border-radius: 20px; font-size: 0.85rem; background: #ffffff; }
        .btn-lg { background: linear-gradient(95deg, #1f682a, #156f1a); border: none; color: white; font-weight: 700; padding: 12px 20px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 10px; justify-content: center; width: 100%; }
        .btn-secondary { background: #e9ecef; color: #1f5a22; border: none; padding: 10px 16px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; width: 100%; }
        .greenhouse-active-card { background: #ffffff; border-radius: 24px; padding: 16px; border: 2px solid #2e8b57; box-shadow: 0 6px 14px rgba(0,0,0,0.05); margin-bottom: 18px; }
        .saved-item { background: #f8faf5; border-radius: 18px; padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 0.8rem; }
        
        /* === REFINED HARVEST SECTION === */
        .harvest-card {
            background: #ffffff;
            border-radius: 24px;
            margin-top: 24px;
            padding: 20px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid #d4e8ca;
            transition: all 0.2s ease;
        }
        .harvest-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #1c5a1c;

        }
        .harvest-stats-row {

            flex-wrap: wrap;

            margin-bottom: 28px;
        }
        .harvest-stat-card {
            flex: 1;
            min-width: 220px;
            background: #f9fef7;
            border-radius: 20px;

        .harvest-stat-label {
            font-size: 0.8rem;

            align-items: center;

            margin-bottom: 12px;

        .weekly-input-wrapper {

        .weekly-input-wrapper input {
            flex: 2;
            padding: 12px 12px;
            border-radius: 30px;
            border: 1.5px solid #cae0bc;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            background: white;
        }
        .unit-group {
            display: flex;
            gap: 12px;
            background: #ecf3e8;
            padding: 4px 10px;
            border-radius: 50px;
        }
        .unit-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;

            transition: 0.1s;
        }
        .unit-group input[type="radio"] { margin: 0; accent-color: #2e8b57; }
        .unit-group label:has(input:checked) {
            background: #2e8b57;
            color: white;
        }
        .harvest-months-input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1.5px solid #cae0bc;
            font-size: 1rem;

        }
        .month-grid-title {
            font-weight: 600;
            margin: 20px 0 12px 0;
            display: flex;
            align-items: center;

            color: #1f6522;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 640px) { .month-grid { grid-template-columns: repeat(4, 1fr); } }
        .month-card {
            background: #ffffff;
            border-radius: 20px;

            margin-bottom: 8px;

            width: 100%;
            padding: 10px 4px;

            border: 1px solid #c0dfb0;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            background: #fffef7;
        }
        .toast-msg { position: fixed; bottom: 20px; left: 16px; right: 16px; max-width: 350px; margin: 0 auto; background: #1f3120; color: white; padding: 10px 16px; border-radius: 50px; z-index: 1100; transform: translateY(100px); transition: transform 0.25s; backdrop-filter: blur(8px); font-size: 0.85rem; text-align: center; }

        .footer-note { text-align: center; font-size: 10px; color: #cbe5c0; margin-top: 10px; }

        @media (max-width: 480px) { .welcome-banner { font-size: 1.2rem; padding: 14px 16px; } .harvest-stat-card { min-width: 100%; } }
    </style>
</head>
<body>

<!-- LOGIN MODAL -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <div class="login-header"><i class="fas fa-leaf"></i> Hydroponic Data Tracker</div>

        <div class="input-group"><label>🔒 Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
        <button id="loginButton" class="login-btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        <div id="loginErrorMessage" class="login-error"></div>

</div>

<!-- MAIN APPLICATION -->
<div id="mainApp" style="display: none;">
<div class="container">
    <div id="welcomeBanner" class="welcome-banner"><i class="fas fa-hand-peace"></i> Welcome, <span id="welcomeUsername">User</span>!</div>
    <div class="glass-card">
        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="background: #1f5a22; width: 44px; height: 44px; border-radius: 20px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-leaf" style="font-size: 24px; color: white;"></i></div>
                <div><h1 style="font-size: 1.4rem; font-weight: 800; background: linear-gradient(130deg, #136b1e, #259132); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hydroponic Data Tracker</h1><p style="font-size: 0.7rem;"><i class="fas fa-chart-simple"></i> GREEN EDITION | Harvest Pro <span class="realtime-tag"><i class="fas fa-chart-line"></i> Real Time Insights</span></p></div>
            </div>
            <div><button id="logoutButton" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </div>
    </div>

    <!-- Zone Selection -->
    <div class="glass-card">
        <div class="section-title"><i class="fas fa-map-marked-alt"></i> Select Growing Zone</div>
        <div class="zone-btn-group" id="zoneButtonsGroup">
            <button class="zone-pill" data-zone="E1">Zone E1</button>
            <button class="zone-pill" data-zone="E2">Zone E2</button>
            <button class="zone-pill" data-zone="E3">Zone E3</button>
            <button class="zone-pill" data-zone="E4">Zone E4</button>
        </div>
        <div id="zoneActiveDisplay" class="zone-active-status"><i class="fas fa-map-pin"></i> Zone Active: E2</div>
    </div>

    <!-- Grower Profile -->
    <div class="glass-card">
        <div class="section-title"><i class="fas fa-user-check"></i> Grower Profile</div>
        <div class="grid-2col">
            <div class="input-field"><label><i class="fas fa-user-circle"></i> Grower Name *</label><input type="text" id="growerNameInput" placeholder="e.g. Your Name"></div>
            <div class="input-field"><label><i class="fas fa-location-dot"></i> Locality (zone based)</label><select id="localitySelect"><option value="">-- Select Locality --</option></select></div>
            <div class="input-field"><label><i class="fas fa-expand-alt"></i> Total Greenhouse Area (m²)</label><input type="number" id="totalAreaMain" step="0.01" placeholder="Total area (all greenhouses)"></div>
        </div>
        <button id="accessTrackerBtn" class="btn-lg" style="margin-top: 12px;"><i class="fas fa-charging-station"></i> Access Greenhouse Tracker</button>
    </div>

    <!-- Greenhouse Details -->
    <div id="greenhouseDashboard" class="hidden-section">
        <div class="glass-card">
            <div class="section-title"><i class="fas fa-greenhouse"></i> Greenhouse Details</div>
            <div id="activeGreenhouseContainer" class="greenhouse-active-card"></div>
            <button id="addGreenhouseBtn" class="btn-secondary" style="margin-bottom: 18px;"><i class="fas fa-save"></i> + Add Greenhouse (save current & start new)</button>
            <div id="savedGreenhousesList" style="margin-top: 6px;"></div>
            <button id="finalSubmitDataBtn" class="btn-lg" style="margin-top: 20px; background: #1f672a;"><i class="fas fa-cloud-upload-alt"></i> Submit Data</button>
            <div id="insightsContainer" class="insights-panel" style="display: none; margin-top: 18px;"><div id="insightContent"></div></div>
        </div>
    </div>
    <div class="footer-note"><i class="fas fa-leaf"></i> Hydroponic Data Tracker – All Rights Reserved 2026</div>
</div>
</div>

<div id="globalToast" class="toast-msg"><i class="fas fa-check-circle"></i> <span id="toastText"></span></div>

<script>
    // ======================== CONFIGURATION ========================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyli0MrssqM-FpWc0QuTHWVpUEUat4hxeR5aQgpzcoenHi-WmkjkF4hSw22cWwC-3_3MA/exec';  // ⚠️ REPLACE WITH YOUR URL

    // ======================== GLOBAL STATE ========================
    let isLoggedIn = false;
    let currentZone = "E2";
    let currentGreenhouseIndex = 1;
    let savedGreenhouses = [];

    // DOM elements
    const loginOverlay = document.getElementById('loginOverlay');
    const mainApp = document.getElementById('mainApp');
    const loginBtn = document.getElementById('loginButton');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginErrorMessage');
    const logoutButton = document.getElementById('logoutButton');
    const welcomeUsernameSpan = document.getElementById('welcomeUsername');
    const growerNameInput = document.getElementById('growerNameInput');
    const zoneBtns = document.querySelectorAll('.zone-pill');
    const localitySelect = document.getElementById('localitySelect');
    const zoneActiveSpan = document.getElementById('zoneActiveDisplay');
    const accessBtn = document.getElementById('accessTrackerBtn');
    const greenhouseDashboard = document.getElementById('greenhouseDashboard');
    const activeContainer = document.getElementById('activeGreenhouseContainer');
    const addBtn = document.getElementById('addGreenhouseBtn');
    const submitBtn = document.getElementById('finalSubmitDataBtn');
    const totalAreaMain = document.getElementById('totalAreaMain');
    const insightsContainer = document.getElementById('insightsContainer');
    const insightContent = document.getElementById('insightContent');
    const savedListDiv = document.getElementById('savedGreenhousesList');

    // Helper functions
    function showToast(msg, isError = false) {
        const toast = document.getElementById('globalToast');
        document.getElementById('toastText').innerText = msg;
        toast.classList.add('show');
        toast.style.background = isError ? "#aa2e2e" : "#1c5c22";
        setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // ----------------------- MAURITIAN TIMESTAMP -----------------------
    function getMauritiusTimestamp() {
        const now = new Date();
        // Convert to Mauritius time (Indian/Mauritius, UTC+4)
        const formatter = new Intl.DateTimeFormat('fr-CA', {
            timeZone: 'Indian/Mauritius',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const parts = formatter.formatToParts(now);
        const dateTimeObj = {};
        parts.forEach(p => { if (p.type !== 'literal') dateTimeObj[p.type] = p.value; });
        return `${dateTimeObj.year}-${dateTimeObj.month}-${dateTimeObj.day} ${dateTimeObj.hour}:${dateTimeObj.minute}:${dateTimeObj.second}`;
    }

    // ----------------------- LOGIN LOGIC -----------------------
    async function performLogin(username, password) {
        if (!username || !password) { loginError.innerText = "❌ Please enter both username and password."; return false; }
        loginError.innerText = "";
        try {
            const url = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
            const response = await fetch(url, { method: 'GET', mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success === true) {
                isLoggedIn = true;
                growerNameInput.value = username;
                welcomeUsernameSpan.innerText = username;
                loginOverlay.style.display = 'none';
                mainApp.style.display = 'block';
                showToast(`✅ Welcome ${username}!`);
                return true;
            } else {
                loginError.innerText = "❌ Invalid username or password. Please try again.";
                return false;
            }
        } catch (err) {
            console.error(err);
            loginError.innerText = "⚠️ Network error: Could not reach server. Check your internet connection and Apps Script deployment.";
            return false;
        }
    }
    loginBtn.onclick = () => performLogin(loginUsername.value.trim(), loginPassword.value);
    loginPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(loginUsername.value.trim(), loginPassword.value); });
    loginUsername.addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(loginUsername.value.trim(), loginPassword.value); });

    logoutButton.onclick = () => {
        isLoggedIn = false;
        mainApp.style.display = 'none';
        loginOverlay.style.display = 'flex';
        loginUsername.value = ''; loginPassword.value = ''; loginError.innerText = '';
        savedGreenhouses = []; currentGreenhouseIndex = 1;
        greenhouseDashboard.classList.add('hidden-section');
        updateSavedListDisplay();
        growerNameInput.value = '';
        welcomeUsernameSpan.innerText = 'User';
        showToast("Logged out successfully.");
    };

    // ======================== CROP & HARVEST HELPERS ========================
    const cropIconMap = { "Tomato": "🍅", "Sweet Pepper": "🫑", "English Cucumber": "🥒", "Lettuce": "🥬", "Cabbage": "🥬", "Cauliflower": "🥦", "Melon": "🍈", "Shallot": "🧅", "Greens": "🌿", "Okra": "🌱", "Chillies": "🌶️", "Eggplant": "🍆" };
    const weightBasedCrops = ["Tomato", "Sweet Pepper", "Melon", "Shallot", "Greens", "Okra", "Chillies", "Eggplant"];
    const unitBasedCrops = ["English Cucumber", "Cabbage", "Cauliflower", "Lettuce"];
    const localityMap = { E1:["Alma","Bagatelle Dam","Bar Le Duc","Beau Bois","Bell Village","Belle Rive","Bonne Veine","Camp Auguste","Circonstance","Cote D'Or","Dagotiere","Gentilly","Guibies","Helvetia","Hermitage","L'Agrement","L'Assurance","L'Avenir","L'Escalier Br Rd","L'Esperance","La Laura","Le Pouce","Malinga","Minissy","Moka","Nouvelle Decouverte","Petit Verger","Providence","Quartier Militaire","Reduit","Ripailles","Riviere Baptiste","Roselyn Cottage","Soreze","St Pierre","Valetta","Verdun"], E2:["Balance John","Beau Bois","Bel Etang","Belvédère","Bon Accueil","Bonne Mere","Brisée Verdière","Camp de Masque","Camp Thorel","Fuel","Gaulettes Serrées","Gibraltar","Grand Bas Fond","Lallmatie","Latapie","L'Unité","Médine Camp de Masque","Melrose","Mission Cross Rd","Mont Ida","Montagne Blanche","Pellegrin","Petit Paquet","Pont Bon Dieu","Providence","Quatre Bords","Queen Victoria","Riche Fond","Salazie","Salazie Rd","Sans Soucis","St Julien d'Hotman","St Julien Village"], E3:["Argy","Beau Bois","Beau Rivage","Belle Mare","Belle Vue Allendy","Bois d'Oiseaux","Bramsthan","Bras d'Eau","Camp Garreau","Camp Ithier","Camp Marcelin","Camp Poorun","Camp Raffia","Camp Ranoo","Centre de Flacq","Constance","Grande Retraite","Hermitage","Isidore Rose","Kashinath","La Porte Providence","Laventure","Mare Choisy","Mare du Puits","Mare la Chaux","Mare Providence","Mare Tapsy","Morc Constance","Nehru Nagar","Palmar","Petite Retraite","Plaine de Gersigny","Pont Blanc","Poste de Flacq","Quatre Cocos","Riche Mare","Sept Croisées","St Rémy","Trou d'Eau Douce","Victoria"], E4:["Balance John","Beau Champ","Beau Vallon","Bel Air Rivière Sèche","Belle Rive","Belle Rose","Bois Marchand","Camp Beau Bois","Camp de Masque Pavé","Camp Jackerie","Caroline","Cent Gaulettes","Clavet","Clémencia","Deep River","Deux Frères","Ecroignard","Ernest Florent","Grand River South East","Ilot","Kewal Nagar","La Laura","La Lucie Roy","La Nourrice","Laventure","Lesur","L'Etoile","Mare aux Goyaves","Mare Carrée","Mare Triton","Marie Jeanne","Morc Roy","Morc Sohawon","Olivia","Pellegrin","Petit Bois","Petite Cabane","Plaine Bananes","Pointe aux Feuilles","Pont Lardier","Quatre Soeurs","Sebastopol","Trois Ilots"] };
    const cropOptionsList = ["Tomato","Sweet Pepper","English Cucumber","Lettuce","Cabbage","Cauliflower","Melon","Shallot","Greens","Okra","Chillies","Eggplant"];
    const productionSystems = ["Cocopeat","Aggregates","Woodchips","NFT","DFT","Aquaponics"];
    const cropStages = ["Seedling","Vegetative","Flowering","Fruiting","Harvesting"];
    const tomatoTypes = ["Cooking","Salad","Cherry"];
    const monthsList = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function updateLocalityDropdown(zone) { const locs = localityMap[zone] || []; localitySelect.innerHTML = '<option value="">-- Select Locality --</option>'; locs.forEach(l => { const opt = document.createElement('option'); opt.value = l; opt.textContent = l; localitySelect.appendChild(opt); }); localitySelect.value = ""; }
    function setZone(zone) { currentZone = zone; zoneActiveSpan.innerHTML = `<i class="fas fa-map-pin"></i> Zone Active: ${zone}`; updateLocalityDropdown(zone); zoneBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.zone === zone)); showToast(`Zone ${zone} activated`); }

    // ---------- REFINED HARVEST SECTION UI ----------
    function buildHarvestDetailsUI(container, cropType, existingWeeklyValue = 0, existingUnit = "kg", existingMonths = 0) {
        if (!cropType) return;
        const isWeightCrop = weightBasedCrops.includes(cropType);
        const isUnitCrop = unitBasedCrops.includes(cropType);
        let weeklyHtml = '';
        if (isWeightCrop) {
            weeklyHtml = `
                <div class="harvest-stat-card">
                    <div class="harvest-stat-label"><i class="fas fa-chart-line"></i> Average Yield / Week</div>
                    <div class="weekly-input-wrapper">
                        <input type="number" step="0.01" id="weeklyYieldValue" placeholder="e.g., 250" value="${existingWeeklyValue}">
                        <div class="unit-group" id="weeklyUnitGroup">
                            <label><input type="radio" name="weeklyUnit" value="kg" ${existingUnit === 'kg' ? 'checked' : ''}> kg/week</label>
                            <label><input type="radio" name="weeklyUnit" value="crates" ${existingUnit === 'crates' ? 'checked' : ''}> crates/week</label>
                        </div>
                    </div>
                </div>`;
        } else if (isUnitCrop) {
            weeklyHtml = `<div class="harvest-stat-card"><div class="harvest-stat-label"><i class="fas fa-chart-line"></i> Average Yield / Week (units)</div><input type="number" step="0.01" id="weeklyYieldValue" class="harvest-months-input" placeholder="units per week" value="${existingWeeklyValue}"></div>`;
        } else {
            weeklyHtml = `<div class="harvest-stat-card"><div class="harvest-stat-label"><i class="fas fa-chart-line"></i> Average Yield / Week (kg)</div><input type="number" step="0.01" id="weeklyYieldValue" class="harvest-months-input" placeholder="kg/week" value="${existingWeeklyValue}"></div>`;
        }
        const harvestHtml = `
            <div id="dynamicHarvestSection" class="harvest-card">
                <div class="harvest-header"><i class="fas fa-clipboard-list"></i> 📋 Harvest Details</div>
                <div class="harvest-stats-row">
                    ${weeklyHtml}
                    <div class="harvest-stat-card">
                        <div class="harvest-stat-label"><i class="fas fa-calendar-week"></i> Harvesting Months (since start)</div>
                        <input type="number" step="1" min="1" id="harvestMonthsSinceStart" class="harvest-months-input" placeholder="e.g., 3 months" value="${existingMonths}">
                        <div style="font-size:0.7rem; margin-top:6px; color:#5a7a52;"><i class="fas fa-info-circle"></i> Number of months from first harvest till today</div>
                    </div>
                </div>
                <div class="month-grid-title"><i class="fas fa-calendar-alt"></i> 📅 Monthly Harvest (kg / units / crates)</div>
                <div class="month-grid" id="monthGridContainer"></div>
            </div>`;
        const existingSec = container.querySelector('#dynamicHarvestSection');
        if (existingSec) existingSec.remove();
        container.insertAdjacentHTML('beforeend', harvestHtml);
        const monthGridContainer = container.querySelector('#monthGridContainer');
        let monthsHtml = '';
        monthsList.forEach(month => { monthsHtml += `<div class="month-card"><span class="month-name">${month.substring(0,3)}</span><input type="number" class="month-harvest-input" data-month="${month}" step="0.01" placeholder="0"></div>`; });
        monthGridContainer.innerHTML = monthsHtml;
    }

    function getActiveHarvestDetails() {
        const weeklyValEl = document.getElementById('weeklyYieldValue');
        const weeklyVal = weeklyValEl ? parseFloat(weeklyValEl.value) || 0 : 0;
        let weeklyUnit = "kg";
        const unitRadio = document.querySelector('input[name="weeklyUnit"]:checked');
        if (unitRadio) weeklyUnit = unitRadio.value;
        const monthsCount = document.getElementById('harvestMonthsSinceStart') ? parseFloat(document.getElementById('harvestMonthsSinceStart').value) || 0 : 0;
        let monthlyHarvest = {};
        document.querySelectorAll('.month-harvest-input').forEach(inp => { monthlyHarvest[inp.dataset.month] = parseFloat(inp.value) || 0; });
        return { weeklyYieldOrCrates: weeklyVal, weeklyUnit, harvestMonthsCount: monthsCount, monthlyHarvest };
    }

    function collectActiveFormData() {
        const area = document.getElementById('gh_area')?.value || '';
        const crop = document.getElementById('gh_crop')?.value || '';
        const variety = document.getElementById('gh_variety')?.value || '';
        const stage = document.getElementById('gh_stage')?.value || '';
        const transplant = document.getElementById('gh_transplant')?.value || '';
        const prodSystem = document.getElementById('gh_prod_system')?.value || '';
        const tomatoType = document.getElementById('gh_tomato_type')?.value || '';
        let harvestDetails = { weeklyYieldOrCrates: 0, weeklyUnit: "kg", harvestMonthsCount: 0, monthlyHarvest: {} };
        if (stage === 'Harvesting') harvestDetails = getActiveHarvestDetails();
        return { area, crop, variety, stage, transplantDate: transplant, prodSystem, tomatoType, weeklyYieldOrCrates: harvestDetails.weeklyYieldOrCrates, weeklyUnit: harvestDetails.weeklyUnit, harvestMonthsCount: harvestDetails.harvestMonthsCount, monthlyHarvest: harvestDetails.monthlyHarvest };
    }

    function validateHarvestMandatory(ghData, stage, cropName) {
        if (stage === 'Harvesting') {
            const weeklyVal = ghData.weeklyYieldOrCrates;
            const monthsVal = ghData.harvestMonthsCount;
            if (!weeklyVal || weeklyVal <= 0) { showToast(`❌ Harvest details required: Weekly yield for ${cropName || 'crop'}`, true); return false; }
            if (!monthsVal || monthsVal <= 0) { showToast(`❌ Harvest details required: Harvesting Months count for ${cropName || 'crop'}`, true); return false; }
        }
        return true;
    }

    function renderBlankActiveForm() {
        const html = `<div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><div class="gh-badge"><i class="fas fa-seedling"></i> Greenhouse ${currentGreenhouseIndex}</div></div>
            <div class="grid-2col">
                <div class="input-field"><label>📐 Area (m²) *</label><input type="number" step="0.01" id="gh_area" value=""></div>
                <div class="input-field"><label>🌱 Crop *</label><select id="gh_crop"><option value="">Select Crop</option>${cropOptionsList.map(c => `<option value="${c}">${cropIconMap[c]||'🌿'} ${c}</option>`).join('')}</select></div>
                <div class="input-field"><label>🧬 Variety</label><input type="text" id="gh_variety" value=""></div>
                <div class="input-field"><label>📈 Crop Stage *</label><select id="gh_stage"><option value="">Select Stage</option>${cropStages.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div>
                <div class="input-field"><label>📆 Date Transplanted</label><input type="date" id="gh_transplant" value=""></div>
                <div class="input-field"><label>🔧 Production System</label><select id="gh_prod_system"><option value="">Select System</option>${productionSystems.map(ps => `<option value="${ps}">${ps}</option>`).join('')}</select></div>
                <div class="input-field tomato-extra" style="display: none;"><label>🍅 Tomato Type</label><select id="gh_tomato_type">${tomatoTypes.map(tt => `<option value="${tt}">${tt}</option>`).join('')}</select></div>
            </div>`;
        activeContainer.innerHTML = html;
        const cropSelect = document.getElementById('gh_crop');
        const stageSelect = document.getElementById('gh_stage');
        const tomatoDiv = activeContainer.querySelector('.tomato-extra');
        const updateHarvestUIPresence = () => {
            const crop = cropSelect?.value;
            const stage = stageSelect?.value;
            if (stage === 'Harvesting' && crop) {
                if (!activeContainer.querySelector('#dynamicHarvestSection')) buildHarvestDetailsUI(activeContainer, crop, 0, "kg", 0);
                else {
                    const oldWeekly = document.getElementById('weeklyYieldValue')?.value || 0;
                    const oldUnit = document.querySelector('input[name="weeklyUnit"]:checked')?.value || "kg";
                    const oldMonths = document.getElementById('harvestMonthsSinceStart')?.value || 0;
                    buildHarvestDetailsUI(activeContainer, crop, oldWeekly, oldUnit, oldMonths);
                }
            } else { const existingSec = activeContainer.querySelector('#dynamicHarvestSection'); if (existingSec) existingSec.remove(); }
        };
        if (cropSelect) cropSelect.addEventListener('change', () => { tomatoDiv.style.display = cropSelect.value === 'Tomato' ? 'block' : 'none'; updateHarvestUIPresence(); });
        if (stageSelect) stageSelect.addEventListener('change', updateHarvestUIPresence);
    }

    function saveCurrentAndReset() {
        const currentData = collectActiveFormData();
        if (!currentData.crop) { showToast("Please select a crop before adding greenhouse", true); return; }
        if (!currentData.area || parseFloat(currentData.area) <= 0) { showToast("Enter valid area (m²)", true); return; }
        if (!currentData.stage) { showToast("Select crop stage", true); return; }
        if (!validateHarvestMandatory(currentData, currentData.stage, currentData.crop)) return;
        savedGreenhouses.push({ ...currentData, savedId: Date.now() + Math.random() });
        updateSavedListDisplay();
        currentGreenhouseIndex++;
        renderBlankActiveForm();
        showToast(`Greenhouse ${currentGreenhouseIndex-1} saved. Now filling #${currentGreenhouseIndex}`);
    }

    function updateSavedListDisplay() {
        if (savedGreenhouses.length === 0) { savedListDiv.innerHTML = '<div style="padding: 8px; color: #5a6e5a; font-size:0.8rem;">No greenhouses saved yet. Fill the form above and click "Add Greenhouse".</div>'; return; }
        let html = '<div style="font-weight:600; margin-bottom: 8px;"><i class="fas fa-list"></i> Saved Greenhouses</div>';
        savedGreenhouses.forEach((gh, idx) => {
            let weeklyDisplay = (gh.stage === 'Harvesting') ? ` | Weekly: ${gh.weeklyYieldOrCrates} ${gh.weeklyUnit || 'kg'}/week | Months: ${gh.harvestMonthsCount}` : '';
            html += `<div class="saved-item"><span><strong>#${idx+1}</strong> ${gh.crop} | ${gh.area} m² | ${gh.stage}${weeklyDisplay}</span>
                     <button class="smart-icon-btn danger" onclick="removeSavedGreenhouse(${idx})"><i class="fas fa-trash"></i> Remove</button></div>`;
        });
        savedListDiv.innerHTML = html;
    }
    window.removeSavedGreenhouse = function(index) { savedGreenhouses.splice(index,1); updateSavedListDisplay(); showToast("Greenhouse removed"); };

    async function submitAllData() {
        const grower = growerNameInput.value.trim();
        const locality = localitySelect.value;
        if (!grower) { showToast("Enter grower name", true); return; }
        if (!locality) { showToast("Select locality", true); return; }
        const totalAreaGlobal = parseFloat(totalAreaMain.value) || 0;
        let allGreenhouses = [...savedGreenhouses];
        const currentFormData = collectActiveFormData();
        const currentCropValid = currentFormData.crop && currentFormData.area && parseFloat(currentFormData.area) > 0 && currentFormData.stage;
        if (currentCropValid) { if (!validateHarvestMandatory(currentFormData, currentFormData.stage, currentFormData.crop)) return; allGreenhouses.push(currentFormData); }
        if (allGreenhouses.length === 0) { showToast("No greenhouses to submit. Add at least one.", true); return; }
        let rows = []; let idCounter = 1;
        for (let gh of allGreenhouses) {
            let finalCrop = gh.crop;
            let tomatoExtra = '';
            if (gh.crop === 'Tomato' && gh.tomatoType) { tomatoExtra = gh.tomatoType; finalCrop = `Tomato ${tomatoExtra}`; }
            const monthlyVals = monthsList.map(m => gh.monthlyHarvest?.[m] || 0);
            let unitForSubmission = "kg";
            if (unitBasedCrops.includes(gh.crop)) unitForSubmission = "units";
            else if (weightBasedCrops.includes(gh.crop) && gh.weeklyUnit) unitForSubmission = gh.weeklyUnit === 'crates' ? 'crates' : 'kg';
            rows.push([grower, locality, currentZone, totalAreaGlobal, idCounter++, finalCrop, gh.variety || '', gh.stage, parseFloat(gh.area) || 0, gh.transplantDate || '', gh.weeklyYieldOrCrates || 0, unitForSubmission, gh.harvestMonthsCount || 0, gh.prodSystem || '', tomatoExtra, ...monthlyVals]);
        }
        let totalAreaSum = rows.reduce((sum, r) => sum + (parseFloat(r[8]) || 0), 0);
        let totalYieldSum = 0;
        for (let r of rows) if (r[7] === 'Harvesting') for (let i=15; i<=26; i++) totalYieldSum += parseFloat(r[i]) || 0;
        let cropVarietyList = rows.map(r => `${cropIconMap[r[5].split(' ')[0]]||'🌿'} ${r[5]} (${r[6] || 'no variety'})`).join(' · ');
        insightContent.innerHTML = `<div style="font-weight:800;"><i class="fas fa-chart-line"></i> Submission Summary</div><div class="insight-line"><i class="fas fa-seedling"></i> ${rows.length} Greenhouses</div><div class="insight-line"><i class="fas fa-arrows-alt"></i> ${totalAreaSum.toFixed(1)} m² total</div><div class="insight-line"><i class="fas fa-weight-hanging"></i> ${totalYieldSum.toFixed(1)} estimated annual yield</div><div class="insight-line"><i class="fas fa-list-ul"></i> Crops: ${cropVarietyList}</div>`;
        insightsContainer.style.display = 'block';
        const submitBtnElem = document.getElementById('finalSubmitDataBtn');
        const origText = submitBtnElem.innerHTML;
        submitBtnElem.disabled = true;
        submitBtnElem.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Syncing...';
        try {
            const mauritiusTimestamp = getMauritiusTimestamp();
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ timestamp: mauritiusTimestamp, rows }) });
            showToast(`✅ Data submitted! ${rows.length} greenhouse(s) logged.`);
            savedGreenhouses = []; currentGreenhouseIndex = 1; renderBlankActiveForm(); updateSavedListDisplay();
        } catch (e) { showToast("Submitted (check sheet)", false); } finally { submitBtnElem.disabled = false; submitBtnElem.innerHTML = origText; }
    }

    accessBtn.onclick = () => {
        if (!growerNameInput.value.trim()) { showToast("Please enter Grower Name first", true); return; }
        if (!localitySelect.value) { showToast("Please select a Locality", true); return; }
        greenhouseDashboard.classList.remove('hidden-section');
        renderBlankActiveForm(); updateSavedListDisplay(); showToast("Tracker active · Harvest details mandatory for Harvesting stage");
    };
    addBtn.onclick = saveCurrentAndReset;
    submitBtn.onclick = submitAllData;
    zoneBtns.forEach(btn => btn.addEventListener('click', () => setZone(btn.dataset.zone)));
    setZone('E2');
    greenhouseDashboard.classList.add('hidden-section');
</script>
</body>
