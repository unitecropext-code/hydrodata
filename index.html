<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Hydroponic Smart Tracker | Admin & Grower</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        /* ... (keep existing styles, add new ones below) ... */
        .greenhouse-selector { margin: 1rem 0; padding: 0.8rem; background: #eef4ea; border-radius: 2rem; }
        .stage-timeline { display: flex; justify-content: space-between; margin: 1rem 0; flex-wrap: wrap; gap: 0.5rem; }
        .stage-step { text-align: center; flex: 1; background: #f9f9f9; border-radius: 1rem; padding: 0.5rem; font-size: 0.8rem; }
        .stage-step.active { background: #2c7a2a; color: white; }
        .projection-card { background: #e8f5e9; border-radius: 1rem; padding: 1rem; margin-top: 1rem; }
        .qr-container { text-align: center; margin: 1rem 0; }
        .quick-obs-btn { background: #ff9800; color: white; border: none; border-radius: 2rem; padding: 0.5rem 1rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginOverlay" class="login-overlay">...</div> <!-- unchanged -->
    
    <div id="mainApp" style="display: none;">
        <!-- Header (unchanged) -->
        <div class="glass-card">...</div>
        
        <!-- Grower Profile (unchanged) -->
        <div class="glass-card">...</div>
        
        <!-- NEW: Personalised Crop Dashboard -->
        <div class="glass-card" id="personalisedDashboard" style="display: none;">
            <div class="stat-title"><i class="fas fa-leaf"></i> 🌱 My Greenhouse / Crop Dashboard</div>
            <div class="greenhouse-selector">
                <label>Select your greenhouse/crop:</label>
                <select id="greenhouseSelect"></select>
            </div>
            <div id="cropDetailsContainer">
                <!-- Dynamic content: stage timeline, projections, QR, observations -->
            </div>
        </div>
        
        <!-- Live Dashboard (unchanged) -->
        <div class="live-dashboard-title">...</div>
        <div class="glass-card"><div class="stat-title">📈 Monthly Yield Efficiency</div>...</div>
        <div class="dashboard-grid">...</div>
        
        <!-- Greenhouse Registration (unchanged) -->
        <div id="greenhouseSection" class="hidden">...</div>
        <div id="prevSubmissionsSection" class="glass-card">...</div>
    </div>
    <div class="footer">...</div>
</div>

<!-- Edit Record Modal (unchanged but with monthly grid) -->
<div id="editRecordModal" class="modal-overlay">...</div>

<!-- Quick Observation Modal (new) -->
<div id="observationModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-clipboard-list"></i> Quick Observation</h3>
        <div id="obsGreenhouseInfo" style="background:#eef4ea; padding:0.5rem; border-radius:1rem; margin-bottom:1rem;"></div>
        <div class="form-group"><label>Observation Notes</label><textarea id="obsText" rows="2" style="width:100%;"></textarea></div>
        <div class="grid-2col">
            <div class="form-group"><label>pH</label><input type="number" step="0.1" id="obsPh"></div>
            <div class="form-group"><label>EC (mS/cm)</label><input type="number" step="0.1" id="obsEc"></div>
            <div class="form-group"><label>Temperature (°C)</label><input type="number" step="0.5" id="obsTemp"></div>
        </div>
        <div style="display:flex; gap:1rem; justify-content:flex-end; margin-top:1rem;">
            <button id="cancelObsBtn" class="btn-secondary">Cancel</button>
            <button id="saveObsBtn" class="btn">Save Observation</button>
        </div>
    </div>
</div>

<script>
    // Configuration
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmWFXKRPwdIG_OxNPTW_VEfL7VK4s7OL2gGv0V-TJ2ej1_nzjWT3UKE7gPxO3d6js/exec'; // REPLACE WITH YOUR WEB APP URL
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const STAGES = ["Seedling","Vegetative","Flowering","Fruiting","Harvesting"];
    
    // Typical duration (days) for each stage – used for projection
    const STAGE_DURATION_DAYS = {
        "Seedling": 14,
        "Vegetative": 28,
        "Flowering": 21,
        "Fruiting": 28,
        "Harvesting": 60  // ongoing
    };
    
    let currentZone = "E2";
    let savedGreenhouses = [];
    let currentEditRecord = null;
    let isAdmin = false;
    let currentLoggedInUser = "";
    let efficiencyChart = null;
    let currentActiveCrop = "Tomato";
    let growerGreenhouses = []; // list of {ghNumber, crop, variety, stage, area, transplantDate}
    
    // DOM elements
    const loginOverlay = document.getElementById('loginOverlay');
    const mainApp = document.getElementById('mainApp');
    const greenhouseSelect = document.getElementById('greenhouseSelect');
    const personalisedDashboardDiv = document.getElementById('personalisedDashboard');
    const observationModal = document.getElementById('observationModal');
    
    // Helper functions (keep all existing helpers: toast, getCurrentMauritiusFormatted, etc.)
    // ... (copy from your previous index.html)
    
    // NEW: Load grower's greenhouses and populate dropdown
    async function loadGrowerGreenhouses(grower) {
        if (isAdmin) return;
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getGrowerGreenhouses&grower=${encodeURIComponent(grower)}&_=${Date.now()}`);
            const data = await res.json();
            growerGreenhouses = data.greenhouses || [];
            greenhouseSelect.innerHTML = '<option value="">-- Select a greenhouse/crop --</option>';
            growerGreenhouses.forEach((gh, idx) => {
                const option = document.createElement('option');
                option.value = idx;
                option.textContent = `${gh.ghNumber} - ${gh.crop} (${gh.variety || 'standard'}) - Stage: ${gh.stage}`;
                greenhouseSelect.appendChild(option);
            });
            if (growerGreenhouses.length > 0) {
                personalisedDashboardDiv.style.display = 'block';
                greenhouseSelect.addEventListener('change', () => displayCropDetails(growerGreenhouses[greenhouseSelect.value]));
            } else {
                personalisedDashboardDiv.style.display = 'none';
            }
        } catch(e) { console.error(e); }
    }
    
    // Display stage timeline, projections, QR, observation button
    function displayCropDetails(gh) {
        if (!gh) return;
        const container = document.getElementById('cropDetailsContainer');
        const transplantDate = gh.transplantDate ? new Date(gh.transplantDate) : null;
        const today = new Date();
        
        // Find current stage index
        const currentStageIdx = STAGES.indexOf(gh.stage);
        // Calculate projected dates for each future stage
        let projectedHarvestDate = null;
        if (transplantDate && currentStageIdx !== -1) {
            let daysFromStart = 0;
            for (let i = 0; i < currentStageIdx; i++) {
                daysFromStart += STAGE_DURATION_DAYS[STAGES[i]];
            }
            const startDate = new Date(transplantDate);
            const currentStageStart = new Date(startDate.getTime() + daysFromStart * 86400000);
            // Remainder days in current stage
            const daysInCurrentStage = STAGE_DURATION_DAYS[gh.stage] || 0;
            const daysElapsed = Math.max(0, Math.floor((today - currentStageStart) / 86400000));
            const daysRemaining = Math.max(0, daysInCurrentStage - daysElapsed);
            // Project harvest: add remaining days + durations of subsequent stages
            let daysToHarvest = daysRemaining;
            for (let i = currentStageIdx + 1; i < STAGES.length; i++) {
                daysToHarvest += STAGE_DURATION_DAYS[STAGES[i]];
            }
            projectedHarvestDate = new Date(today.getTime() + daysToHarvest * 86400000);
        }
        
        // Projected yield (area * average efficiency from benchmarks)
        // We'll use simple logic: Tomato ~10 kg/m², Sweet Pepper ~8, English Cucumber ~12
        let avgEfficiency = 5; // default
        const cropLower = gh.crop.toLowerCase();
        if (cropLower.includes('tomato')) avgEfficiency = 10;
        else if (cropLower.includes('sweet pepper')) avgEfficiency = 8;
        else if (cropLower.includes('cucumber')) avgEfficiency = 12;
        const projectedYield = gh.area * avgEfficiency;
        
        // Generate QR code URL
        const qrUrl = `${SCRIPT_URL}?action=generateQR&grower=${encodeURIComponent(currentLoggedInUser)}&ghId=${encodeURIComponent(gh.ghNumber)}`;
        
        const stageHtml = `
            <div class="stage-timeline">
                ${STAGES.map(stage => `<div class="stage-step ${stage === gh.stage ? 'active' : ''}">${stage}</div>`).join('')}
            </div>
            <div class="projection-card">
                <p><strong>🌱 Current Stage:</strong> ${gh.stage}</p>
                <p><strong>📅 Projected Harvest Date:</strong> ${projectedHarvestDate ? projectedHarvestDate.toLocaleDateString() : 'Not enough data'}</p>
                <p><strong>🍅 Projected Total Yield:</strong> ${projectedYield.toFixed(1)} kg (estimated)</p>
                <p><strong>📐 Area:</strong> ${gh.area} m²</p>
                <p><strong>🌾 Variety:</strong> ${gh.variety || 'Standard'}</p>
            </div>
            <div class="qr-container">
                <p><i class="fas fa-qrcode"></i> Scan this QR to record a quick observation:</p>
                <img src="${qrUrl}" alt="QR Code" style="max-width: 200px; border: 1px solid #ccc; border-radius: 1rem;">
                <br>
                <button class="quick-obs-btn" data-gh="${gh.ghNumber}" data-crop="${gh.crop}"><i class="fas fa-camera"></i> Quick Observation</button>
            </div>
        `;
        container.innerHTML = stageHtml;
        // Attach observation button event
        document.querySelector('.quick-obs-btn')?.addEventListener('click', () => openObservationModal(gh.ghNumber, gh.crop));
    }
    
    function openObservationModal(ghId, crop) {
        document.getElementById('obsGreenhouseInfo').innerHTML = `Greenhouse: ${ghId} | Crop: ${crop}`;
        document.getElementById('obsText').value = '';
        document.getElementById('obsPh').value = '';
        document.getElementById('obsEc').value = '';
        document.getElementById('obsTemp').value = '';
        observationModal.style.display = 'flex';
        // Store current ghId/crop for save
        observationModal.dataset.ghId = ghId;
        observationModal.dataset.crop = crop;
    }
    
    async function saveObservation() {
        const ghId = observationModal.dataset.ghId;
        const crop = observationModal.dataset.crop;
        const observation = document.getElementById('obsText').value;
        const ph = parseFloat(document.getElementById('obsPh').value) || null;
        const ec = parseFloat(document.getElementById('obsEc').value) || null;
        const temp = parseFloat(document.getElementById('obsTemp').value) || null;
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'recordObservation',
                    grower: currentLoggedInUser,
                    greenhouseId: ghId,
                    crop: crop,
                    observation: observation,
                    ph: ph,
                    ec: ec,
                    temperature: temp
                })
            });
            toast("Observation saved!");
            observationModal.style.display = 'none';
        } catch(e) { toast("Error saving observation", true); }
    }
    
    // Override existing saveFullRecordUpdate to use new endpoint
    async function saveFullRecordUpdate() {
        if (!currentEditRecord) { toast("No record selected", true); return; }
        const saveBtn = document.getElementById('saveEditBtn');
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin-custom"></i> Saving...';
        saveBtn.disabled = true;
        try {
            const { row, timestampIdx, stageIdx, cropIdx, areaIdx, varietyIdx, weeklyYieldIdx, weeklyUnitIdx, harvestMonthsIdx, monthIndices } = currentEditRecord;
            const timestamp = row[timestampIdx];
            if (!timestamp) { toast("Invalid timestamp", true); return; }
            const newStage = document.getElementById('editStage').value;
            const newArea = parseFloat(document.getElementById('editArea').value);
            const newVariety = document.getElementById('editVariety').value;
            const newWeeklyYield = parseFloat(document.getElementById('editWeeklyYield').value);
            const newUnit = document.getElementById('editUnit').value;
            const newHarvestMonths = parseFloat(document.getElementById('editHarvestMonths').value);
            let newMonthly = Array(12).fill(0);
            for (let i=0; i<12; i++) newMonthly[i] = parseFloat(document.getElementById(`edit_month_${i}`).value) || 0;
            if (isNaN(newArea) || newArea < 0) { toast("Area must be valid", true); return; }
            
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'updateFullRecordWithMonthly',
                    username: currentLoggedInUser,
                    timestamp: timestamp,
                    stage: newStage,
                    area: newArea,
                    variety: newVariety,
                    weeklyYield: newWeeklyYield,
                    weeklyUnit: newUnit,
                    harvestMonths: newHarvestMonths,
                    monthly: newMonthly
                })
            });
            
            toast("✅ Record updated with monthly sync.");
            editModal.style.display = 'none';
            document.body.style.overflow = '';
            await loadUserPreviousData(currentLoggedInUser);
            await loadDashboard();
            await loadGrowerGreenhouses(currentLoggedInUser);
            updateLastUpdatedDisplay();
        } catch(e) { console.error(e); toast("Update error", true); } finally {
            saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            saveBtn.disabled = false;
        }
    }
    
    // Modify login success to load grower's greenhouses
    async function login(username, password) {
        // ... existing login logic ...
        // After successful login and loading dashboard, add:
        if (!isAdmin) {
            await loadGrowerGreenhouses(username);
        }
    }
    
    // On page load, check URL parameters for QR scan (auto-open observation)
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('action') === 'openObservation' && urlParams.get('grower') && urlParams.get('ghId')) {
            // This would be used when scanning QR. Since we are in the web app, we can simulate.
            // For simplicity, the QR code opens a URL that reloads the page with params.
            // We'll automatically login and open observation modal if needed.
            const grower = urlParams.get('grower');
            const ghId = urlParams.get('ghId');
            // Store in session and attempt auto-login? For security, we'll just show a prompt.
            if (currentLoggedInUser === grower) {
                openObservationModal(ghId, '');
            } else {
                toast("Please login as the correct grower to record observation", true);
            }
        }
    });
    
    // Attach event listeners for observation modal
    document.getElementById('cancelObsBtn').onclick = () => observationModal.style.display = 'none';
    document.getElementById('saveObsBtn').onclick = saveObservation;
    
    // Also ensure the existing refresh function reloads greenhouses
    const originalRefresh = window.refreshFullData;
    window.refreshFullData = async function() {
        await originalRefresh();
        if (!isAdmin && currentLoggedInUser) await loadGrowerGreenhouses(currentLoggedInUser);
    };
    
    // Rest of your existing JavaScript (toast, login, logout, etc.) remains unchanged.
    // Make sure to copy all the helper functions from your previous index.html.
</script>
</body>
</html>
