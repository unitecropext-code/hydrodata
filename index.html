<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hydroponic Tracker | Google Sheets Save</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6d9 100%);
            min-height: 100vh;
            padding: 24px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 32, 0, 0.15);
        }

        h1 {
            color: #1b5e2a;
            font-size: 1.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #4a5b4e;
            border-left: 4px solid #4caf7a;
            padding-left: 16px;
            margin: 8px 0 24px 0;
            font-weight: 500;
        }

        .zone-panel {
            background: #f1f8f2;
            border-radius: 60px;
            display: inline-flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 8px 16px;
            border: 1px solid #cfe9d4;
        }

        .zone-btn {
            background: #eef4ee;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #2a5e35;
        }

        .zone-btn.active {
            background: #2e7d32;
            color: white;
            box-shadow: 0 4px 10px rgba(46,125,50,0.3);
        }

        .substrate-section {
            background: #fef9e6;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            border: 1px solid #e6d5b8;
        }

        .substrate-label {
            font-weight: 700;
            color: #8a6e2b;
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .substrate-dropdown {
            width: 100%;
            max-width: 300px;
            padding: 14px 18px;
            border: 2px solid #e0cfaa;
            border-radius: 28px;
            font-size: 1rem;
            background: white;
            color: #3b2e1a;
            cursor: pointer;
        }

        .grower-section {
            background: #eef2f0;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 28px;
            border: 1px solid #cde0d4;
        }

        .grower-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 16px;
        }

        .grower-select-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            flex: 2;
        }

        .grower-dropdown {
            flex: 3;
            min-width: 250px;
            padding: 12px 16px;
            border-radius: 28px;
            border: 2px solid #c8dbc8;
            font-size: 0.95rem;
            background: white;
        }

        .btn-add-grower {
            background: #5e9b6e;
            padding: 10px 24px;
            border-radius: 40px;
        }

        .new-grower-fields {
            display: none;
            margin-top: 18px;
            padding: 16px;
            background: white;
            border-radius: 20px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .new-grower-fields.active {
            display: grid;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 700;
            color: #1a4f2a;
            font-size: 0.85rem;
        }

        input, select {
            padding: 12px 16px;
            border: 2px solid #e2eee2;
            border-radius: 20px;
            font-size: 0.95rem;
            background: white;
        }

        button {
            background: #2e6b37;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background: #1f5627;
            transform: translateY(-2px);
        }

        button.secondary {
            background: #757575;
        }

        .greenhouse-card {
            background: #fefef7;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddebe0;
        }

        .gh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin-top: 12px;
        }

        .harvest-fields {
            display: none;
            margin-top: 20px;
            padding: 16px 20px;
            background: #eef6ea;
            border-radius: 20px;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
        }

        .harvest-fields.active {
            display: grid;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 28px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1f4626;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            animation: slideUp 0.25s ease;
            z-index: 2000;
            font-weight: 500;
        }

        .toast.error {
            background: #bc4742;
        }

        .connection-status {
            background: #e3f2fd;
            padding: 10px 20px;
            border-radius: 28px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🌱 Hydroponic Grower Tracker <span style="font-size: 0.9rem;">| Google Sheets Sync</span></h1>
        <div class="subtitle">Data saves directly to your Google Sheet</div>

        <!-- Connection Status -->
        <div id="connectionStatus" class="connection-status">
            <span>🟢 Checking connection...</span>
            <button type="button" onclick="testConnection()" style="background:#1976d2; padding:6px 16px;">Test Connection</button>
        </div>

        <!-- Zone Selection -->
        <div class="zone-panel" id="zoneSelector">
            <button type="button" data-zone="E1" class="zone-btn active">📍 Zone E1</button>
            <button type="button" data-zone="E2" class="zone-btn">📍 Zone E2</button>
            <button type="button" data-zone="E3" class="zone-btn">📍 Zone E3</button>
            <button type="button" data-zone="E4" class="zone-btn">📍 Zone E4</button>
        </div>

        <!-- Substrate Type -->
        <div class="substrate-section">
            <div class="substrate-label">
                🌿 Substrate / Growing System
            </div>
            <select id="substrateType" class="substrate-dropdown">
                <option value="Coir based">🧫 Coir Based</option>
                <option value="NFT">💧 NFT (Nutrient Film Technique)</option>
                <option value="DFT">🌊 DFT (Deep Flow Technique)</option>
                <option value="Aquaponics">🐟 Aquaponics</option>
            </select>
        </div>

        <!-- Grower Section -->
        <div class="grower-section">
            <div class="grower-header">
                <div class="grower-select-wrapper">
                    <label style="margin-right: 5px;">👨‍🌾 Select Grower:</label>
                    <select id="growerSelect" class="grower-dropdown">
                        <option value="">-- Choose a grower --</option>
                    </select>
                    <button type="button" id="showNewGrowerBtn" class="btn-add-grower">+ New Grower</button>
                </div>
            </div>
            <div id="newGrowerFields" class="new-grower-fields">
                <div class="input-group">
                    <label>Grower Full Name *</label>
                    <input type="text" id="newGrowerName" placeholder="e.g., New Planter Name">
                </div>
                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="text" id="newGrowerContact" placeholder="Optional">
                </div>
                <div class="input-group">
                    <label>Field Location</label>
                    <input type="text" id="newGrowerLocation" placeholder="Optional">
                </div>
                <button type="button" id="saveNewGrowerBtn" style="background:#3d704b;">✓ Add & Select</button>
                <button type="button" id="cancelNewGrowerBtn" class="secondary">Cancel</button>
            </div>
        </div>

        <!-- Main Form -->
        <form id="hydroponicForm">
            <div class="form-grid">
                <div class="input-group">
                    <label>📐 Total Hydroponic Area (m²) *</label>
                    <input type="number" id="totalArea" step="0.1" placeholder="Total growing area" required />
                </div>
            </div>
            <div id="greenhousesContainer"></div>
            <button type="button" id="addGreenhouse" style="margin-bottom: 18px; background: #2b5e6e;">+ Add Greenhouse Unit</button>
            <div class="btn-group">
                <button type="submit" id="saveBtn">💾 Save to Google Sheets</button>
                <button type="button" id="clearForm" class="secondary">⟳ Clear Form</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ============================================================
    // GOOGLE SHEETS CONFIGURATION - REPLACE WITH YOUR URL
    // ============================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwT1hoQRkO3cI9o2Nf29oExuqv4RfwPIwp7gbKBHp9bGMkdcDwzCDeeQDME3EY62LnR/exec";
    const SHEET_ID = "1aY-_usm74Ge_dyvV_5wQrGQPKRd5UytvkERUEAg4DyI";
    
    // ============================================================

    // ============================================================
    const EXCEL_GROWERS = [

        "MULTRA Menasha", "MUNOGHEE Madvi", "MUNSOOR MOHAMMED UMAR", "NOOROODIN Auhammad", "NUKCHEDY Vijay",

        "RUHOMUTALLY Rehan", "RUHOMUTALLY Tawfic", "SAVOO Visnaden", "SAWKATALLY Ismael", "SEEBUN Benuduth",
        "SEEBUN Nitin", "SEEWOOLALL Meetyadev", "SHEORAJ Shaheel Yashvant", "SOHUR Preety", "SOOBEN Logendiren",
        "SOOBRATTEE MOOSA QURBAN", "SOOKHEE Bhoosun Kumar", "SOOKOOREE Vikash", "SOOKOYEE Kavita", "SOOKUN SOOROOTAMSINGH",
        "SOUKY Veemal Singh", "SUNKUR Juswantee", "SUNKUR Ravi", "TAKOOR Chandraduth", "UNMOLE Heerasagar",
        "UNMOLE Soobhawtee", "Woodun Hemraj c/o Woodun Veggies", "Woodun L Pallavi Devi"
    ];

    const CUSTOM_GROWERS_KEY = "hydroponic_custom_growers";
    let currentZone = "E1";
    let greenhouseCounter = 1;
    const cropOptions = ["Cabbage", "Cauliflower", "Lettuce", "Tomato", "Sweet Pepper", "Cucumber", "Strawberry", "Basil", "Mint"];

    // Load custom growers
    function loadCustomGrowers() {
        const stored = localStorage.getItem(CUSTOM_GROWERS_KEY);
        return stored ? JSON.parse(stored) : [];
    }

    function saveCustomGrowers(growers) {
        localStorage.setItem(CUSTOM_GROWERS_KEY, JSON.stringify(growers));
    }

    function getAllGrowers() {
        return [...EXCEL_GROWERS, ...loadCustomGrowers()];
    }

    function populateGrowerDropdown(selectedName = "") {
        const select = document.getElementById('growerSelect');
        const allGrowers = getAllGrowers();
        select.innerHTML = '<option value="">-- Choose a grower --</option>';
        allGrowers.forEach(grower => {
            const option = document.createElement('option');
            option.value = grower;
            option.textContent = grower;
            if (grower === selectedName) option.selected = true;
            select.appendChild(option);
        });
    }

    function addNewGrower(fullName, contact, location) {
        if (!fullName.trim()) return false;
        const customList = loadCustomGrowers();
        if (customList.includes(fullName.trim()) || EXCEL_GROWERS.includes(fullName.trim())) {
            return false;
        }
        customList.push(fullName.trim());
        saveCustomGrowers(customList);
        const meta = JSON.parse(localStorage.getItem("grower_metadata") || "{}");
        meta[fullName.trim()] = { contact: contact || "", location: location || "" };
        localStorage.setItem("grower_metadata", JSON.stringify(meta));
        populateGrowerDropdown(fullName.trim());
        return true;
    }

    function getGrowerMeta(growerName) {
        const meta = JSON.parse(localStorage.getItem("grower_metadata") || "{}");
        return meta[growerName] || { contact: "", location: "" };
    }

    // Test connection to Google Sheets
    async function testConnection() {
        const statusDiv = document.getElementById('connectionStatus');
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'GET',
                mode: 'cors'
            });
            if (response.ok) {
                statusDiv.innerHTML = '<span>✅ Connected to Google Sheets! Ready to save data.</span><button type="button" onclick="testConnection()" style="background:#1976d2; padding:6px 16px;">Test Connection</button>';
                showToast('Connection successful!');
            } else {
                throw new Error('Connection failed');
            }
        } catch (error) {
            statusDiv.innerHTML = '<span>⚠️ Cannot connect. Make sure you deployed the Apps Script with "Anyone" access.</span><button type="button" onclick="testConnection()" style="background:#1976d2; padding:6px 16px;">Test Connection</button>';
            showToast('Connection failed. Please check your Apps Script URL.', true);
        }
    }

    // Save to Google Sheets
    async function saveToGoogleSheets(data) {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        return result.result === 'success' || result.status === 'success';
    }

    // Greenhouse UI
    function addGreenhouseCard(number, data = {}) {
        const container = document.getElementById('greenhousesContainer');
        const card = document.createElement('div');
        card.className = 'greenhouse-card';
        card.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom:8px;">
                <strong>🌿 Greenhouse ${number}</strong>
                ${number > 1 ? '<button type="button" class="remove-gh" style="background:#c0392b; padding:4px 18px; border-radius:30px;">Remove</button>' : '<span style="color:#388e3c;">Primary unit</span>'}
            </div>
            <div class="gh-grid">
                <div><label>Area (m²) *</label><input type="number" step="0.1" class="gh-area" value="${data.area || ''}" placeholder="m²"></div>
                <div><label>Crop Type *</label><select class="gh-crop"><option value="">Select...</option>${cropOptions.map(c => `<option value="${c}" ${data.cropType === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
                <div><label>Variety *</label><input type="text" class="gh-variety" value="${data.variety || ''}" placeholder="Variety"></div>
                <div><label>Growth Stage *</label><select class="gh-stage"><option value="Seedling" ${data.cropStage === 'Seedling' ? 'selected' : ''}>Seedling</option><option value="Vegetative" ${data.cropStage === 'Vegetative' ? 'selected' : ''}>Vegetative</option><option value="Flowering" ${data.cropStage === 'Flowering' ? 'selected' : ''}>Flowering</option><option value="Harvest" ${data.cropStage === 'Harvest' ? 'selected' : ''}>Harvest</option></select></div>
                <div><label>Transplant Date</label><input type="date" class="gh-transplant" value="${data.transplantDate || new Date().toISOString().split('T')[0]}"></div>
            </div>
            <div class="harvest-fields">
                <div><label>Harvest Duration (months)</label><input type="number" step="0.5" class="gh-harvest-months" value="${data.harvestMonths || ''}" placeholder="months"></div>
                <div><label>Average Yield (kg/week)</label><input type="number" step="0.1" class="gh-yield-week" value="${data.avgYieldWeek || ''}" placeholder="kg/week"></div>
            </div>
        `;
        const stageSelect = card.querySelector('.gh-stage');
        const harvestDiv = card.querySelector('.harvest-fields');
        const toggleHarvest = () => {
            if (stageSelect.value === 'Harvest') harvestDiv.classList.add('active');
            else harvestDiv.classList.remove('active');
        };
        stageSelect.addEventListener('change', toggleHarvest);
        toggleHarvest();
        if (number > 1) {
            card.querySelector('.remove-gh').addEventListener('click', () => card.remove());
        }
        container.appendChild(card);
    }

    function collectGreenhouseData() {
        const cards = document.querySelectorAll('.greenhouse-card');
        const greenhouses = [];
        for (let i = 0; i < cards.length; i++) {
            const card = cards[i];
            const area = parseFloat(card.querySelector('.gh-area').value);
            const cropType = card.querySelector('.gh-crop').value;
            const variety = card.querySelector('.gh-variety').value.trim();
            const stage = card.querySelector('.gh-stage').value;
            const transplantDate = card.querySelector('.gh-transplant').value;
            if (!cropType || !variety || isNaN(area) || area <= 0) {
                throw new Error(`Greenhouse ${i+1}: area, crop type and variety required.`);
            }
            let harvestMonths = null;
            let avgYieldWeek = '';
            if (stage === 'Harvest') {
                const months = parseFloat(card.querySelector('.gh-harvest-months').value);
                if (isNaN(months) || months <= 0) throw new Error(`Harvest duration required for GH ${i+1}`);
                harvestMonths = months;
                avgYieldWeek = card.querySelector('.gh-yield-week').value || '0';
            }
            greenhouses.push({
                greenhouseNumber: i+1,
                area_m2: area,
                cropType: cropType,
                variety: variety,
                cropStage: stage,
                transplantDate: transplantDate,
                harvestDurationMonths: harvestMonths,
                avgYieldKgWeek: stage === 'Harvest' ? parseFloat(avgYieldWeek) : 0
            });
        }
        if (greenhouses.length === 0) throw new Error("Add at least one greenhouse");
        return greenhouses;
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3500);
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const selectedGrower = document.getElementById('growerSelect').value;
        if (!selectedGrower) {
            showToast("Please select or add a grower", true);
            return;
        }
        const totalArea = parseFloat(document.getElementById('totalArea').value);
        if (isNaN(totalArea) || totalArea <= 0) {
            showToast("Valid total area required", true);
            return;
        }
        const substrateType = document.getElementById('substrateType').value;
        let greenhouses;
        try {
            greenhouses = collectGreenhouseData();
        } catch (err) {
            showToast(err.message, true);
            return;
        }

        const growerMeta = getGrowerMeta(selectedGrower);
        const submission = {
            recordType: "hydroponic_entry",
            growerName: selectedGrower,
            growerContact: growerMeta.contact || "",
            growerLocation: growerMeta.location || "",
            totalAreaM2: totalArea,
            substrateSystem: substrateType,
            zone: currentZone,
            sheetId: SHEET_ID,
            greenhouses: greenhouses,
            timestamp: new Date().toISOString(),
            recordId: `hyd_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`
        };

        const saveBtn = document.getElementById('saveBtn');
        const originalText = saveBtn.innerText;
        saveBtn.innerText = '💾 Saving to Google Sheets...';
        saveBtn.disabled = true;
        
        try {
            const success = await saveToGoogleSheets(submission);
            if (success) {
                showToast(`✅ Data saved to Google Sheets! (Zone ${currentZone})`);
                setTimeout(() => {
                    if (confirm('Data saved successfully! Clear form for next entry?')) {
                        clearForm();
                    }
                }, 500);
            } else {
                showToast('❌ Failed to save. Check console for details.', true);
            }
        } catch (error) {
            console.error('Save error:', error);
            showToast('❌ Failed to save to Google Sheets. Check Apps Script URL and deployment.', true);
        } finally {
            saveBtn.innerText = originalText;
            saveBtn.disabled = false;
        }
    }

    function clearForm() {
        if (confirm('Clear all form data?')) {
            document.getElementById('totalArea').value = '';
            document.getElementById('greenhousesContainer').innerHTML = '';
            greenhouseCounter = 1;
            addGreenhouseCard(1);
            document.getElementById('growerSelect').value = '';
            showToast('Form cleared');
        }
    }

    // Event handlers
    function initZoneSelector() {
        const btns = document.querySelectorAll('.zone-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const zone = btn.getAttribute('data-zone');
                if (zone) {
                    currentZone = zone;
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showToast(`Zone switched to ${zone}`);
                }
            });
        });
    }

    // New grower UI
    function toggleNewGrowerForm(show) {
        const div = document.getElementById('newGrowerFields');
        if (show) {
            div.classList.add('active');
        } else {
            div.classList.remove('active');
            document.getElementById('newGrowerName').value = '';
            document.getElementById('newGrowerContact').value = '';
            document.getElementById('newGrowerLocation').value = '';
        }
    }

    document.getElementById('showNewGrowerBtn').addEventListener('click', () => toggleNewGrowerForm(true));
    document.getElementById('cancelNewGrowerBtn').addEventListener('click', () => toggleNewGrowerForm(false));
    document.getElementById('saveNewGrowerBtn').addEventListener('click', () => {
        const name = document.getElementById('newGrowerName').value.trim();
        const contact = document.getElementById('newGrowerContact').value.trim();
        const location = document.getElementById('newGrowerLocation').value.trim();
        if (!name) {
            showToast("Grower name is required", true);
            return;
        }
        const success = addNewGrower(name, contact, location);
        if (success) {
            showToast(`Grower "${name}" added successfully`);
            toggleNewGrowerForm(false);
        } else {
            showToast("Grower already exists", true);
        }
    });

    document.getElementById('addGreenhouse').addEventListener('click', () => {
        greenhouseCounter++;
        addGreenhouseCard(greenhouseCounter);
    });
    document.getElementById('hydroponicForm').addEventListener('submit', handleSubmit);
    document.getElementById('clearForm').addEventListener('click', clearForm);
    
    // Initialize
    populateGrowerDropdown();
    addGreenhouseCard(1);
    initZoneSelector();
    setTimeout(() => testConnection(), 1000);
    
    // Expose testConnection globally
    window.testConnection = testConnection;
</script>
</body>
</html>
