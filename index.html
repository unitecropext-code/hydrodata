<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Hydroponic Data Tracker - Smart Data Capture Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Professional green theme --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .modern-header {
            background: white; border-radius: 24px; padding: 20px 24px; margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); border: 1px solid #c8e6c9;
        }
        .title-section { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .icon-badge {
            background: linear-gradient(135deg, #1b5e20, #2e7d32); width: 55px; height: 55px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .icon-badge i { color: white; }
        .title-section h1 {
            font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .beta-badge { background: #ff9800; color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .version-btn {
            background: #2e7d32; color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: 0.2s;
        }
        .version-btn:hover { background: #1b5e20; transform: translateY(-1px); }
        .subtitle {
            color: #2c3e50; font-size: 13px; margin-top: 8px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .veg-icons {
            display: inline-flex; align-items: center; gap: 10px;
            background: #e8f5e9; padding: 4px 12px; border-radius: 40px;
        }
        .veg-icons i { font-size: 16px; color: #2e7d32; }
        .veg-icons span { font-size: 12px; font-weight: 500; color: #1b5e20; margin-left: 4px; }

        .form-section {
            background: white; border-radius: 24px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #dcedc8;
        }
        .section-title {
            font-size: 18px; font-weight: 700; color: #1b5e20; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px; padding-bottom: 12px;
            border-bottom: 2px solid #c8e6c9; flex-wrap: wrap;
        }
        .section-title i { color: #2e7d32; }

        .input-group label {
            display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; font-size: 13px;
        }
        .input-group label i { color: #2e7d32; margin-right: 6px; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px; border: 2px solid #dcedc8; border-radius: 12px;
            font-size: 14px; background: white; transition: 0.2s;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #66bb6a; outline: none; box-shadow: 0 0 0 3px rgba(102,187,106,0.2);
        }

        .zone-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .zone-btn {
            flex: 1; min-width: 80px; padding: 12px; border: 2px solid #c8e6c9; background: white;
            border-radius: 14px; cursor: pointer; font-weight: 600; text-align: center; transition: all 0.2s;
            color: #1b5e20;
        }
        .zone-btn.active {
            background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; border-color: #1b5e20;
        }

        .greenhouse-card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border: 1px solid #c8e6c9; position: relative; transition: 0.2s;
        }
        .greenhouse-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%;
            background: linear-gradient(135deg, #2e7d32, #66bb6a); border-radius: 20px 0 0 20px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .greenhouse-badge {
            background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; padding: 6px 14px;
            border-radius: 30px; font-weight: 600; font-size: 13px;
        }
        .card-actions { display: flex; gap: 10px; }
        .smart-btn {
            padding: 8px 14px; border: none; border-radius: 30px; cursor: pointer;
            font-weight: 500; font-size: 12px; display: inline-flex; align-items: center; gap: 6px;
            transition: 0.2s;
        }
        .smart-btn-primary { background: #2e7d32; color: white; }
        .smart-btn-secondary { background: #ff9800; color: white; }
        .smart-btn-danger { background: #f44336; color: white; }

        .btn-submit {
            background: linear-gradient(135deg, #2e7d32, #1b5e20); color: white; padding: 16px;
            font-size: 16px; font-weight: 700; border: none; border-radius: 50px; width: 100%;
            margin-top: 10px; cursor: pointer; transition: 0.2s;
        }
        .btn-submit:hover { background: linear-gradient(135deg, #1b5e20, #2e7d32); transform: translateY(-2px); }

        .harvest-table-container {
            background: #e8f5e9; border-radius: 20px; padding: 20px; margin-top: 20px;
            border: 2px solid #a5d6a7; overflow-x: auto;
        }
        .monthly-harvest-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; }
        .monthly-harvest-table th, .monthly-harvest-table td { border: 1px solid #c8e6c9; padding: 10px 6px; text-align: center; }
        .monthly-harvest-table th { background: #2e7d32; color: white; font-size: 13px; font-weight: 600; }
        .monthly-harvest-table input { width: 90px; padding: 8px; text-align: center; border: 1px solid #c8e6c9; border-radius: 8px; }
        .avg-yield-section {
            background: #f1f8e9; border-radius: 16px; padding: 16px; margin-top: 16px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px;
        }

        .footer {
            background: rgba(255,255,255,0.9); border-radius: 20px; padding: 16px;
            text-align: center; color: #1b5e20; font-size: 11px; margin-top: 20px;
            border: 1px solid #c8e6c9;
        }
        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: 400px; margin: 0 auto;
            background: white; padding: 14px 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(100px); transition: transform 0.3s;
            z-index: 1000; text-align: center; font-weight: 500;
        }
        .toast.show { transform: translateY(0); }
        .toast.success { border-left: 4px solid #4caf50; }
        .toast.error { border-left: 4px solid #f44336; }

        @media (max-width: 768px) {
            .monthly-harvest-table input { width: 60px; }
            .zone-btn { padding: 8px; font-size: 12px; }
            .badge-group { margin-top: 6px; }
            .veg-icons { margin-top: 6px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="modern-header">
        <div class="title-section">
            <div class="icon-badge"><i class="fas fa-leaf"></i></div>
            <h1>Hydroponic Data Tracker</h1>
            <div class="badge-group">
                <span class="beta-badge">GREEN EDITION</span>
                <button class="version-btn" onclick="showVersionAlert()">BETA VERSION 2.0</button>
            </div>
        </div>
        <div class="subtitle">
            <span><i class="fas fa-microchip"></i> Smart Data Capture • Real‑time insights</span>
            <div class="veg-icons">
                <i class="fas fa-tomato"></i><span>Tomato</span>
                <i class="fas fa-pepper-hot"></i><span>Bell Pepper</span>
                <i class="fas fa-cucumber"></i><span>Cucumber</span>
                <i class="fas fa-leaf"></i><span>Lettuce</span>
            </div>
        </div>
    </div>

    <!-- Zone Selection -->
    <div class="form-section">
        <div class="section-title"><i class="fas fa-map-marker-alt"></i> Select Zone</div>
        <div class="zone-buttons" id="zoneButtons">
            <button class="zone-btn" data-zone="E1">📍 E1</button><button class="zone-btn" data-zone="E2">📍 E2</button>
            <button class="zone-btn" data-zone="E3">📍 E3</button><button class="zone-btn" data-zone="E4">📍 E4</button>
        </div>
    </div>

    <!-- Grower Information -->
    <div class="form-section">
        <div class="section-title"><i class="fas fa-user-friends"></i> Grower Information</div>
        <div class="smart-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
            <div class="input-group"><label><i class="fas fa-user"></i> Grower Name *</label><input type="text" id="growerName" placeholder="Enter name"></div>
            <div class="input-group"><label><i class="fas fa-map-marker-alt"></i> Locality</label><input type="text" id="locality" list="localityList"><datalist id="localityList"></datalist></div>
            <div class="input-group"><label><i class="fas fa-layer-group"></i> Zone</label><input type="text" id="zoneDisplay" readonly></div>
            <div class="input-group"><label><i class="fas fa-chart-line"></i> Total Area (m²)</label><input type="number" id="totalArea" step="0.01" placeholder="Total greenhouse area"></div>
        </div>
    </div>

    <!-- Greenhouse Details -->
    <div class="form-section">
        <div class="section-title">
            <i class="fas fa-greenhouse"></i> <span>Greenhouse Details</span>
            <button class="smart-btn smart-btn-primary" onclick="addGreenhouse()" style="margin-left: auto;"><i class="fas fa-plus"></i> Add Greenhouse</button>
        </div>
        <div id="greenhousesContainer"></div>
    </div>

    <button class="btn-submit" onclick="submitData()"><i class="fas fa-cloud-upload-alt"></i> Submit Data</button>
    <div class="footer"><i class="fas fa-leaf"></i> Hydroponic Data Tracker – All Rights Reserved 2026</div>
</div>
<div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

<script>
    // ==================== LOCALITIES (Zone-specific) ====================
    const zoneE1Localities = ["Alma","Bagatelle Dam","Bar Le Duc","Beau Bois","Bell Village","Belle Rive","Bonne Veine","Camp Auguste","Circonstance","Cote D'Or","Dagotiere","Gentilly","Guibies","Helvetia","Hermitage","L'Agrement","L'Assurance","L'Avenir","L'Escalier Br Rd","L'Esperance","La Laura","Le Pouce","Malinga","Minissy","Moka","Nouvelle Decouverte","Petit Verger","Providence","Quartier Militaire","Reduit","Ripailles","Riviere Baptiste","Roselyn Cottage","Soreze","St Pierre","Valetta","Verdun"];
    const zoneE2Localities = ["Balance John","Beau Bois","Bel Etang","Belvédère","Bon Accueil","Bonne Mere","Brisée Verdière","Camp de Masque","Camp Thorel","Fuel","Gaulettes Serrées","Gibraltar","Grand Bas Fond","Lallmatie","Latapie","L'Unité","Médine Camp de Masque","Melrose","Mission Cross Rd","Mont Ida","Montagne Blanche","Pellegrin","Petit Paquet","Pont Bon Dieu","Providence","Quatre Bords","Queen Victoria","Riche Fond","Salazie","Salazie Rd","Sans Soucis","St Julien d'Hotman","St Julien Village"];
    const zoneE3Localities = ["Argy","Beau Bois","Beau Rivage","Belle Mare","Belle Vue Allendy","Bois d'Oiseaux","Bramsthan","Bras d'Eau","Camp Garreau","Camp Ithier","Camp Marcelin","Camp Poorun","Camp Raffia","Camp Ranoo","Centre de Flacq","Constance","Grande Retraite","Hermitage","Isidore Rose","Kashinath","La Porte Providence","Laventure","Mare Choisy","Mare du Puits","Mare la Chaux","Mare Providence","Mare Tapsy","Morc Constance","Nehru Nagar","Palmar","Petite Retraite","Plaine de Gersigny","Pont Blanc","Poste de Flacq","Quatre Cocos","Riche Mare","Sept Croisées","St Rémy","Trou d'Eau Douce","Victoria"];
    const zoneE4Localities = ["Balance John","Beau Champ","Beau Vallon","Bel Air Rivière Sèche","Belle Rive","Belle Rose","Bois Marchand","Camp Beau Bois","Camp de Masque Pavé","Camp Jackerie","Caroline","Cent Gaulettes","Clavet","Clémencia","Deep River","Deux Frères","Ecroignard","Ernest Florent","Grand River South East","Ilot","Kewal Nagar","La Laura","La Lucie Roy","La Nourrice","Laventure","Lesur","L'Etoile","Mare aux Goyaves","Mare Carrée","Mare Triton","Marie Jeanne","Morc Roy","Morc Sohawon","Olivia","Pellegrin","Petit Bois","Petite Cabane","Plaine Bananes","Pointe aux Feuilles","Pont Lardier","Quatre Soeurs","Sebastopol","Trois Ilots"];
    
    const cropOptions = ["Cabbage","Cauliflower","English Cucumber","Lettuce","Melon","Sweet Pepper","Shallot","Greens","Tomato","Okra","Chillies","Eggplant"];
    const unitBasedCrops = ["English Cucumber", "Cabbage", "Cauliflower", "Lettuce", "Melon"];
    const tomatoTypeOptions = ["Cooking","Salad","Cherry"];
    const productionSystemOptions = ["Cocopeat", "Aggregates", "Woodchips", "NFT", "DFT", "Aquaponics"];
    const cropStageOptions = ["Seedling","Vegetative","Flowering","Fruiting","Harvesting"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    
    let currentZone = "E2";
    let greenhouseCounter = 1;
    let activeGrowersSet = new Set();
    window.monthlyHarvestData = {};
    const SCRIPT_URL = '
https://script.google.com/macros/s/AKfycby5Mh8pLykT-83iQ9H9xnA4TqIYjyJ7Qc9VfJUO0GEwoDcmqLEQ1pAzaURY1W_lKXF_mA/exec';  // <-- Replace with your actual URL
    
    // ==================== Helper Functions ====================
    function updateLocalitiesByZone(zone) {
        let localities = zone==='E1'?zoneE1Localities:zone==='E2'?zoneE2Localities:zone==='E3'?zoneE3Localities:zoneE4Localities;
        const list = document.getElementById('localityList');
        list.innerHTML = '';
        localities.forEach(loc => { let opt = document.createElement('option'); opt.value = loc; list.appendChild(opt); });
        document.getElementById('zoneDisplay').value = `Zone ${zone}`;
    }
    function initZoneButtons() {
        document.querySelectorAll('.zone-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.zone-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentZone = btn.dataset.zone;
                updateLocalitiesByZone(currentZone);
                showToast(`Zone ${currentZone} selected`);
            });
        });
    }
    function showToast(msg, isErr=false) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').innerText = msg;
        toast.className = `toast show ${isErr?'error':'success'}`;
        setTimeout(()=>toast.classList.remove('show'),3000);
    }
    function getDisplayUnit(crop) { return unitBasedCrops.includes(crop) ? "units" : "kg"; }
    function getConversionNote(crop) {
        const notes = {
            "English Cucumber": "1 unit ≈ 350‑500 g (approx. 2‑3 units per kg)",
            "Cabbage": "1 unit ≈ 1000 g (1 kg) → 1 unit per kg",
            "Cauliflower": "1 unit ≈ 500‑750 g (approx. 1.5‑2 units per kg)",
            "Lettuce": "1 unit ≈ 400‑600 g (approx. 2‑2.5 units per kg)",
            "Melon": "1 unit ≈ 1000‑1500 g (approx. 0.7‑1 unit per kg)"
        };
        return notes[crop] || "Yield measured in kilograms (kg)";
    }
    
    function updateSessionInfo() {
        const growerName = document.getElementById('growerName').value.trim();
        if (growerName) activeGrowersSet.add(growerName);
    }
    function setGrower(name) { document.getElementById('growerName').value = name; updateSessionInfo(); showToast(`Grower set to ${name}`); }
    function showVersionAlert() { showToast("Beta Version 2.0 – Improved monthly harvest tracking & UI enhancements"); }
    
    // ==================== Monthly Harvest Table ====================
    function generateMonthlyHarvestTableHTML(greenhouseId, cropType, existingData = null) {
        const displayUnit = getDisplayUnit(cropType);
        const rowGroups = [
            ["January", "February", "March"],
            ["April", "May", "June"],
            ["July", "August", "September"],
            ["October", "November", "December"]
        ];
        let html = `<div class="harvest-table-container">
            <div style="font-weight:700; margin-bottom:15px; color:#2e7d32;"><i class="fas fa-chart-line"></i> 📊 MONTHLY HARVEST YIELD (${displayUnit.toUpperCase()})</div>
            <table class="monthly-harvest-table">`;
        for (let group of rowGroups) {
            html += `<tr>`;
            for (let month of group) {
                const saved = (existingData && existingData[month]) ? existingData[month].yield : '';
                html += `<th style="background:#2e7d32; color:white; padding:8px;">${month.substring(0,3)}</th>`;
                html += `<td><input type="number" class="month-harvest-input" data-greenhouse="${greenhouseId}" data-month="${month}" value="${saved}" step="${displayUnit==='units'?1:0.01}" placeholder="${displayUnit}" style="width:90px;"></td>`;
            }
            html += `</tr>`;
        }
        html += `</tbody>
            </table>
            <div class="avg-yield-section">
                <div class="input-group"><label>Avg Yield/Week (${displayUnit})</label><input type="number" class="avg-weekly-yield" step="0.01"></div>
                <div class="input-group"><label>Avg Yield/Month (${displayUnit})</label><input type="number" class="avg-monthly-yield" step="0.01"></div>
                <div class="input-group"><label>Months Harvesting</label><input type="number" class="harvest-months" step="1" min="0" max="12"></div>
            </div>
            <div style="background:#f1f8e9; padding:10px; border-radius:12px; font-size:11px; margin-top:12px;">
                <i class="fas fa-info-circle"></i> ${getConversionNote(cropType)}
            </div>
        </div>`;
        return html;
    }
    
    window.toggleHarvestSection = function(selectElement) {
        const card = selectElement.closest('.greenhouse-card');
        const id = card.id.split('-')[1];
        const cropSelect = card.querySelector('.gh-crop');
        const cropType = cropSelect?.value || '';
        const existingSection = card.querySelector('.harvest-table-container');
        if (selectElement.value === 'Harvesting' && cropType) {
            if (existingSection) existingSection.remove();
            const html = generateMonthlyHarvestTableHTML(id, cropType, window.monthlyHarvestData[id]);
            card.insertAdjacentHTML('beforeend', html);
            card.querySelectorAll('.month-harvest-input').forEach(inp => {
                inp.addEventListener('change', function() {
                    const month = this.dataset.month;
                    const val = parseFloat(this.value)||0;
                    const ghId = this.dataset.greenhouse;
                    const currentCrop = card.querySelector('.gh-crop').value;
                    const unit = getDisplayUnit(currentCrop);
                    if (!window.monthlyHarvestData[ghId]) window.monthlyHarvestData[ghId] = {};
                    window.monthlyHarvestData[ghId][month] = { yield: val, unit: unit, crop: currentCrop };
                });
            });
            const avgWeekly = card.querySelector('.avg-weekly-yield');
            const avgMonthly = card.querySelector('.avg-monthly-yield');
            const harvestMonths = card.querySelector('.harvest-months');
            if (avgWeekly) avgWeekly.addEventListener('change', function() { if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {}; window.monthlyHarvestData[id].avgWeeklyYield = parseFloat(this.value)||0; });
            if (avgMonthly) avgMonthly.addEventListener('change', function() { if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {}; window.monthlyHarvestData[id].avgMonthlyYield = parseFloat(this.value)||0; });
            if (harvestMonths) harvestMonths.addEventListener('change', function() { if (!window.monthlyHarvestData[id]) window.monthlyHarvestData[id] = {}; window.monthlyHarvestData[id].harvestMonthsCount = parseFloat(this.value)||0; });
        } else {
            if (existingSection) existingSection.remove();
            if (window.monthlyHarvestData[id]) delete window.monthlyHarvestData[id];
        }
    };
    
    window.toggleTomatoType = function(selectElement) {
        const card = selectElement.closest('.greenhouse-card');
        const tomatoGroup = card.querySelector('.tomato-type-group');
        if (tomatoGroup) tomatoGroup.style.display = selectElement.value === 'Tomato' ? 'block' : 'none';
    };
    
    // ==================== HTML Generators ====================
    function getCropOptionsHTML(sel) { let html='<option value="">Select Crop</option>'; cropOptions.forEach(c=>html+=`<option value="${c}" ${sel===c?'selected':''}>${c}</option>`); return html; }
    function getTomatoTypeOptionsHTML(sel) { let html='<option value="">Select Tomato Type</option>'; tomatoTypeOptions.forEach(t=>html+=`<option value="${t}" ${sel===t?'selected':''}>${t}</option>`); return html; }
    function getProductionSystemOptionsHTML(sel) { let html='<option value="">Select Production System</option>'; productionSystemOptions.forEach(s=>html+=`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`); return html; }
    function getCropStageOptionsHTML(sel) { let html='<option value="">Select Stage</option>'; cropStageOptions.forEach(s=>html+=`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`); return html; }
    
    // ==================== Greenhouse Management ====================
    window.addGreenhouse = function(data = null) {
        console.log("addGreenhouse called");
        const container = document.getElementById('greenhousesContainer');
        if (!container) {
            console.error("greenhousesContainer not found!");
            return;
        }
        const id = greenhouseCounter++;
        const showTomato = data?.cropType === 'Tomato';
        const div = document.createElement('div');
        div.className = 'greenhouse-card';
        div.id = `greenhouse-${id}`;
        div.innerHTML = `
            <div class="card-header">
                <div class="greenhouse-badge"><i class="fas fa-seedling"></i> Greenhouse ${id}</div>
                <div class="card-actions">
                    <button class="smart-btn smart-btn-secondary" onclick="duplicateGreenhouse(${id})"><i class="fas fa-copy"></i> Duplicate</button>
                    <button class="smart-btn smart-btn-danger" onclick="removeGreenhouse(${id})"><i class="fas fa-trash"></i> Remove</button>
                </div>
            </div>
            <div class="smart-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
                <div class="input-group"><label>Area (m²)</label><input type="number" class="gh-area" step="0.01" value="${data?.area||''}" oninput="updateSessionInfo()"></div>
                <div class="input-group"><label>Crop</label><select class="gh-crop" onchange="toggleTomatoType(this); updateSessionInfo()">${getCropOptionsHTML(data?.cropType||'')}</select></div>
                <div class="input-group"><label>Variety</label><input type="text" class="gh-variety" value="${data?.variety||''}" oninput="updateSessionInfo()"></div>
                <div class="input-group"><label>Crop Stage</label><select class="gh-stage" onchange="toggleHarvestSection(this)">${getCropStageOptionsHTML(data?.cropStage||'')}</select></div>
                <div class="input-group"><label>Date Transplanted</label><input type="date" class="gh-transplant" value="${data?.transplantDate||''}"></div>
                <div class="input-group"><label>Production System Type</label><select class="gh-substrate">${getProductionSystemOptionsHTML(data?.substrateType||'')}</select></div>
                <div class="input-group tomato-type-group" style="display:${showTomato?'block':'none'}"><label>Tomato Type</label><select class="gh-tomatotype">${getTomatoTypeOptionsHTML(data?.tomatoType||'')}</select></div>
            </div>
        `;
        container.appendChild(div);
        if (data?.cropStage === 'Harvesting' && data?.cropType) {
            window.monthlyHarvestData[id] = data.monthlyHarvest || {};
            setTimeout(()=>{ let stageSel = div.querySelector('.gh-stage'); if(stageSel) window.toggleHarvestSection(stageSel); },100);
        }
        updateSessionInfo();
        console.log("Greenhouse card added, id=" + id);
    };
    
    window.removeGreenhouse = function(id) {
        const el = document.getElementById(`greenhouse-${id}`);
        if (el) el.remove();
        delete window.monthlyHarvestData[id];
        updateSessionInfo();
        showToast('Greenhouse removed');
    };
    
    window.duplicateGreenhouse = function(id) {
        const src = document.getElementById(`greenhouse-${id}`);
        if (!src) return;
        window.addGreenhouse({
            area: src.querySelector('.gh-area').value,
            cropType: src.querySelector('.gh-crop').value,
            variety: src.querySelector('.gh-variety').value,
            cropStage: src.querySelector('.gh-stage').value,
            transplantDate: src.querySelector('.gh-transplant').value,
            substrateType: src.querySelector('.gh-substrate').value,
            tomatoType: src.querySelector('.gh-tomatotype')?.value || '',
            monthlyHarvest: window.monthlyHarvestData[id] || {}
        });
        showToast('Greenhouse duplicated');
    };
    
    // ==================== Submit Data ====================
    window.submitData = async function() {
        const grower = document.getElementById('growerName').value.trim();
        if (!grower) { showToast('Enter grower name', true); return; }
        const greenhouses = [];
        document.querySelectorAll('.greenhouse-card').forEach(card => {
            const id = card.id.split('-')[1];
            const monthlyHarvestForGH = window.monthlyHarvestData[id] || {};
            const monthInputs = card.querySelectorAll('.month-harvest-input');
            monthInputs.forEach(inp => {
                const month = inp.dataset.month;
                const val = parseFloat(inp.value) || 0;
                if (val > 0) {
                    if (!monthlyHarvestForGH[month]) monthlyHarvestForGH[month] = {};
                    monthlyHarvestForGH[month].yield = val;
                    monthlyHarvestForGH[month].unit = getDisplayUnit(card.querySelector('.gh-crop').value);
                    monthlyHarvestForGH[month].crop = card.querySelector('.gh-crop').value;
                }
            });
            const avgWeekly = card.querySelector('.avg-weekly-yield')?.value;
            const avgMonthly = card.querySelector('.avg-monthly-yield')?.value;
            const harvestMonthsCount = card.querySelector('.harvest-months')?.value;
            if (avgWeekly) monthlyHarvestForGH.avgWeeklyYield = parseFloat(avgWeekly);
            if (avgMonthly) monthlyHarvestForGH.avgMonthlyYield = parseFloat(avgMonthly);
            if (harvestMonthsCount) monthlyHarvestForGH.harvestMonthsCount = parseFloat(harvestMonthsCount);
            window.monthlyHarvestData[id] = monthlyHarvestForGH;
            greenhouses.push({
                area: card.querySelector('.gh-area').value,
                cropType: card.querySelector('.gh-crop').value,
                variety: card.querySelector('.gh-variety').value,
                cropStage: card.querySelector('.gh-stage').value,
                transplantDate: card.querySelector('.gh-transplant').value,
                substrateType: card.querySelector('.gh-substrate').value,
                tomatoType: card.querySelector('.gh-tomatotype')?.value || '',
                monthlyHarvest: monthlyHarvestForGH
            });
        });
        const payload = {
            growerName: grower,
            locality: document.getElementById('locality').value,
            zone: currentZone,
            totalGreenhouseArea: document.getElementById('totalArea').value,
            greenhouses: greenhouses,
            submittedAt: new Date().toISOString()
        };
        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            showToast('✓ Data submitted successfully!');
            document.getElementById('growerName').value = '';
            document.getElementById('locality').value = '';
            document.getElementById('totalArea').value = '';
            while (document.querySelectorAll('.greenhouse-card').length > 1) document.querySelector('.greenhouse-card:last-child').remove();
            const firstGH = document.querySelector('.greenhouse-card');
            if (firstGH) firstGH.querySelectorAll('input, select').forEach(f => { if (f.type !== 'button') f.value = ''; });
            window.monthlyHarvestData = {};
            document.querySelectorAll('.harvest-table-container').forEach(s => s.remove());
            activeGrowersSet.clear();
            updateSessionInfo();
        } catch (err) {
            showToast('Error: ' + err.message, true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Submit Data';
        }
    };
    
    // ==================== Event Listeners ====================
    document.getElementById('growerName').addEventListener('input', function() {
        if (this.value.trim()) activeGrowersSet.add(this.value.trim());
        updateSessionInfo();
    });
    document.getElementById('growerName').addEventListener('change', function() {
        let n = this.value.trim();
        if (n) {
            let r = JSON.parse(sessionStorage.getItem('recentGrowers') || '[]');
            if (!r.includes(n)) { r.push(n); sessionStorage.setItem('recentGrowers', JSON.stringify(r.slice(-10))); }
        }
        updateSessionInfo();
    });
    
    // ==================== Initialization ====================
    window.addEventListener('DOMContentLoaded', () => {
        console.log("DOMContentLoaded fired");
        initZoneButtons();
        updateLocalitiesByZone('E2');
        // Create the first greenhouse card
        window.addGreenhouse();
        updateSessionInfo();
    });
</script>
</body>
</html>
