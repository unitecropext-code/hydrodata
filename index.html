<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hydroponic Data Tracker | Google Sheets Tabular Format</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f3ea 0%, #d0e6d4 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app-wrapper {
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .header h1 {
      background: linear-gradient(125deg, #0f3b1a, #1f6e2c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .header h1:before {
      content: "🌊";
      font-size: 2rem;
      color: #2b6e3c;
    }

    .subhead {
      color: #2c5e2f;
      font-weight: 500;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 2rem;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 32, 0, 0.12);
      border: 1px solid rgba(70, 120, 70, 0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-weight: 700;
      color: #1a5a20;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    input, select {
      padding: 0.75rem 1rem;
      border: 2px solid #e2efe3;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #2e8836;
      outline: none;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    }

    button {
      background: #1f6e2c;
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: #0f551b;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #6c8f72;
    }

    button.secondary:hover {
      background: #53755a;
    }

    .greenhouse-section {
      border-top: 2px dashed #bddcb9;
      padding-top: 1.2rem;
      margin-top: 0.8rem;
    }

    .greenhouse-card {
      background: #fafef7;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #2c7a2e;
    }

    .gh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .remove-gh {
      background: #fff0f0;
      color: #bc544b;
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      border-radius: 2rem;
      cursor: pointer;
    }

    .harvest-fields {
      display: none;
      grid-column: 1 / -1;
      background: #eef5ea;
      padding: 1rem 1.2rem;
      border-radius: 1.2rem;
      margin-top: 0.6rem;
    }

    .harvest-fields.active {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .tomato-type-field {
      display: none;
      margin-top: 0.8rem;
      padding-left: 0.2rem;
    }
    .tomato-type-field.active {
      display: block;
    }
    .tomato-type-field select {
      margin-top: 0.3rem;
      width: 100%;
      max-width: 250px;
    }

    .success-message {
      display: none;
      background: #2c7a2e;
      color: white;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3b22;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      z-index: 1200;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .footer-note {
      text-align: center;
      color: #6a8e6f;
      font-size: 0.8rem;
      margin-top: 1.5rem;
      padding: 0.8rem;
      border-top: 1px solid #c8e0c4;
      font-style: italic;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <h1>Hydroponic Data Tracker</h1>
    <div class="subhead">🌿 Smart Greenhouse Management · Direct to Google Sheets</div>
  </div>

  <!-- Data Entry Form -->
  <div class="card">
    <form id="hydroponicForm">
      <div class="form-grid">
        <div class="input-group">
          <label>👨‍🌾 Grower Name *</label>
          <input type="text" id="growerName" placeholder="Full name" required>
        </div>
        <div class="input-group">
          <label>📐 Total Hydroponic Area (m²) *</label>
          <input type="number" id="totalArea" step="0.1" placeholder="Total square meters" required>
        </div>
      </div>

      <div class="greenhouse-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem;">
          <strong>🏡 Greenhouse Details (each greenhouse = one row in sheet)</strong>
          <button type="button" id="addGreenhouseBtn" style="background:#2b6e3c; padding: 0.4rem 1.2rem;">+ Add Greenhouse</button>
        </div>
        <div id="greenhouseList"></div>
      </div>

      <div class="btn-group">
        <button type="submit">💾 Save to Google Sheets</button>
        <button type="button" id="resetBtn" class="secondary">⟳ Clear Form</button>
      </div>
    </form>
    <div id="successMessage" class="success-message"></div>
  </div>
  
  <div class="footer-note">
    All rights reserved. Beta Version 2026
  </div>
</div>

<script>
// ============================================================
// GOOGLE APPS SCRIPT WEB APP URL (Replace with your deployed URL)
// ============================================================
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYmctO2RzWdoebrnVWDM-WG4RetgLo_ssgNxxQDLLNeGnXWynbTMCEMlyIlmRKVlI/exec';

const cropOptions = [
  "Cabbage", "Cauliflower", "English Cucumber", "Lettuce", 
  "Shallot", "Greens", "Melon", "Okra", "Chillies", 
  "Sweet Pepper", "Tomato"
];

const tomatoTypes = ["Cooking", "Salad", "Cherry"];

let greenhouseCounter = 1;

// ---------- Build Greenhouse Card ----------
function buildGreenhouseCard(sequence, prefillData = null) {
  const p = prefillData || {};
  const today = new Date().toISOString().slice(0, 10);
  const wrapper = document.createElement('div');
  wrapper.className = 'greenhouse-card';
  
  wrapper.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <strong>🌱 Greenhouse ${sequence}</strong>
      ${sequence > 1 ? '<button type="button" class="remove-gh">✖ Remove</button>' : '<span style="font-size:0.7rem; background:#dff0df; padding:2px 12px; border-radius:20px;">Primary</span>'}
    </div>
    <div class="gh-grid">
      <div><label>Area (m²) *</label><input type="number" step="0.1" class="gh-area" value="${p.area || ''}" placeholder="m²" required></div>
      <div><label>Crop Type *</label><select class="gh-crop" required>
        <option value="">-- Select --</option>
        ${cropOptions.map(c => `<option value="${c}" ${p.cropType === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>
      <div><label>Variety *</label><input type="text" class="gh-variety" value="${p.variety || ''}" placeholder="e.g., Butterhead, Roma" required></div>
      <div><label>Crop Stage *</label><select class="gh-stage" required>
        <option ${p.cropStage === 'Seedling' ? 'selected' : ''}>Seedling</option>
        <option ${p.cropStage === 'Vegetative' ? 'selected' : ''}>Vegetative</option>
        <option ${p.cropStage === 'Flowering' ? 'selected' : ''}>Flowering</option>
        <option ${p.cropStage === 'Harvest' ? 'selected' : ''}>Harvest</option>
      </select></div>
      <div><label>Date Transplanted *</label><input type="date" class="gh-transplant" value="${p.transplantDate || today}" required></div>
    </div>
    <div class="tomato-type-field">
      <label style="font-weight:600; color:#b45116;">🍅 Tomato Type (for Tomato crops)</label>
      <select class="gh-tomato-type">
        <option value="">-- Select type --</option>
        ${tomatoTypes.map(t => `<option value="${t}" ${p.tomatoType === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="harvest-fields">
      <div><label>📆 Months of Harvest</label><input type="number" step="0.5" class="gh-harvest-months" value="${p.harvestMonths || ''}" placeholder="Duration in months"></div>
      <div><label>📊 Av Yield per Week (kg)</label><input type="text" class="gh-yield-week" value="${p.avgYieldWeek || ''}" placeholder="kg/week"></div>
      <div><label>📈 Av Yield per Month (kg)</label><input type="text" class="gh-yield-month" value="${p.avgYieldMonth || ''}" placeholder="kg/month"></div>
    </div>
  `;
  
  const cropSelect = wrapper.querySelector('.gh-crop');
  const tomatoDiv = wrapper.querySelector('.tomato-type-field');
  const tomatoSelect = wrapper.querySelector('.gh-tomato-type');
  const stageSelect = wrapper.querySelector('.gh-stage');
  const harvestDiv = wrapper.querySelector('.harvest-fields');
  
  const updateTomatoVisibility = () => {
    if (cropSelect.value === 'Tomato') {
      tomatoDiv.classList.add('active');
      tomatoSelect.required = true;
    } else {
      tomatoDiv.classList.remove('active');
      tomatoSelect.required = false;
      tomatoSelect.value = '';
    }
  };
  
  const updateHarvestVisibility = () => {
    if (stageSelect.value === 'Harvest') {
      harvestDiv.classList.add('active');
      wrapper.querySelector('.gh-harvest-months').required = true;
    } else {
      harvestDiv.classList.remove('active');
      wrapper.querySelector('.gh-harvest-months').required = false;
    }
  };
  
  cropSelect.addEventListener('change', updateTomatoVisibility);
  stageSelect.addEventListener('change', updateHarvestVisibility);
  
  updateTomatoVisibility();
  updateHarvestVisibility();
  
  if (sequence > 1) {
    wrapper.querySelector('.remove-gh')?.addEventListener('click', () => wrapper.remove());
  }
  
  return wrapper;
}

function addNewGreenhouse() {
  const container = document.getElementById('greenhouseList');
  greenhouseCounter++;
  container.appendChild(buildGreenhouseCard(greenhouseCounter));
}

// Collect data in exact tabular format matching requested columns
function collectTabularData() {
  const growerName = document.getElementById('growerName').value.trim();
  const totalAreaRaw = document.getElementById('totalArea').value;
  const totalArea = parseFloat(totalAreaRaw);
  
  if (!growerName) { alert("Please enter Grower Name"); return null; }
  if (isNaN(totalArea) || totalArea <= 0) { alert("Please enter valid Total Hydroponic Area"); return null; }
  
  const cards = document.querySelectorAll('#greenhouseList .greenhouse-card');
  if (cards.length === 0) { alert("Please add at least one greenhouse"); return null; }
  
  const rows = [];
  const formattedTimestamp = new Date().toLocaleString('en-US', { 
    year: 'numeric', month: '2-digit', day: '2-digit', 
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false 
  });
  
  for (let idx = 0; idx < cards.length; idx++) {
    const card = cards[idx];
    const areaVal = parseFloat(card.querySelector('.gh-area').value);
    const cropType = card.querySelector('.gh-crop').value;
    const variety = card.querySelector('.gh-variety').value.trim();
    const cropStage = card.querySelector('.gh-stage').value;
    const transplantDate = card.querySelector('.gh-transplant').value;
    
    // Tomato type validation
    let tomatoType = '';
    if (cropType === 'Tomato') {
      const tomatoSelect = card.querySelector('.gh-tomato-type');
      tomatoType = tomatoSelect ? tomatoSelect.value : '';
      if (!tomatoType) {
        alert(`Greenhouse ${idx+1}: Tomato crop requires selecting Tomato Type (Cooking, Salad, or Cherry).`);
        return null;
      }
    }
    
    if (!cropType) { alert(`Greenhouse ${idx+1}: Please select a Crop`); return null; }
    if (!variety) { alert(`Greenhouse ${idx+1}: Please enter Variety`); return null; }
    if (isNaN(areaVal) || areaVal <= 0) { alert(`Greenhouse ${idx+1}: Please enter valid Area (m²)`); return null; }
    if (!transplantDate) { alert(`Greenhouse ${idx+1}: Please select Date Transplanted`); return null; }
    
    let harvestMonths = '';
    let yieldWeek = '';
    let yieldMonth = '';
    if (cropStage === 'Harvest') {
      const hm = card.querySelector('.gh-harvest-months').value;
      if (!hm || parseFloat(hm) <= 0) {
        alert(`Greenhouse ${idx+1}: Harvest stage requires Months of Harvest`);
        return null;
      }
      harvestMonths = hm;
      yieldWeek = card.querySelector('.gh-yield-week').value || '';
      yieldMonth = card.querySelector('.gh-yield-month').value || '';
    }
    
    // Create row exactly matching the required columns:
    // Timestamp | Grower Name | Total Area (m2) | GH # | Crop | Variety | Crop Stage | Area (m2) | Date Transplanted | Av Yield per Week | Av Yield per Month | Months of Harvest | Tomato Type
    rows.push({
      timestamp: formattedTimestamp,
      isoDate: new Date().toISOString(),
      growerName: growerName,
      totalAreaM2: totalArea,
      greenhouseNumber: idx + 1,
      crop: cropType,
      variety: variety,
      cropStage: cropStage,
      areaM2: areaVal,
      dateTransplanted: transplantDate,
      avgYieldPerWeek: yieldWeek,
      avgYieldPerMonth: yieldMonth,
      monthsOfHarvest: harvestMonths,
      tomatoType: tomatoType
    });
  }
  return rows;
}

// Send data to Google Sheets with exact column mapping
async function sendToGoogleSheets(tabularRows) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    console.warn("Google Sheets URL not configured");
    return false;
  }
  
  try {
    // Prepare payload with explicit column headers as requested
    const payload = {
      action: "saveHydroponicTabular",
      headers: [
        "Timestamp",
        "Grower Name",
        "Total Area (m2)",
        "GH #",
        "Crop",
        "Variety",
        "Crop Stage",
        "Area (m2)",
        "Date Transplanted",
        "Av Yield per Week (kg or unit)",
        "Av Yield per Month (kg or unit)",
        "Months of Harvest",
        "Tomato Type"
      ],
      records: tabularRows.map(row => [
        row.timestamp,
        row.growerName,
        row.totalAreaM2,
        row.greenhouseNumber,
        row.crop,
        row.variety,
        row.cropStage,
        row.areaM2,
        row.dateTransplanted,
        row.avgYieldPerWeek,
        row.avgYieldPerMonth,
        row.monthsOfHarvest,
        row.tomatoType
      ]),
      submittedAt: new Date().toISOString()
    };
    
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    return true;
  } catch (error) {
    console.error("Network error sending to Google Sheets:", error);
    return false;
  }
}

// Show toast message
function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = message;
  if (isError) toast.style.background = '#c54534';
  else toast.style.background = '#1f6e2c';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// Main form submit handler
async function handleFormSubmit(event) {
  event.preventDefault();
  
  const tabularData = collectTabularData();
  if (!tabularData) return;
  
  // Show saving indicator
  const submitBtn = document.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = '⏳ Saving to Google Sheets...';
  submitBtn.disabled = true;
  
  try {
    const success = await sendToGoogleSheets(tabularData);
    
    const successDiv = document.getElementById('successMessage');
    if (success) {
      const recordCount = tabularData.length;
      successDiv.innerHTML = `✅ Success! ${recordCount} greenhouse record(s) saved to Google Sheets.`;
      successDiv.style.background = '#1f6e2c';
      showToast(`✓ ${recordCount} record(s) saved to Google Sheets`);
      resetFormFields();
    } else {
      successDiv.innerHTML = `⚠️ Unable to reach Google Sheets. Please check your internet connection and verify the Apps Script URL.`;
      successDiv.style.background = '#e68a2e';
      showToast('❌ Failed to save to Google Sheets', true);
    }
    successDiv.style.display = 'block';
    setTimeout(() => { successDiv.style.display = 'none'; }, 6000);
  } catch (err) {
    console.error("Submission error:", err);
    showToast('Error saving data', true);
    const successDiv = document.getElementById('successMessage');
    successDiv.innerHTML = `❌ Error: ${err.message || 'Could not save to Google Sheets'}`;
    successDiv.style.background = '#c54534';
    successDiv.style.display = 'block';
    setTimeout(() => { successDiv.style.display = 'none'; }, 5000);
  } finally {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
  }
}

function resetFormFields() {
  document.getElementById('growerName').value = '';
  document.getElementById('totalArea').value = '';
  document.getElementById('greenhouseList').innerHTML = '';
  greenhouseCounter = 1;
  document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(1));
}

function manualReset() {
  if (confirm('Clear all form inputs? Unsaved data will be lost.')) {
    resetFormFields();
    showToast('Form cleared');
  }
}

// Silent connection test
async function testConnection() {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    console.log("⚠️ Please configure GOOGLE_SCRIPT_URL with your Apps Script Web App URL");
    return;
  }
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 5000);
    await fetch(GOOGLE_SCRIPT_URL, { method: 'GET', signal: controller.signal, mode: 'no-cors' });
    clearTimeout(timeoutId);
    console.log("✅ Google Sheets endpoint reachable");
  } catch (err) {
    console.log("⚠️ Google Sheets endpoint not reachable");
  }
}

// Initialize application
function init() {
  const container = document.getElementById('greenhouseList');
  container.innerHTML = '';
  greenhouseCounter = 1;
  container.appendChild(buildGreenhouseCard(1));
  
  document.getElementById('addGreenhouseBtn').addEventListener('click', addNewGreenhouse);
  document.getElementById('hydroponicForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('resetBtn').addEventListener('click', manualReset);
  
  // Test connection silently
  setTimeout(testConnection, 1000);
  setInterval(testConnection, 120000);
}

init();
</script>
</body>
</html>
