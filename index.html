        .gh-area { background: #fff2df; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 0.7rem; display: inline-flex; align-items: center; gap: 5px; }
        .current-stage-badge { background: #e1ecfa; padding: 0.25rem 1rem; border-radius: 30px; font-size: 0.75rem; font-weight: 600; color: #1f4f82; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .timeline-track { position: relative; margin: 0.7rem 1rem 0.9rem 1rem; height: 44px; background: #eaeedf; border-radius: 28px; overflow: visible; cursor: crosshair; }
        .stage-segment { position: absolute; height: 100%; top: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: #1e2f1c; border-radius: 28px 0 0 28px; border-right: 1px solid rgba(255,255,240,0.4); cursor: pointer; white-space: nowrap; padding: 0 5px; transition: filter 0.1s; }
        .stage-segment:last-child { border-radius: 0 28px 28px 0; }
        .global-today-marker { position: absolute; top: 0; bottom: 0; width: 3px; background-color: #e34d4d; z-index: 30; box-shadow: 0 0 0 2px rgba(227, 77, 77, 0.4); pointer-events: none; }
        .global-today-marker::before { content: "📅 TODAY"; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: #e34d4d; color: white; font-size: 0.6rem; font-weight: bold; padding: 2px 8px; border-radius: 20px; white-space: nowrap; pointer-events: none; }
        .drag-handle { position: absolute; top: -8px; bottom: -8px; width: 14px; left: -6px; cursor: ew-resize; background: transparent; z-index: 40; pointer-events: auto; }
        .global-today-marker:hover .drag-handle { background: rgba(227,77,77,0.2); border-radius: 20px; }
        .timeline-axis { position: relative; margin: 0 1rem 0.3rem 1rem; height: 22px; font-size: 0.6rem; color: #5b6e4a; }
        .axis-marker { position: absolute; transform: translateX(-50%); }
        .marker-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; background: #f8faf3; padding: 0.4rem 1rem; border-radius: 60px; }
        .marker-controls button { background: #e34d4d; border: none; color: white; font-size: 0.7rem; padding: 0.3rem 0.9rem; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .marker-date-display { background: white; padding: 0.2rem 0.9rem; border-radius: 30px; font-size: 0.7rem; font-family: monospace; font-weight: 600; }
        .timeline-fallback { padding: 2rem; text-align: center; color: #6c7a5e; }
    </style>

<body>
<div class="container">
    <div id="loginOverlay" class="login-overlay">...</div>
    <div id="mainApp" style="display: none;">
        <!-- Header same as original ... -->
        <div class="glass-card"><div class="header-flex"><div>... </div><div class="zone-banner">...</div><div class="action-buttons">...</div></div></div>
        <div class="glass-card"><div class="stat-title">...</div></div>
        <div id="greenhouseSection" class="hidden">...</div>
        <div class="live-dashboard-title"><i class="fas fa-tachometer-alt"></i> LIVE DASHBOARD</div>
        
        <!-- NEW: CROP TIMELINE SIMULATOR CARD -->
        <div id="cropTimelineCard" class="glass-card" style="display: none;">
            <div class="stat-title"><i class="fas fa-chart-line"></i> 📅 Interactive Crop Timeline | Drag Today Marker</div>
            <div class="marker-controls">
                <button id="resetTimelineTodayBtn"><i class="fas fa-calendar-day"></i> Reset to Real Today</button>
                <div class="marker-date-display" id="timelineMarkerDate">—</div>
                <span style="font-size:0.7rem; color:#5b7845;">← Drag the red marker on timeline →</span>
            </div>
            <div id="timelineContainer" class="timeline-scroll"><div class="timeline-fallback">Loading crop cycles with transplant dates...</div></div>
        </div>

        <!-- Area by Stage card -->
        <div class="glass-card"><div class="stat-title">📐 Area by Stage</div><div class="stage-area-buttons" id="stageAreaButtons">...</div><div id="areaByStageContainer"></div></div>
        <!-- rest of dashboard content ... -->
        <div class="glass-card">...</div>
    </div>

</div>
<!-- Edit modal ... -->
<script>
    // ==================== FULL ORIGINAL SCRIPT + TIMELINE INTEGRATION ====================
    // (Original variables, functions are kept; we only append timeline logic.)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZL_Ok1-3IzFg0nx4mHjPle2-xp7rPKEm8xSFaDSWgZq1ziUkAos6XggnLDhMtR3vsVQ/exec';
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const STAGES = ["Seedling","Vegetative","Flowering","Fruiting","Harvesting"];
    const EXTENDED_CROPS = ["Bean","Cabbage","Cauliflower","Chillies","Eggplant","English Cucumber","Greens","Lettuce","Melon","Okra","Shallot","Sweet Pepper","Tomato"];
    const PROD_SYSTEMS = ["Cocopeat", "Rockwool", "NFT", "DWC", "Aquaponic", "Aggregates"];
    const ZONE_LOCALITIES = { "E2": ["Balance John","Beau Bois","Bel Etang","Belvédère","Bon Accueil","Bonne Mere","Brisée Verdière","Camp de Masque","Camp Thorel","Fuel","Gaulettes Serrées","Gibraltar","Grand Bas Fond","Lallmatie","Latapie","L'Unité","Médine Camp de Masque","Melrose","Mission Cross Rd","Mont Ida","Montagne Blanche","Pellegrin","Petit Paquet","Pont Bon Dieu","Providence","Quatre Bords","Queen Victoria","Riche Fond","Salazie","Salazie Rd","Sans Soucis","St Julien d'Hotman","St Julien Village"] };
    
    let currentZone = "E2", savedGreenhouses = [], currentEditRecord = null, isAdmin = false, currentLoggedInUser = "";
    let timelineChart = null, forecastChart = null, currentTimelineCrop = "Tomato", currentForecastCrop = "Tomato", currentZoneEfficiency = "E2", greenhouseSectionVisible = false, currentStageAreaFilter = "all", dashboardStats = null;
    // Timeline global variables
    let simulatedToday = new Date();
    let currentTimelineRecords = { rows: [], headers: [] };
    let timelineGreenhouses = [];
    
    // Crop stage durations (days) for accurate timeline
    const CROP_STAGES_MAP = {
        "Tomato": [{ name:"Seedling", days:7, color:"#b8e1b0" }, { name:"Vegetative", days:21, color:"#80c56e" }, { name:"Flowering", days:14, color:"#fdde6c" }, { name:"Fruiting", days:30, color:"#ffb347" }, { name:"Harvesting", days:27, color:"#e68a6e" }],
        "Sweet Pepper": [{ name:"Seedling", days:10, color:"#b8e1b0" }, { name:"Vegetative", days:25, color:"#80c56e" }, { name:"Flowering", days:15, color:"#fdde6c" }, { name:"Fruiting", days:35, color:"#ffb347" }, { name:"Harvesting", days:25, color:"#e68a6e" }],
        "English Cucumber": [{ name:"Seedling", days:5, color:"#b8e1b0" }, { name:"Vegetative", days:15, color:"#80c56e" }, { name:"Flowering", days:10, color:"#fdde6c" }, { name:"Fruiting", days:25, color:"#ffb347" }, { name:"Harvesting", days:30, color:"#e68a6e" }]
    };
    
    function getCropStages(crop) { return CROP_STAGES_MAP[crop] || CROP_STAGES_MAP["Tomato"]; }
    function getTotalDays(crop) { return getCropStages(crop).reduce((s, a) => s + a.days, 0); }
    function formatYMD(date) { return date.toISOString().slice(0,10); }
    function addDays(dateStr, days) { let d = new Date(dateStr); d.setDate(d.getDate() + days); return formatYMD(d); }
    
    function getStageAtDate(transplant, crop, targetDate) {
        const start = new Date(transplant);
        const target = new Date(targetDate);
        if (target < start) return "Pending";
        const daysPassed = Math.floor((target - start) / (1000*3600*24));
        if (daysPassed < 0) return "Pending";
        let cumulative = 0;
        const stages = getCropStages(crop);
        for (let stage of stages) {
            if (daysPassed < cumulative + stage.days) return stage.name;
            cumulative += stage.days;
        }
        return "Completed";
    }
    
    function buildTimelineFromRecords(rows, headers) {
        if (!rows || rows.length === 0) { document.getElementById("cropTimelineCard").style.display = "none"; return false; }
        const transplantIdx = headers.findIndex(h => h.includes('transplant') || h === 'transplant date');
        const cropIdx = headers.findIndex(h => h === 'crop');
        const areaIdx = headers.findIndex(h => h.includes('area (m²)') || h === 'area (m2)' || h === 'area');
        const varietyIdx = headers.findIndex(h => h === 'variety');
        if (transplantIdx === -1 || cropIdx === -1) return false;
        const greenhousesList = [];
        for (let row of rows) {
            let transplantDate = row[transplantIdx];
            if (!transplantDate || transplantDate === "") continue;
            let cropName = row[cropIdx];
            if (!CROP_STAGES_MAP[cropName]) continue;
            let areaVal = (areaIdx !== -1 && !isNaN(parseFloat(row[areaIdx]))) ? parseFloat(row[areaIdx]) : 0;
            let variety = varietyIdx !== -1 ? (row[varietyIdx] || "—") : "—";
            greenhousesList.push({
                id: `gh_${Date.now()}_${Math.random()}`,
                name: `${cropName} · ${variety !== "—" ? variety : ""}`,
                crop: cropName,
                area: areaVal,
                transplant: transplantDate,
                variety: variety
            });
        }
        if (greenhousesList.length === 0) return false;
        timelineGreenhouses = greenhousesList;
        renderTimeline();
        return true;
    }
    
    function getGlobalDateRange() {
        let minDate = null, maxDate = null;
        timelineGreenhouses.forEach(gh => {
            const total = getTotalDays(gh.crop);
            const start = gh.transplant;
            const end = addDays(start, total - 1);
            if (!minDate || start < minDate) minDate = start;
            if (!maxDate || end > maxDate) maxDate = end;
        });
        if (!minDate) minDate = formatYMD(new Date());
        if (!maxDate) maxDate = addDays(minDate, 120);
        const minObj = new Date(minDate); minObj.setDate(minObj.getDate() - 3);
        const maxObj = new Date(maxDate); maxObj.setDate(maxObj.getDate() + 3);
        return { min: formatYMD(minObj), max: formatYMD(maxObj) };
    }
    
    function dateToPercent(dateStr, globalMin, globalMax, totalSpanDays) {
        const dateObj = new Date(dateStr);
        const minObj = new Date(globalMin);
        const offsetDays = (dateObj - minObj) / (1000*3600*24);
        return (offsetDays / totalSpanDays) * 100;
    }
    
    function percentToDate(percent, globalMin, globalMax, totalSpanDays) {
        const minObj = new Date(globalMin);
        const offsetDays = (percent / 100) * totalSpanDays;
        const newDate = new Date(minObj);
        newDate.setDate(minObj.getDate() + Math.round(offsetDays));
        return newDate;
    }
    
    let currentDragListener = null;
    function makeMarkerDraggable(markerElement, wrapperElement, globalMin, globalMax, totalSpanDays) {
        let isDragging = false;
        const onMouseMove = (e) => {
            if (!isDragging) return;
            const rect = wrapperElement.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let percent = Math.min(100, Math.max(0, (x / rect.width) * 100));
            const newDate = percentToDate(percent, globalMin, globalMax, totalSpanDays);
            const minLimit = new Date(globalMin); const maxLimit = new Date(globalMax);
            if (newDate < minLimit) newDate.setTime(minLimit.getTime());
            if (newDate > maxLimit) newDate.setTime(maxLimit.getTime());
            simulatedToday = newDate;
            document.getElementById("timelineMarkerDate").innerText = formatYMD(simulatedToday);
            renderTimeline();
        };
        const onMouseUp = () => {
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        };
        const handleMouseDown = (e) => { e.preventDefault(); isDragging = true; document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp); };
        markerElement.querySelector('.drag-handle')?.addEventListener('mousedown', handleMouseDown);
        const trackDiv = wrapperElement.querySelector('.timeline-track-global');
        if (trackDiv) trackDiv.addEventListener('click', (e) => {
            const rect = wrapperElement.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let percent = Math.min(100, Math.max(0, (x / rect.width) * 100));
            const newDate = percentToDate(percent, globalMin, globalMax, totalSpanDays);
            simulatedToday = newDate;
            document.getElementById("timelineMarkerDate").innerText = formatYMD(simulatedToday);
            renderTimeline();
        });
    }
    
    function renderTimeline() {
        const container = document.getElementById("timelineContainer");
        if (!container || timelineGreenhouses.length === 0) { if(container) container.innerHTML = '<div class="timeline-fallback">🌱 No crop cycles with transplant date found. Add greenhouses with transplant date.</div>'; return; }
        const { min: globalMin, max: globalMax } = getGlobalDateRange();
        const totalSpanDays = (new Date(globalMax) - new Date(globalMin)) / (1000*3600*24);
        const todayStr = formatYMD(simulatedToday);
        let html = `<div class="timeline-wrapper" id="timelineGlobalWrapper" style="position:relative;">`;
        timelineGreenhouses.forEach(gh => {
            const currentStage = getStageAtDate(gh.transplant, gh.crop, todayStr);
            const intervals = [];
            let curStart = gh.transplant;
            const stagesDef = getCropStages(gh.crop);
            for (let stage of stagesDef) {
                const end = addDays(curStart, stage.days - 1);
                intervals.push({ name: stage.name, color: stage.color, start: curStart, end: end, days: stage.days });
                curStart = addDays(curStart, stage.days);
            }
            html += `<div class="greenhouse-row" data-id="${gh.id}">
                        <div class="row-header">
                            <div class="greenhouse-info">
                                <span class="gh-name"><i class="fas fa-seedling"></i> ${gh.name} · ${gh.crop}</span>
                                <span class="gh-area">📐 ${gh.area.toFixed(1)} m²</span>
                                <span class="current-stage-badge" id="badge-${gh.id}">🌱 ${currentStage}</span>
                            </div>
                            <div class="transplant-picker" style="background:#eef3ea; border-radius:30px; padding:0.2rem 0.8rem; font-size:0.7rem;">📅 Transplant: ${gh.transplant}</div>
                        </div>
                        <div class="timeline-track" id="track-${gh.id}"></div>
                    </div>`;
        });
        html += `<div id="timelineAxisContainer" class="timeline-axis"></div></div>`;
        container.innerHTML = html;
        timelineGreenhouses.forEach(gh => {
            const trackDiv = document.getElementById(`track-${gh.id}`);
            if (!trackDiv) return;
            const intervals = [];
            let curStart = gh.transplant;
            const stagesDef = getCropStages(gh.crop);
            for (let stage of stagesDef) {
                const end = addDays(curStart, stage.days - 1);
                intervals.push({ name: stage.name, color: stage.color, start: curStart, end: end, days: stage.days });
                curStart = addDays(curStart, stage.days);
            }
            intervals.forEach(interval => {
                const startPercent = dateToPercent(interval.start, globalMin, globalMax, totalSpanDays);
                const endPercent = dateToPercent(interval.end, globalMin, globalMax, totalSpanDays);
                let width = endPercent - startPercent;
                if (width <= 0) width = 0.5;
                const segment = document.createElement('div');
                segment.className = 'stage-segment';
                segment.style.left = `${startPercent}%`;
                segment.style.width = `${width}%`;
                segment.style.backgroundColor = interval.color;
                segment.textContent = interval.name;
                segment.title = `${interval.name}: ${interval.start} → ${interval.end}`;
                trackDiv.appendChild(segment);
            });
            const badgeSpan = document.getElementById(`badge-${gh.id}`);
            if (badgeSpan) {
                const stageNow = getStageAtDate(gh.transplant, gh.crop, todayStr);
                badgeSpan.innerHTML = `🌱 ${stageNow}`;
            }
        });
        const wrapperDiv = document.getElementById("timelineGlobalWrapper");
        const existingMarker = wrapperDiv?.querySelector('#globalTodayMarkerTimeline');
        if (existingMarker) existingMarker.remove();
        const todayPercent = dateToPercent(todayStr, globalMin, globalMax, totalSpanDays);
        const clamped = Math.min(100, Math.max(0, todayPercent));
        const marker = document.createElement('div');
        marker.id = 'globalTodayMarkerTimeline';
        marker.className = 'global-today-marker';
        marker.style.left = `${clamped}%`;
        const dragHandle = document.createElement('div');
        dragHandle.className = 'drag-handle';
        marker.appendChild(dragHandle);
        if (wrapperDiv) wrapperDiv.appendChild(marker);
        const axisDiv = document.getElementById("timelineAxisContainer");
        if (axisDiv) {
            const startDateObj = new Date(globalMin);
            const midDateObj = new Date((new Date(globalMin).getTime() + new Date(globalMax).getTime()) / 2);
            const endDateObj = new Date(globalMax);
            const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
            axisDiv.innerHTML = `
                <div class="axis-marker" style="left: 0%">${fmt(startDateObj)}</div>
                <div class="axis-marker" style="left: 50%">${fmt(midDateObj)}</div>
                <div class="axis-marker" style="left: 100%">${fmt(endDateObj)}</div>
            `;
        }
        if (wrapperDiv) makeMarkerDraggable(marker, wrapperDiv, globalMin, globalMax, totalSpanDays);
        document.getElementById("timelineMarkerDate").innerText = formatYMD(simulatedToday);
        document.getElementById("cropTimelineCard").style.display = "block";
    }
    
    function resetTimelineToday() { simulatedToday = new Date(); renderTimeline(); toast("Timeline marker reset to real current date"); }
    
    // Extend loadUserPreviousData to store records and trigger timeline
    const originalLoadUserPreviousData = window.loadUserPreviousData;
    window.loadUserPreviousData = async function(username) {
        if (!username) { document.getElementById('prevSubmissionsSection').style.display = 'none'; document.getElementById("cropTimelineCard").style.display = "none"; return false; }
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getUserData&username=${encodeURIComponent(username)}&_=${Date.now()}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!data.rows || data.rows.length === 0) { document.getElementById('prevSubmissionsSection').style.display = 'none'; document.getElementById("cropTimelineCard").style.display = "none"; return false; }
            currentTimelineRecords = { rows: data.rows, headers: data.headers };
            const headers = data.headers.map(h => h.toString().toLowerCase());
            const areaIdx = headers.findIndex(h => (h === 'area (m²)' || h === 'area (m2)' || h === 'area' || h.includes('area (m²)')) && !h.includes('total'));
            const stageIdx = headers.findIndex(h => ['stage'].some(p => h.includes(p)));
            const cropIdx = headers.findIndex(h => h === 'crop');
            const varietyIdx = headers.findIndex(h => h === 'variety');
            const weeklyYieldIdx = headers.findIndex(h => h.includes('weekly yield'));
            const weeklyUnitIdx = headers.findIndex(h => h.includes('weekly unit'));
            const harvestMonthsIdx = headers.findIndex(h => h.includes('harvest months'));
            const timestampIdx = headers.findIndex(h => ['timestamp', 'date'].some(p => h.includes(p)));
            const monthIndices = MONTHS.map(m => headers.findIndex(h => h === m.toLowerCase()));
            const statusIndex = headers.findIndex(h => h === "cycle status");
            const grid = document.getElementById('cropRecordsGrid');
            grid.innerHTML = '';
            for (let row of data.rows) {
                if (!row[cropIdx]) continue;
                const areaVal = (areaIdx !== -1 && areaIdx < row.length) ? parseFloat(row[areaIdx]) || 0 : 0;
                const stageVal = (row[stageIdx] || "").toString();
                const varietyVal = row[varietyIdx] || "—";
                const weeklyYield = weeklyYieldIdx !== -1 ? parseFloat(row[weeklyYieldIdx]) || 0 : 0;
                const weeklyUnit = weeklyUnitIdx !== -1 ? (row[weeklyUnitIdx] || "kg") : "kg";
                const harvestMonths = harvestMonthsIdx !== -1 ? parseFloat(row[harvestMonthsIdx]) || 0 : 0;
                const cycleStatus = (statusIndex !== -1 && row[statusIndex]) ? row[statusIndex].toString().trim() : "Active";
                const bulbIcon = cycleStatus === "Active" ? "💡" : "🔘";
                const card = document.createElement('div'); card.className = 'record-card';
                card.innerHTML = `<div class="record-header"><div class="record-crop"><i class="fas fa-seedling"></i> ${row[cropIdx]}</div><div class="record-stage"><i class="fas fa-chart-line"></i> ${stageVal}</div><button class="toggle-status-btn" data-timestamp="${row[timestampIdx]}" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">${bulbIcon}</button></div><div class="record-detail"><span>📐 Area:</span><span class="record-area">${areaVal.toFixed(1)} m²</span></div><div class="record-detail"><span>🌱 Variety:</span><span>${varietyVal}</span></div><div class="record-detail"><span>📦 Weekly Yield:</span><span>${weeklyYield.toFixed(1)} ${weeklyUnit}</span></div><div class="record-detail"><span>📅 Harvest Months:</span><span>${harvestMonths}</span></div><div class="record-detail"><span>🔄 Cycle Status:</span><span style="font-weight:600; color:${cycleStatus === 'Active' ? '#1f6e1f' : '#888'}">${cycleStatus}</span></div><button class="edit-btn-card" data-record='${JSON.stringify({ rowData: row, stageIdx, cropIdx, areaIdx, varietyIdx, weeklyYieldIdx, weeklyUnitIdx, harvestMonthsIdx, timestampIdx, monthIndices })}'><i class="fas fa-edit"></i> Edit Record</button>`;
                const btn = card.querySelector('.edit-btn-card');
                btn.addEventListener('click', () => { const rec = JSON.parse(btn.getAttribute('data-record')); currentEditRecord = { row: rec.rowData, headers, stageIdx: rec.stageIdx, cropIdx: rec.cropIdx, areaIdx: rec.areaIdx, varietyIdx: rec.varietyIdx, weeklyYieldIdx: rec.weeklyYieldIdx, weeklyUnitIdx: rec.weeklyUnitIdx, harvestMonthsIdx: rec.harvestMonthsIdx, timestampIdx: rec.timestampIdx, monthIndices: rec.monthIndices }; openEditModal(rec.rowData, rec.stageIdx, rec.cropIdx, rec.areaIdx, rec.varietyIdx, rec.weeklyYieldIdx, rec.weeklyUnitIdx, rec.harvestMonthsIdx, rec.monthIndices); });
                const toggleBtn = card.querySelector('.toggle-status-btn');
                if (toggleBtn) toggleBtn.addEventListener('click', (e) => { e.preventDefault(); toggleCycleStatus(toggleBtn.dataset.timestamp); });
                grid.appendChild(card);
            }
            document.getElementById('prevSubmissionsSection').style.display = 'block';
            // Build timeline from same rows
            const timelineBuilt = buildTimelineFromRecords(data.rows, headers);
            if (!timelineBuilt) document.getElementById("cropTimelineCard").style.display = "none";
            else renderTimeline();
            return true;
        } catch(e) { console.error(e); document.getElementById('prevSubmissionsSection').style.display = 'none'; return false; }
    };
