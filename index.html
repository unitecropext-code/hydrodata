<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hydroponic Data Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f3ea 0%, #d0e6d4 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app-wrapper {
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .header h1 {
      background: linear-gradient(125deg, #0f3b1a, #1f6e2c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .header h1:before {
      content: "🌊";
      font-size: 2rem;
      color: #2b6e3c;
    }

    .subhead {
      color: #2c5e2f;
      font-weight: 500;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 2rem;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 32, 0, 0.12);
      border: 1px solid rgba(70, 120, 70, 0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-weight: 700;
      color: #1a5a20;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    input, select {
      padding: 0.75rem 1rem;
      border: 2px solid #e2efe3;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #2e8836;
      outline: none;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    }

    button {
      background: #1f6e2c;
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: #0f551b;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #6c8f72;
    }

    button.secondary:hover {
      background: #53755a;
    }

    .greenhouse-section {
      border-top: 2px dashed #bddcb9;
      padding-top: 1.2rem;
      margin-top: 0.8rem;
    }

    .greenhouse-card {
      background: #fafef7;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #2c7a2e;
    }

    .gh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .remove-gh {
      background: #fff0f0;
      color: #bc544b;
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      border-radius: 2rem;
      cursor: pointer;
      border: none;
    }

    .harvest-fields {
      display: none;
      grid-column: 1 / -1;
      background: #eef5ea;
      padding: 1rem 1.2rem;
      border-radius: 1.2rem;
      margin-top: 0.6rem;
    }

    .harvest-fields.active {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .tomato-type-field {
      display: none;
      margin-top: 0.8rem;
      padding-left: 0.2rem;
    }
    .tomato-type-field.active {
      display: block;
    }
    .tomato-type-field select {
      margin-top: 0.3rem;
      width: 100%;
      max-width: 250px;
    }

    .success-message {
      display: none;
      background: #2c7a2e;
      color: white;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3b22;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      z-index: 1200;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .footer-note {
      text-align: center;
      color: #6a8e6f;
      font-size: 0.8rem;
      margin-top: 1.5rem;
      padding: 0.8rem;
      border-top: 1px solid #c8e0c4;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <h1>Hydroponic Data Tracker</h1>
    <div class="subhead">🌿 Smart Greenhouse Management</div>
  </div>

  <div class="card">
    <form id="hydroponicForm">
      <div class="form-grid">
        <div class="input-group">
          <label>👨‍🌾 Grower Name *</label>
          <input type="text" id="growerName" placeholder="Full name" required>
        </div>
        <div class="input-group">
          <label>📐 Total Area (m²) *</label>
          <input type="number" id="totalArea" step="0.1" placeholder="Total square meters" required>
        </div>
      </div>

      <div class="greenhouse-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem;">
          <strong>🏡 Greenhouse Details</strong>
          <button type="button" id="addGreenhouseBtn" style="background:#2b6e3c; padding: 0.4rem 1.2rem;">+ Add Greenhouse</button>
        </div>
        <div id="greenhouseList"></div>
      </div>

      <div class="btn-group">
        <button type="submit">💾 Save to Sheets</button>
        <button type="button" id="resetBtn" class="secondary">⟳ Clear</button>
      </div>
    </form>
    <div id="successMessage" class="success-message"></div>
  </div>
  
  <div class="footer-note">
    Hydroponic Data Tracker
  </div>
</div>

<script>
// ============================================================
// IMPORTANT: Replace this URL with your Google Apps Script Web App URL
// ============================================================
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwGxgTSlHzy9JKyaNNLcIzPtOqBATKrGHq6QOtIrT6J-BacprcDdgmxarKEVmLD7t8/exec';

const cropOptions = [
  "Cabbage", "Cauliflower", "English Cucumber", "Lettuce", 
  "Shallot", "Greens", "Melon", "Okra", "Chillies", 
  "Sweet Pepper", "Tomato"
];

const tomatoTypes = ["Cooking", "Salad", "Cherry"];

let greenhouseCounter = 1;

function buildGreenhouseCard(sequence, prefillData = null) {
  const p = prefillData || {};
  const today = new Date().toISOString().slice(0, 10);
  const wrapper = document.createElement('div');
  wrapper.className = 'greenhouse-card';
  
  wrapper.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <strong>🌱 Greenhouse ${sequence}</strong>
      ${sequence > 1 ? '<button type="button" class="remove-gh">✖ Remove</button>' : '<span style="font-size:0.7rem; background:#dff0df; padding:2px 12px; border-radius:20px;">Primary</span>'}
    </div>
    <div class="gh-grid">
      <div><label>Area (m²) *</label><input type="number" step="0.1" class="gh-area" value="${p.area || ''}" placeholder="m²" required></div>
      <div><label>Crop *</label><select class="gh-crop" required>
        <option value="">-- Select --</option>
        ${cropOptions.map(c => `<option value="${c}" ${p.cropType === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select></div>
      <div><label>Variety *</label><input type="text" class="gh-variety" value="${p.variety || ''}" placeholder="Variety" required></div>
      <div><label>Stage *</label><select class="gh-stage" required>
        <option ${p.cropStage === 'Seedling' ? 'selected' : ''}>Seedling</option>
        <option ${p.cropStage === 'Vegetative' ? 'selected' : ''}>Vegetative</option>
        <option ${p.cropStage === 'Flowering' ? 'selected' : ''}>Flowering</option>
        <option ${p.cropStage === 'Harvest' ? 'selected' : ''}>Harvest</option>
      </select></div>
      <div><label>Date Transplanted *</label><input type="date" class="gh-transplant" value="${p.transplantDate || today}" required></div>
    </div>
    <div class="tomato-type-field">
      <label>🍅 Tomato Type</label>
      <select class="gh-tomato-type">
        <option value="">-- Select --</option>
        ${tomatoTypes.map(t => `<option value="${t}" ${p.tomatoType === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="harvest-fields">
      <div><label>📆 Months of Harvest</label><input type="number" step="0.5" class="gh-harvest-months" value="${p.harvestMonths || ''}" placeholder="Months"></div>
      <div><label>📊 Yield per Week</label><input type="text" class="gh-yield-week" value="${p.avgYieldWeek || ''}" placeholder="kg/week"></div>
      <div><label>📈 Yield per Month</label><input type="text" class="gh-yield-month" value="${p.avgYieldMonth || ''}" placeholder="kg/month"></div>
    </div>
  `;
  
  const cropSelect = wrapper.querySelector('.gh-crop');
  const tomatoDiv = wrapper.querySelector('.tomato-type-field');
  const tomatoSelect = wrapper.querySelector('.gh-tomato-type');
  const stageSelect = wrapper.querySelector('.gh-stage');
  const harvestDiv = wrapper.querySelector('.harvest-fields');
  
  const updateTomatoVisibility = () => {
    if (cropSelect.value === 'Tomato') {
      tomatoDiv.classList.add('active');
      tomatoSelect.required = true;
    } else {
      tomatoDiv.classList.remove('active');
      tomatoSelect.required = false;
      tomatoSelect.value = '';
    }
  };
  
  const updateHarvestVisibility = () => {
    if (stageSelect.value === 'Harvest') {
      harvestDiv.classList.add('active');
      const monthsInput = wrapper.querySelector('.gh-harvest-months');
      if (monthsInput) monthsInput.required = true;
    } else {
      harvestDiv.classList.remove('active');
      const monthsInput = wrapper.querySelector('.gh-harvest-months');
      if (monthsInput) monthsInput.required = false;
    }
  };
  
  cropSelect.addEventListener('change', updateTomatoVisibility);
  stageSelect.addEventListener('change', updateHarvestVisibility);
  
  updateTomatoVisibility();
  updateHarvestVisibility();
  
  if (sequence > 1) {
    const removeBtn = wrapper.querySelector('.remove-gh');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => wrapper.remove());
    }
  }
  
  return wrapper;
}

function addNewGreenhouse() {
  const container = document.getElementById('greenhouseList');
  greenhouseCounter++;
  container.appendChild(buildGreenhouseCard(greenhouseCounter));
}

function collectTabularData() {
  const growerName = document.getElementById('growerName').value.trim();
  const totalAreaRaw = document.getElementById('totalArea').value;
  const totalArea = parseFloat(totalAreaRaw);
  
  if (!growerName) { 
    alert("Please enter Grower Name"); 
    return null; 
  }
  if (isNaN(totalArea) || totalArea <= 0) { 
    alert("Please enter valid Total Area"); 
    return null; 
  }
  
  const cards = document.querySelectorAll('#greenhouseList .greenhouse-card');
  if (cards.length === 0) { 
    alert("Please add at least one greenhouse"); 
    return null; 
  }
  
  const rows = [];
  const formattedTimestamp = new Date().toLocaleString('en-US', { 
    year: 'numeric', month: '2-digit', day: '2-digit', 
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false 
  });
  
  for (let idx = 0; idx < cards.length; idx++) {
    const card = cards[idx];
    const areaVal = parseFloat(card.querySelector('.gh-area').value);
    const cropType = card.querySelector('.gh-crop').value;
    const variety = card.querySelector('.gh-variety').value.trim();
    const cropStage = card.querySelector('.gh-stage').value;
    const transplantDate = card.querySelector('.gh-transplant').value;
    
    let tomatoType = '';
    if (cropType === 'Tomato') {
      const tomatoSelect = card.querySelector('.gh-tomato-type');
      tomatoType = tomatoSelect ? tomatoSelect.value : '';
      if (!tomatoType) {
        alert(`Greenhouse ${idx+1}: Tomato crop requires selecting Tomato Type`);
        return null;
      }
    }
    
    if (!cropType) { 
      alert(`Greenhouse ${idx+1}: Please select a Crop`); 
      return null; 
    }
    if (!variety) { 
      alert(`Greenhouse ${idx+1}: Please enter Variety`); 
      return null; 
    }
    if (isNaN(areaVal) || areaVal <= 0) { 
      alert(`Greenhouse ${idx+1}: Please enter valid Area`); 
      return null; 
    }
    if (!transplantDate) { 
      alert(`Greenhouse ${idx+1}: Please select Date Transplanted`); 
      return null; 
    }
    
    let harvestMonths = '';
    let yieldWeek = '';
    let yieldMonth = '';
    if (cropStage === 'Harvest') {
      const hm = card.querySelector('.gh-harvest-months').value;
      if (!hm || parseFloat(hm) <= 0) {
        alert(`Greenhouse ${idx+1}: Harvest stage requires Months of Harvest`);
        return null;
      }
      harvestMonths = hm;
      yieldWeek = card.querySelector('.gh-yield-week').value || '';
      yieldMonth = card.querySelector('.gh-yield-month').value || '';
    }
    
    rows.push([
      formattedTimestamp,
      growerName,
      totalArea,
      idx + 1,
      cropType,
      variety,
      cropStage,
      areaVal,
      transplantDate,
      yieldWeek,
      yieldMonth,
      harvestMonths,
      tomatoType
    ]);
  }
  return rows;
}

async function sendToGoogleSheets(records) {
  // Check if URL is configured
  if (GOOGLE_SCRIPT_URL === 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec') {
    console.error("Please update GOOGLE_SCRIPT_URL with your actual Apps Script URL");
    showToast('Configuration error: Please set the correct Google Sheets URL', true);
    return false;
  }
  
  try {
    console.log("Sending to:", GOOGLE_SCRIPT_URL);
    console.log("Records:", records);
    
    const payload = { records: records };
    
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload)
    });
    
    if (!response.ok) {
      console.error("HTTP error:", response.status, response.statusText);
      showToast(`HTTP Error: ${response.status}`, true);
      return false;
    }
    
    const result = await response.json();
    console.log("Server response:", result);
    
    if (result.success) {
      return true;
    } else {
      console.error("Server error:", result.error);
      showToast(`Error: ${result.error}`, true);
      return false;
    }
    
  } catch (error) {
    console.error("Network error details:", error);
    showToast(`Connection error: ${error.message}`, true);
    return false;
  }
}

function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = message;
  if (isError) toast.style.background = '#c54534';
  else toast.style.background = '#1f6e2c';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

async function handleFormSubmit(event) {
  event.preventDefault();
  
  const records = collectTabularData();
  if (!records) return;
  
  const submitBtn = document.querySelector('button[type="submit"]');
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = '⏳ Saving...';
  submitBtn.disabled = true;
  
  try {
    const success = await sendToGoogleSheets(records);
    
    const successDiv = document.getElementById('successMessage');
    if (success) {
      successDiv.innerHTML = `✅ ${records.length} record(s) saved successfully`;
      successDiv.style.background = '#1f6e2c';
      successDiv.style.display = 'block';
      showToast(`✓ ${records.length} record(s) saved`);
      resetFormFields();
    } else {
      successDiv.innerHTML = `❌ Failed to save - Check console for details`;
      successDiv.style.background = '#c54534';
      successDiv.style.display = 'block';
    }
    setTimeout(() => { 
      successDiv.style.display = 'none'; 
    }, 4000);
  } catch (err) {
    console.error("Submission error:", err);
    showToast(`Error: ${err.message}`, true);
    const successDiv = document.getElementById('successMessage');
    successDiv.innerHTML = `❌ Error: ${err.message}`;
    successDiv.style.background = '#c54534';
    successDiv.style.display = 'block';
    setTimeout(() => { 
      successDiv.style.display = 'none'; 
    }, 4000);
  } finally {
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
  }
}

function resetFormFields() {
  document.getElementById('growerName').value = '';
  document.getElementById('totalArea').value = '';
  document.getElementById('greenhouseList').innerHTML = '';
  greenhouseCounter = 1;
  document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(1));
}

function manualReset() {
  if (confirm('Clear all data?')) {
    resetFormFields();
    showToast('Form cleared');
  }
}

function init() {
  const container = document.getElementById('greenhouseList');
  container.innerHTML = '';
  greenhouseCounter = 1;
  container.appendChild(buildGreenhouseCard(1));
  
  document.getElementById('addGreenhouseBtn').addEventListener('click', addNewGreenhouse);
  document.getElementById('hydroponicForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('resetBtn').addEventListener('click', manualReset);
  
  // Check URL configuration on startup
  if (GOOGLE_SCRIPT_URL === 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec') {
    console.warn("⚠️ Please update GOOGLE_SCRIPT_URL with your actual Apps Script URL");
  } else {
    console.log("✅ Using Google Apps Script URL:", GOOGLE_SCRIPT_URL);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
