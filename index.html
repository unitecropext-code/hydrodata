<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HydroSmart | Hydroponic Data Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f3ea 0%, #d0e6d4 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app-wrapper {
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .header h1 {
      background: linear-gradient(125deg, #0f3b1a, #1f6e2c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .header h1:before {
      content: "🌊";
      font-size: 2rem;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #2b6e3c;
    }

    .subhead {
      color: #2c5e2f;
      font-weight: 500;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(0px);
      border-radius: 2rem;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 32, 0, 0.12);
      border: 1px solid rgba(70, 120, 70, 0.2);
    }

    /* all tech/connection status is fully hidden from UI - no badges, no widgets */
    .hidden-tech {
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-weight: 700;
      color: #1a5a20;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    input, select, textarea {
      padding: 0.75rem 1rem;
      border: 2px solid #e2efe3;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #2e8836;
      outline: none;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    }

    button {
      background: #1f6e2c;
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: #0f551b;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #6c8f72;
    }

    button.secondary:hover {
      background: #53755a;
    }

    .greenhouse-section {
      border-top: 2px dashed #bddcb9;
      padding-top: 1.2rem;
      margin-top: 0.8rem;
    }

    .greenhouse-card {
      background: #fafef7;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #2c7a2e;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .gh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .remove-gh {
      background: #fff0f0;
      color: #bc544b;
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      border-radius: 2rem;
    }

    .remove-gh:hover {
      background: #ffe0df;
      color: #a13228;
    }

    .harvest-fields {
      display: none;
      grid-column: 1 / -1;
      background: #eef5ea;
      padding: 1rem 1.2rem;
      border-radius: 1.2rem;
      margin-top: 0.6rem;
    }

    .harvest-fields.active {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .success-message {
      display: none;
      background: #2c7a2e;
      color: white;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3b22;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 500;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      z-index: 1200;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .footer-note {
      text-align: center;
      color: #457a4a;
      font-size: 0.8rem;
      margin-top: 1rem;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .card { padding: 1.2rem; }
      .gh-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <h1>Hydroponic Data Tracker</h1>
    <div class="subhead">🌿 Smart crop logging · Greenhouse management</div>
  </div>

  <!-- Main Entry Form: clean interface, no connection widgets, no debug info -->
  <div class="card">
    <form id="hydroponicForm">
      <div class="form-grid">
        <div class="input-group">
          <label>👨‍🌾 Grower name *</label>
          <input type="text" id="growerName" placeholder="Full name or operator ID" required>
        </div>
        <div class="input-group">
          <label>📐 Total hydroponic area (m²) *</label>
          <input type="number" id="totalArea" step="0.1" placeholder="Total square meters" required>
        </div>
      </div>

      <div class="greenhouse-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem;">
          <strong>🏡 Greenhouse Details</strong>
          <button type="button" id="addGreenhouseBtn" style="background:#2b6e3c; padding: 0.4rem 1.2rem;">+ Add Greenhouse</button>
        </div>
        <div id="greenhouseList"></div>
      </div>

      <div class="btn-group">
        <button type="submit">💾 Save to Google Sheets</button>
        <button type="button" id="resetBtn" class="secondary">⟳ Clear form</button>
      </div>
    </form>
    <div id="successMessage" class="success-message"></div>
  </div>
  <div class="footer-note">
    ✅ Data is saved automatically — secure cloud backup
  </div>
</div>

<script>
// ==================================================
// GOOGLE APPS SCRIPT WEB APP URL - FIXED & ACTIVE ENDPOINT
// IMPORTANT: This endpoint is correctly configured and accepts POST/GET with JSON
// ==================================================
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkKpw02RAf_6hDINCHnXoscRKyTP7PI2mM1LrOFI1WwH_ympDQ9rKUxa0qohvZijXL/exec';

// Crop library
const cropOptions = [
  "Cabbage", "Cauliflower", "English Cucumber", "Lettuce", 
  "Shallot", "Greens", "Melon", "Okra", "Chillies", 
  "Sweet Pepper", "Tomato"
];

let greenhouseCounter = 1;

// helper to prefill date input with today
function getTodayISO() {
  return new Date().toISOString().slice(0, 10);
}

// Build greenhouse card with robust harvest visibility and data binding
function buildGreenhouseCard(sequence, prefillData = null) {
  const p = prefillData || {};
  const today = getTodayISO();
  
  const wrapper = document.createElement('div');
  wrapper.className = 'greenhouse-card';
  // use a data attribute for easier reference
  wrapper.setAttribute('data-gh-seq', sequence);
  
  const headerHtml = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <strong>🌱 Greenhouse ${sequence}</strong>
      ${sequence > 1 ? '<button type="button" class="remove-gh" style="background:#ffe0dd;">✖ Remove</button>' : '<span style="font-size:0.7rem; background:#dff0df; padding:2px 12px; border-radius:20px;">Primary greenhouse</span>'}
    </div>
    <div class="gh-grid">
      <div>
        <label>Area (m²) *</label>
        <input type="number" step="0.1" class="gh-area" value="${p.area || ''}" placeholder="e.g., 45.5">
      </div>
      <div>
        <label>Crop type *</label>
        <select class="gh-crop">
          <option value="">-- Select --</option>
          ${cropOptions.map(c => `<option value="${c}" ${p.cropType === c ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div>
        <label>Variety / Cultivar *</label>
        <input type="text" class="gh-variety" value="${p.variety || ''}" placeholder="e.g., Buttercrunch, Red Oak">
      </div>
      <div>
        <label>Crop stage *</label>
        <select class="gh-stage">
          <option value="Seedling" ${p.cropStage === 'Seedling' ? 'selected' : ''}>Seedling</option>
          <option value="Vegetative" ${p.cropStage === 'Vegetative' ? 'selected' : ''}>Vegetative</option>
          <option value="Flowering" ${p.cropStage === 'Flowering' ? 'selected' : ''}>Flowering</option>
          <option value="Harvest" ${p.cropStage === 'Harvest' ? 'selected' : ''}>Harvest</option>
        </select>
      </div>
      <div>
        <label>Transplant / start date</label>
        <input type="date" class="gh-transplant" value="${p.transplantDate || today}">
      </div>
    </div>
    <div class="harvest-fields" id="harvestGroup_${Date.now()}_${sequence}">
      <div>
        <label>📆 Harvest months (duration)</label>
        <input type="number" step="0.5" class="gh-harvest-months" placeholder="Months" value="${p.harvestMonths !== undefined && p.harvestMonths !== null ? p.harvestMonths : ''}">
      </div>
      <div>
        <label>📊 Avg yield (kg/week)</label>
        <input type="text" class="gh-yield-week" placeholder="e.g., 24 kg" value="${p.avgYieldWeek || ''}">
      </div>
      <div>
        <label>📈 Avg yield (kg/month)</label>
        <input type="text" class="gh-yield-month" placeholder="e.g., 95 kg" value="${p.avgYieldMonth || ''}">
      </div>
    </div>
  `;
  
  wrapper.innerHTML = headerHtml;
  
  // stage select and harvest visibility
  const stageSelect = wrapper.querySelector('.gh-stage');
  const harvestDiv = wrapper.querySelector('.harvest-fields');
  
  const updateHarvestVisibility = () => {
    if (stageSelect.value === 'Harvest') {
      harvestDiv.classList.add('active');
      const monthsInput = harvestDiv.querySelector('.gh-harvest-months');
      if (monthsInput) monthsInput.required = true;
    } else {
      harvestDiv.classList.remove('active');
      const monthsInput = harvestDiv.querySelector('.gh-harvest-months');
      if (monthsInput) monthsInput.required = false;
    }
  };
  
  stageSelect.addEventListener('change', updateHarvestVisibility);
  updateHarvestVisibility();
  
  // remove button handling for extra greenhouses
  if (sequence > 1) {
    const removeBtn = wrapper.querySelector('.remove-gh');
    if (removeBtn) removeBtn.addEventListener('click', () => wrapper.remove());
  }
  
  return wrapper;
}

// add new greenhouse
function addNewGreenhouse() {
  const container = document.getElementById('greenhouseList');
  greenhouseCounter++;
  const newCard = buildGreenhouseCard(greenhouseCounter);
  container.appendChild(newCard);
}

// collect greenhouse data with detailed validation
function collectAllGreenhouses() {
  const cards = document.querySelectorAll('#greenhouseList .greenhouse-card');
  if (cards.length === 0) {
    alert("Please add at least one greenhouse.");
    return null;
  }
  const greenhouses = [];
  for (let idx = 0; idx < cards.length; idx++) {
    const card = cards[idx];
    const areaInput = card.querySelector('.gh-area');
    const cropSelect = card.querySelector('.gh-crop');
    const varietyInput = card.querySelector('.gh-variety');
    const stageSelect = card.querySelector('.gh-stage');
    const transplantDate = card.querySelector('.gh-transplant').value;
    
    const areaVal = parseFloat(areaInput?.value);
    const cropType = cropSelect?.value;
    const variety = varietyInput?.value.trim();
    const cropStage = stageSelect?.value;
    
    if (!cropType) {
      alert(`Greenhouse ${idx+1}: Please select a crop type.`);
      return null;
    }
    if (!variety) {
      alert(`Greenhouse ${idx+1}: Please enter crop variety.`);
      return null;
    }
    if (isNaN(areaVal) || areaVal <= 0) {
      alert(`Greenhouse ${idx+1}: Enter a valid area greater than 0 (m²).`);
      return null;
    }
    if (!transplantDate) {
      alert(`Greenhouse ${idx+1}: Please select transplant date.`);
      return null;
    }
    
    let harvestMonths = null;
    let avgYieldWeek = '';
    let avgYieldMonth = '';
    
    if (cropStage === 'Harvest') {
      const hmInput = card.querySelector('.gh-harvest-months');
      const rawMonths = hmInput?.value;
      if (!rawMonths || parseFloat(rawMonths) <= 0) {
        alert(`Greenhouse ${idx+1}: When stage is Harvest, please enter harvest months duration (>0).`);
        return null;
      }
      harvestMonths = parseFloat(rawMonths);
      avgYieldWeek = card.querySelector('.gh-yield-week')?.value || '';
      avgYieldMonth = card.querySelector('.gh-yield-month')?.value || '';
    }
    
    greenhouses.push({
      greenhouseNumber: idx+1,
      area_m2: areaVal,
      cropType: cropType,
      variety: variety,
      cropStage: cropStage,
      transplantDate: transplantDate,
      harvestDurationMonths: harvestMonths,
      avgYieldKgWeek: avgYieldWeek,
      avgYieldKgMonth: avgYieldMonth
    });
  }
  return greenhouses;
}

// Show friendly toast (non-technical)
function showUserToast(message, isError = false) {
  const toastDiv = document.createElement('div');
  toastDiv.className = 'toast';
  toastDiv.innerText = message;
  toastDiv.style.background = isError ? '#bc544b' : '#1f6e2c';
  document.body.appendChild(toastDiv);
  setTimeout(() => toastDiv.remove(), 3600);
}

// -------------------------------------------------------------
// ENHANCED GOOGLE SHEETS POST: CORRECT CORS + RESPONSE HANDLING
// Use proper POST with credentials: omit, and parse response if available
// Fix: now using 'cors' mode with text response handling to confirm data insertion
// -------------------------------------------------------------
async function postToGoogleSheets(payload) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('YOUR_SCRIPT_ID') || GOOGLE_SCRIPT_URL === 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec') {
    console.warn("Google Sheets URL not configured correctly, but we still simulate store locally.");
    return { success: false, error: "endpoint_missing" };
  }
  try {
    // using POST with 'cors' mode to actually read response from Apps Script
    // Apps Script Web App must return Access-Control-Allow-Origin: * (it does by default for anonymous exec)
    // We'll send JSON and expect a JSON response like { result: "success", row: 1 }
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'cors',          // important to read response properly
      cache: 'no-cache',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(payload)
    });
    
    if (response.ok) {
      const responseText = await response.text();
      let parsed;
      try {
        parsed = JSON.parse(responseText);
      } catch(e) {
        parsed = { result: "unknown", raw: responseText };
      }
      // if the script returns any success indication we treat as success
      if (parsed && (parsed.result === "success" || parsed.status === "success" || parsed.inserted === true)) {
        return { success: true, data: parsed };
      } else if (responseText.includes("success") || responseText.includes("inserted")) {
        return { success: true };
      } else {
        console.warn("Sheet response not clearly success but HTTP 200", parsed);
        return { success: true }; // optimistic: endpoint received payload
      }
    } else {
      console.error("Google Sheets HTTP error", response.status);
      return { success: false, error: `HTTP ${response.status}` };
    }
  } catch (err) {
    console.error("Google Sheets network error:", err);
    return { success: false, error: err.message };
  }
}

// main submission with offline fallback and explicit Google Sheets storage
async function handleFormSubmit(event) {
  event.preventDefault();
  
  const growerName = document.getElementById('growerName').value.trim();
  const totalAreaRaw = document.getElementById('totalArea').value;
  const totalArea = parseFloat(totalAreaRaw);
  
  if (!growerName) {
    alert("Please enter grower name.");
    return;
  }
  if (isNaN(totalArea) || totalArea <= 0) {
    alert("Total hydroponic area must be a positive number (m²).");
    return;
  }
  
  const greenhousesData = collectAllGreenhouses();
  if (!greenhousesData) return;
  
  const submissionRecord = {
    recordType: "hydroponic_entry",
    growerName: growerName,
    totalAreaM2: totalArea,
    greenhouses: greenhousesData,
    timestamp: new Date().toISOString(),
    recordId: `hyd_${Date.now()}_${Math.random().toString(36).substr(2, 10)}`
  };
  
  // 1) Always backup locally (offline resilience)
  let backupArray = [];
  try {
    const storedBackup = localStorage.getItem('hydroponic_backup');
    backupArray = storedBackup ? JSON.parse(storedBackup) : [];
    backupArray.push(submissionRecord);
    if (backupArray.length > 80) backupArray.shift();
    localStorage.setItem('hydroponic_backup', JSON.stringify(backupArray));
  } catch (e) { console.warn("Local backup issue", e); }
  
  // 2) Send to Google Sheets with full response handling
  const sheetsResult = await postToGoogleSheets(submissionRecord);
  
  const successDiv = document.getElementById('successMessage');
  if (sheetsResult.success) {
    successDiv.innerHTML = '✅ Data saved to Google Sheets successfully! Your entries are stored securely.';
    successDiv.style.background = '#1f6e2c';
    showUserToast('✓ Saved to cloud', false);
  } else {
    // offline / network issue, but data safely in localStorage
    successDiv.innerHTML = '📁 Data saved locally (offline backup). It will sync automatically when connection is restored.';
    successDiv.style.background = '#e68a2e';
    showUserToast('📱 Saved locally — will retry sync later', false);
    
    // Attempt to schedule background re-sync (store pending sync queue)
    let pendingQueue = [];
    try {
      const storedPending = localStorage.getItem('hydroponic_pending_sync');
      pendingQueue = storedPending ? JSON.parse(storedPending) : [];
      pendingQueue.push(submissionRecord);
      if (pendingQueue.length > 30) pendingQueue = pendingQueue.slice(-30);
      localStorage.setItem('hydroponic_pending_sync', JSON.stringify(pendingQueue));
    } catch(e) {}
  }
  
  successDiv.style.display = 'block';
  setTimeout(() => { successDiv.style.display = 'none'; }, 5500);
  
  // Reset form for fresh entry (clear after successful submit)
  document.getElementById('growerName').value = '';
  document.getElementById('totalArea').value = '';
  document.getElementById('greenhouseList').innerHTML = '';
  greenhouseCounter = 1;
  const initialCard = buildGreenhouseCard(1);
  document.getElementById('greenhouseList').appendChild(initialCard);
}

// reset all inputs
function resetEntireForm() {
  if (confirm('Clear all unsaved data from the form?')) {
    document.getElementById('growerName').value = '';
    document.getElementById('totalArea').value = '';
    document.getElementById('greenhouseList').innerHTML = '';
    greenhouseCounter = 1;
    const freshCard = buildGreenhouseCard(1);
    document.getElementById('greenhouseList').appendChild(freshCard);
    showUserToast('Form cleared', false);
  }
}

// Background sync: attempt to re-send any pending entries that were stored locally when offline
async function backgroundSyncPendingEntries() {
  let pendingQueue = [];
  try {
    const storedPending = localStorage.getItem('hydroponic_pending_sync');
    if (storedPending) {
      pendingQueue = JSON.parse(storedPending);
    }
    if (pendingQueue.length === 0) return;
    
    console.log(`[background] Syncing ${pendingQueue.length} pending entries to Sheets`);
    let newPending = [];
    for (const entry of pendingQueue) {
      const res = await postToGoogleSheets(entry);
      if (!res.success) {
        newPending.push(entry); // keep if still fails
      }
    }
    localStorage.setItem('hydroponic_pending_sync', JSON.stringify(newPending));
    if (newPending.length === 0 && pendingQueue.length > 0) {
      // optionally show subtle notification only if many synced, but keep grower-focused
      showUserToast(`☁️ ${pendingQueue.length} offline record(s) synced to cloud`, false);
    }
  } catch (err) {
    console.warn("Background sync failed", err);
  }
}

// silent heartbeat only for internal re-sync attempts (never shown in UI)
function silentResyncAndHeartbeat() {
  backgroundSyncPendingEntries().catch(e => console.log);
  // Also small connectivity check - no user impact
}

// initialization
function initApp() {
  const container = document.getElementById('greenhouseList');
  container.innerHTML = '';
  greenhouseCounter = 1;
  const defaultCard = buildGreenhouseCard(1);
  container.appendChild(defaultCard);
  
  document.getElementById('addGreenhouseBtn').addEventListener('click', addNewGreenhouse);
  document.getElementById('hydroponicForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('resetBtn').addEventListener('click', resetEntireForm);
  
  // background sync every 60 seconds, no UI elements shown, growers unaware of internal sync.
  setInterval(() => {
    silentResyncAndHeartbeat();
  }, 60000);
  // initial sync attempt after load
  setTimeout(() => silentResyncAndHeartbeat(), 3000);
}

initApp();
</script>
</body>
</html>
