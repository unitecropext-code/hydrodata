<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Hydroponic Data Tracker | Smart Crop Data Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e9f3ea 0%, #d0e6d4 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app-wrapper {
      max-width: 1280px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .header h1 {
      background: linear-gradient(125deg, #0f3b1a, #1f6e2c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .header h1:before {
      content: "🌊";
      font-size: 2rem;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #2b6e3c;
    }

    .subhead {
      color: #2c5e2f;
      font-weight: 500;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 2rem;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 12px 28px rgba(0, 32, 0, 0.12);
      border: 1px solid rgba(70, 120, 70, 0.2);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-group label {
      font-weight: 700;
      color: #1a5a20;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    input, select, textarea {
      padding: 0.75rem 1rem;
      border: 2px solid #e2efe3;
      border-radius: 1.2rem;
      font-size: 0.95rem;
      transition: all 0.2s;
      background: white;
    }

    input:focus, select:focus {
      border-color: #2e8836;
      outline: none;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
    }

    button {
      background: #1f6e2c;
      color: white;
      border: none;
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: #0f551b;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #6c8f72;
    }

    button.secondary:hover {
      background: #53755a;
    }

    .greenhouse-section {
      border-top: 2px dashed #bddcb9;
      padding-top: 1.2rem;
      margin-top: 0.8rem;
    }

    .greenhouse-card {
      background: #fafef7;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      border-left: 5px solid #2c7a2e;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .gh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 1rem;
      align-items: start;
    }

    .remove-gh {
      background: #fff0f0;
      color: #bc544b;
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      border-radius: 2rem;
    }

    .tomato-subfield {
      display: none;
      margin-top: 0.6rem;
      background: #fff8e7;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      border-left: 3px solid #e0a800;
      grid-column: 1 / -1;
    }

    .tomato-subfield.active {
      display: block;
    }

    .harvest-fields {
      display: none;
      grid-column: 1 / -1;
      background: #eef5ea;
      padding: 1rem 1.2rem;
      border-radius: 1.2rem;
      margin-top: 0.6rem;
    }

    .harvest-fields.active {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }

    .success-message {
      display: none;
      background: #2c7a2e;
      color: white;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-top: 1.5rem;
      text-align: center;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3b22;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 500;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      z-index: 1200;
      animation: fadeSlide 0.25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .footer-note {
      text-align: center;
      color: #457a4a;
      font-size: 0.8rem;
      margin-top: 1rem;
    }

    .config-panel {
      background: #f0f7ea;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid #c5dfbc;
    }

    .config-panel label {
      font-size: 0.75rem;
      color: #2c5e2f;
    }

    @media (max-width: 680px) {
      body { padding: 1rem; }
      .card { padding: 1.2rem; }
      .gh-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <h1>Hydroponic Data Tracker</h1>
    <div class="subhead">🌿 Smart Crop Data Capture</div>
  </div>

  <!-- Hidden config panel for admin (optional) -->
  <div class="card" style="padding: 1rem; background: #f9fff7;">
    <details style="cursor: pointer;">
      <summary style="color: #3a7a3e; font-weight: 500;">⚙️ Google Sheets Configuration (Admin)</summary>
      <div class="config-panel" style="margin-top: 0.8rem;">
        <label>🔗 Web App URL:</label>
        <input type="text" id="scriptUrl" value="https://script.google.com/macros/s/AKfycbwvvKYbrfMlZ5cY00o6CBVT8tBbzVYxn50KbuadIiwO026gGkNPL_ZAI6fPjJV23qpw/exec" style="width:100%; font-size:0.8rem; margin-top:4px;">
        <p style="font-size:0.7rem; color:#6e8f6e; margin-top:6px;">After deploying your Google Apps Script, replace this URL with your own Web App URL.</p>
      </div>
    </details>
  </div>

  <!-- Main Entry Form -->
  <div class="card">
    <form id="hydroponicForm">
      <div class="form-grid">
        <div class="input-group">
          <label>👨‍🌾 Grower name *</label>
          <input type="text" id="growerName" placeholder="Full name or operator ID" required>
        </div>
        <div class="input-group">
          <label>📐 Total hydroponic area (m²) *</label>
          <input type="number" id="totalArea" step="0.1" placeholder="Total square meters" required>
        </div>
      </div>

      <div class="greenhouse-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem;">
          <strong>🏡 Greenhouse Details</strong>
          <button type="button" id="addGreenhouseBtn" style="background:#2b6e3c; padding: 0.4rem 1.2rem;">+ Add Greenhouse</button>
        </div>
        <div id="greenhouseList"></div>
      </div>

      <div class="btn-group">
        <button type="submit">💾 Save to Google Sheets</button>
        <button type="button" id="resetBtn" class="secondary">⟳ Clear form</button>
      </div>
    </form>
    <div id="successMessage" class="success-message"></div>
  </div>
  <div class="footer-note">
    ✅ Data is saved in tabular format — one row per greenhouse for easy analysis
  </div>
</div>

<script>
// ==================================================
// GOOGLE APPS SCRIPT WEB APP URL (editable by admin)
// ==================================================
let GOOGLE_SCRIPT_URL = document.getElementById('scriptUrl')?.value || 'https://script.google.com/macros/s/AKfycbwvvKYbrfMlZ5cY00o6CBVT8tBbzVYxn50KbuadIiwO026gGkNPL_ZAI6fPjJV23qpw/exec';

// Update URL if changed in config
document.getElementById('scriptUrl')?.addEventListener('change', (e) => {
  GOOGLE_SCRIPT_URL = e.target.value;
  localStorage.setItem('google_sheet_url', GOOGLE_SCRIPT_URL);
});

// Load saved URL
const savedUrl = localStorage.getItem('google_sheet_url');
if (savedUrl && document.getElementById('scriptUrl')) {
  document.getElementById('scriptUrl').value = savedUrl;
  GOOGLE_SCRIPT_URL = savedUrl;
}

// Crop library
const cropOptions = [
  "Cabbage", "Cauliflower", "English Cucumber", "Lettuce", 
  "Shallot", "Greens", "Melon", "Okra", "Chillies", 
  "Sweet Pepper", "Tomato"
];

const TOMATO_TYPES = ["Cooking", "Salad", "Cherry"];
let greenhouseCounter = 1;

function buildGreenhouseCard(sequence, prefillData = null) {
  const p = prefillData || {};
  const today = new Date().toISOString().slice(0, 10);
  const wrapper = document.createElement('div');
  wrapper.className = 'greenhouse-card';
  
  const savedCrop = p.cropType || '';
  const savedTomatoType = p.tomatoType || '';
  
  const headerHtml = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
      <strong>🌱 Greenhouse ${sequence}</strong>
      ${sequence > 1 ? '<button type="button" class="remove-gh" style="background:#ffe0dd;">✖ Remove</button>' : '<span style="font-size:0.7rem; background:#dff0df; padding:2px 12px; border-radius:20px;">Primary greenhouse</span>'}
    </div>
    <div class="gh-grid">
      <div>
        <label>Area (m²) *</label>
        <input type="number" step="0.1" class="gh-area" value="${p.area || ''}" required>
      </div>
      <div>
        <label>Crop *</label>
        <select class="gh-crop" required>
          <option value="">-- Select --</option>
          ${cropOptions.map(c => `<option value="${c}" ${savedCrop === c ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      <div>
        <label>Variety / Cultivar</label>
        <input type="text" class="gh-variety" value="${p.variety || ''}" placeholder="e.g., Buttercrunch" required>
      </div>
      <div>
        <label>Crop stage *</label>
        <select class="gh-stage" required>
          <option ${p.cropStage === 'Seedling' ? 'selected' : ''}>Seedling</option>
          <option ${p.cropStage === 'Vegetative' ? 'selected' : ''}>Vegetative</option>
          <option ${p.cropStage === 'Flowering' ? 'selected' : ''}>Flowering</option>
          <option ${p.cropStage === 'Harvest' ? 'selected' : ''}>Harvest</option>
        </select>
      </div>
      <div>
        <label>Transplant / start date</label>
        <input type="date" class="gh-transplant" value="${p.transplantDate || today}" required>
      </div>
    </div>
    <div class="tomato-subfield">
      <label style="font-weight:600; margin-bottom:6px; display:inline-block;">🍅 Tomato Type:</label>
      <select class="gh-tomato-type" style="width:100%;">
        <option value="">-- Select tomato variety --</option>
        ${TOMATO_TYPES.map(t => `<option value="${t}" ${savedTomatoType === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="harvest-fields">
      <div>
        <label>📆 Harvest months</label>
        <input type="number" step="0.5" class="gh-harvest-months" placeholder="Months" value="${p.harvestMonths || ''}">
      </div>
      <div>
        <label>📊 Avg yield (kg/week)</label>
        <input type="text" class="gh-yield-week" placeholder="e.g., 24 kg" value="${p.avgYieldWeek || ''}">
      </div>
      <div>
        <label>📈 Avg yield (kg/month)</label>
        <input type="text" class="gh-yield-month" placeholder="e.g., 95 kg" value="${p.avgYieldMonth || ''}">
      </div>
    </div>
  `;
  
  wrapper.innerHTML = headerHtml;
  
  const cropSelect = wrapper.querySelector('.gh-crop');
  const tomatoDiv = wrapper.querySelector('.tomato-subfield');
  const stageSelect = wrapper.querySelector('.gh-stage');
  const harvestDiv = wrapper.querySelector('.harvest-fields');
  
  function updateTomatoVisibility() {
    if (cropSelect.value === 'Tomato') {
      tomatoDiv.classList.add('active');
      wrapper.querySelector('.gh-tomato-type').required = true;
    } else {
      tomatoDiv.classList.remove('active');
      const tt = wrapper.querySelector('.gh-tomato-type');
      if (tt) { tt.required = false; tt.value = ''; }
    }
  }
  
  function updateHarvestVisibility() {
    if (stageSelect.value === 'Harvest') {
      harvestDiv.classList.add('active');
      harvestDiv.querySelector('.gh-harvest-months').required = true;
    } else {
      harvestDiv.classList.remove('active');
      if (harvestDiv.querySelector('.gh-harvest-months')) 
        harvestDiv.querySelector('.gh-harvest-months').required = false;
    }
  }
  
  cropSelect.addEventListener('change', updateTomatoVisibility);
  stageSelect.addEventListener('change', updateHarvestVisibility);
  updateTomatoVisibility();
  updateHarvestVisibility();
  
  if (sequence > 1) {
    wrapper.querySelector('.remove-gh')?.addEventListener('click', () => wrapper.remove());
  }
  
  return wrapper;
}

function addNewGreenhouse() {
  greenhouseCounter++;
  document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(greenhouseCounter));
}

function collectAllGreenhouses() {
  const cards = document.querySelectorAll('#greenhouseList .greenhouse-card');
  const greenhouses = [];
  for (let idx = 0; idx < cards.length; idx++) {
    const card = cards[idx];
    const areaVal = parseFloat(card.querySelector('.gh-area').value);
    const cropType = card.querySelector('.gh-crop').value;
    const variety = card.querySelector('.gh-variety').value.trim();
    const cropStage = card.querySelector('.gh-stage').value;
    const transplantDate = card.querySelector('.gh-transplant').value;
    const tomatoType = card.querySelector('.gh-tomato-type')?.value || null;
    
    if (!cropType) { alert(`Greenhouse ${idx+1}: Select a crop.`); return null; }
    if (!variety) { alert(`Greenhouse ${idx+1}: Enter variety.`); return null; }
    if (isNaN(areaVal) || areaVal <= 0) { alert(`Greenhouse ${idx+1}: Valid area > 0.`); return null; }
    if (!transplantDate) { alert(`Greenhouse ${idx+1}: Select transplant date.`); return null; }
    if (cropType === 'Tomato' && !tomatoType) {
      alert(`Greenhouse ${idx+1}: For Tomato, select Type (Cooking/Salad/Cherry).`);
      return null;
    }
    
    let harvestMonths = null, avgYieldWeek = '', avgYieldMonth = '';
    if (cropStage === 'Harvest') {
      const hm = card.querySelector('.gh-harvest-months').value;
      if (!hm || parseFloat(hm) <= 0) { alert(`Greenhouse ${idx+1}: Enter harvest months.`); return null; }
      harvestMonths = parseFloat(hm);
      avgYieldWeek = card.querySelector('.gh-yield-week').value || '';
      avgYieldMonth = card.querySelector('.gh-yield-month').value || '';
    }
    
    greenhouses.push({ greenhouseIndex: idx+1, area: areaVal, cropType, variety, cropStage, transplantDate, tomatoType, harvestMonths, avgYieldWeek, avgYieldMonth });
  }
  return greenhouses.length ? greenhouses : (alert("Add at least one greenhouse"), null);
}

function showUserToast(msg, isErr = false) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerText = msg;
  toast.style.background = isErr ? '#c54534' : '#1f6e2c';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

// Send data to Google Sheets in tabular format (each greenhouse as separate row)
async function postToGoogleSheets(payload) {
  if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('script.google.com') === false) {
    console.warn("Invalid Google Sheets URL");
    return false;
  }
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    return result.success === true;
  } catch (err) {
    console.error("Sheets error:", err);
    return false;
  }
}

async function handleFormSubmit(event) {
  event.preventDefault();
  
  const growerName = document.getElementById('growerName').value.trim();
  const totalArea = parseFloat(document.getElementById('totalArea').value);
  
  if (!growerName) { alert("Enter grower name."); return; }
  if (isNaN(totalArea) || totalArea <= 0) { alert("Valid total area."); return; }
  
  const greenhouses = collectAllGreenhouses();
  if (!greenhouses) return;
  
  const submissionRecord = {
    growerName, totalArea, greenhouses,
    timestamp: new Date().toISOString(),
    recordId: `hyd_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`
  };
  
  // Local backup
  let backup = JSON.parse(localStorage.getItem('hydroponic_backup') || '[]');
  backup.push(submissionRecord);
  if (backup.length > 60) backup.shift();
  localStorage.setItem('hydroponic_backup', JSON.stringify(backup));
  
  const sheetsSuccess = await postToGoogleSheets(submissionRecord);
  
  const successDiv = document.getElementById('successMessage');
  if (sheetsSuccess) {
    successDiv.innerHTML = '✅ Data saved! Each greenhouse appears as a separate row in Google Sheets.';
    successDiv.style.background = '#1f6e2c';
    showUserToast('✓ Synced to Sheets (tabular format)');
  } else {
    successDiv.innerHTML = '📁 Saved locally. Check Google Script URL and redeploy as Web App.';
    successDiv.style.background = '#e68a2e';
    showUserToast('⚠️ Offline save - check script URL', false);
  }
  successDiv.style.display = 'block';
  setTimeout(() => successDiv.style.display = 'none', 5000);
  
  // Reset form
  document.getElementById('growerName').value = '';
  document.getElementById('totalArea').value = '';
  document.getElementById('greenhouseList').innerHTML = '';
  greenhouseCounter = 1;
  document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(1));
}

function resetEntireForm() {
  if (confirm('Clear all form data?')) {
    document.getElementById('growerName').value = '';
    document.getElementById('totalArea').value = '';
    document.getElementById('greenhouseList').innerHTML = '';
    greenhouseCounter = 1;
    document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(1));
    showUserToast('Form cleared', false);
  }
}

function initApp() {
  document.getElementById('greenhouseList').innerHTML = '';
  greenhouseCounter = 1;
  document.getElementById('greenhouseList').appendChild(buildGreenhouseCard(1));
  document.getElementById('addGreenhouseBtn').addEventListener('click', addNewGreenhouse);
  document.getElementById('hydroponicForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('resetBtn').addEventListener('click', resetEntireForm);
}

initApp();
</script>
</body>
</html>
